  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,serif;background:#f5f3ef;height:100vh;overflow:hidden;}
    input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#ddd;outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#4285f4;cursor:pointer;}
    input[type=date]{font-family:Georgia,serif;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
  </style>

<body>
  <!-- Ladeindikator – wird von React ersetzt wenn erfolgreich -->
  <div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;background:#f5f3ef;color:#888;gap:16px;">
    <div style="font-size:18px;font-weight:700;color:#111;">Routineplan</div>
    <div id="loading-text" style="font-size:12px;">Wird geladen…</div>
    <div style="width:48px;height:4px;background:#ddd;border-radius:2px;overflow:hidden;">
      <div id="loading-bar" style="width:0%;height:100%;background:#c0392b;border-radius:2px;transition:width 0.3s;"></div>
    </div>
    <div id="error-box" style="display:none;max-width:340px;padding:12px 16px;background:#fdecea;border:1px solid #e57373;border-radius:8px;font-size:11px;color:#c0392b;text-align:center;line-height:1.5;"></div>
  </div>
  <script>
    // Fortschrittsbalken animieren während Babel kompiliert
    var bar = document.getElementById('loading-bar');
    var txt = document.getElementById('loading-text');
    var pct = 0;
    var iv = setInterval(function(){
      pct = Math.min(pct + (pct < 60 ? 3 : pct < 85 ? 1 : 0.2), 95);
      bar.style.width = pct + '%';
      if(pct > 30) txt.textContent = 'JSX wird kompiliert…';
      if(pct > 70) txt.textContent = 'Fast fertig…';
    }, 200);
    window.__loadingDone = function(){
      clearInterval(iv);
      bar.style.width = '100%';
      setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 300);
    };
    window.onerror = function(msg, src, line, col, err){
      clearInterval(iv);
      var box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent = '⚠ Fehler in Zeile ' + line + ': ' + msg;
      txt.textContent = 'Fehler beim Laden';
      bar.style.background = '#c0392b';
      bar.style.width = '100%';
    };
  </script>

// --- ANTHROPIC API HELPER ----------------------------------------------------
async function anthropicFetch(apiKey, body){
  if(!apiKey){
    throw new Error("Kein API-Key hinterlegt. Bitte in Einstellungen → API-Key eintragen.");
  }
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-beta":"mcp-client-2025-04-04"
    },
    body:JSON.stringify(body)
  });
}

// Gibt Kategorie-Farbe zurueck - aus gespeicherten Kategorien oder Fallback
function katColor(katId, categories) {
  const cat = (categories||DEFAULT_CATEGORIES).find(c=>c.id===katId);
  if(cat) return { bg:cat.bg, text:cat.text, border:cat.border };
  // Fallback: Hash auf Default-Kategorien
  let h=0; for(let i=0;i<(katId||"").length;i++) h=(katId.charCodeAt(i)+((h<<5)-h))|0;
  const c=DEFAULT_CATEGORIES[Math.abs(h)%DEFAULT_CATEGORIES.length];
  return { bg:c.bg, text:c.text, border:c.border };
}

}

const DAY_START=5.0, DAY_END=23.0, PX_PER_HOUR=45;

const TOTAL_HEIGHT=(DAY_END-DAY_START)*PX_PER_HOUR;

// --- UTILS --------------------------------------------------------------------
function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(s,n){ const d=new Date(s+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function formatDate(s,opts={}){ return new Date(s+"T12:00:00").toLocaleDateString("de-DE",opts); }
function shortDay(s){ return new Date(s+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"}); }
function parseTime(t){ if(!t) return null; const m=t.match(/(\d{1,2}):(\d{2})/); return m?parseInt(m[1])+parseInt(m[2])/60:null; }
function parseDuration(s){ if(!s) return null; const m=s.match(/(\d+)\s*min/i); if(m) return parseInt(m[1]); const h=s.match(/(\d+)\s*h/i); return h?parseInt(h[1])*60:null; }
function timeToY(h){ return (h-DAY_START)*PX_PER_HOUR; }
function formatHour(h){ const hh=Math.floor(h),mm=Math.round((h-hh)*60); return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`; }
function uid(){ return Math.random().toString(36).slice(2,8); }
// Parst ISO-Datetime-String in Dezimalstunden (z.B. "2026-06-11T08:30:00" → 8.5)
function isoToH(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d.getHours()+d.getMinutes()/60; }
// Tage seit einem Datum (0 = heute, null = kein Datum gesetzt)
function daysSince(dateStr){ if(!dateStr) return null; const ms=new Date(todayStr()+"T12:00:00")-new Date(dateStr+"T12:00:00"); return Math.max(0,Math.floor(ms/86400000)); }

// --- ADAPTIVER SOLL -----------------------------------------------------------
function computeAdaptedWindows(person,date,windows,entries){
  const adapted={};
  for(const w of windows) adapted[w.id]={start:parseTime(w.sollStart),ende:parseTime(w.sollEnde)};
  for(let i=89;i>=1;i--){
    const day=addDays(date,-i);
    const entry=entries[`${person}|${day}`];
    if(!entry) continue;
    for(const w of windows){
      const wd=entry.windows?.[w.id]; if(!wd) continue;
      if(w.typ==="fest"&&wd.stars){
        const wt=STAR_WEIGHT[wd.stars]||0;
        const is=parseTime(wd.istStart), ie=parseTime(wd.istEnde);
        if(is!==null&&adapted[w.id].start!==null) adapted[w.id].start=adapted[w.id].start*(1-wt)+is*wt;
        if(ie!==null&&adapted[w.id].ende!==null)  adapted[w.id].ende=adapted[w.id].ende*(1-wt)+ie*wt;
      }
      if(w.typ==="flexibel"&&wd.aktivitaeten?.length){
        const sterne=wd.aktivitaeten.map(a=>a.stars).filter(Boolean);
        if(!sterne.length) continue;
        const avg=Math.round(sterne.reduce((a,b)=>a+b,0)/sterne.length);
        const wt=STAR_WEIGHT[avg]||0;
        const starts=wd.aktivitaeten.map(a=>parseTime(a.start)).filter(t=>t!==null);
        const endes=wd.aktivitaeten.map(a=>parseTime(a.ende)).filter(t=>t!==null);
        if(starts.length&&adapted[w.id].start!==null) adapted[w.id].start=adapted[w.id].start*(1-wt)+Math.min(...starts)*wt;
        if(endes.length&&adapted[w.id].ende!==null)   adapted[w.id].ende=adapted[w.id].ende*(1-wt)+Math.max(...endes)*wt;
      }
    }
  }
  return adapted;
}

async function fbSaveAll(changedKey, changedValue){
  try{
    const db = getDB(); if(!db) return;
    const doc = {};
    const flatKeys = [
      "cfg:persons3","cfg:windows3","cfg:categories1","cfg:appEvents1",
      "cfg:shoppingList1","cfg:todos1","cfg:favorites1","cfg:nutrition1",
      "cfg:personProfiles1","cfg:recipes1","cfg:apiKey1","cfg:lastWriteTime1","cfg:personColors1","cfg:wishlist1",
      "cfg:routineCategories1","cfg:routineActivities1","cfg:routineWindows2"
    ];
    for(const k of flatKeys){
      const val = (changedKey===k) ? changedValue : lsGet(k)?.value;
      if(val != null) doc[k] = val;
    }
    const entryResult = lsList("entry2:");
    const allEntries = {};
    for(const ek of (entryResult?.keys||[])){
      const nk = ek.replace("entry2:","");
      const ev = (changedKey===ek) ? changedValue : lsGet(ek)?.value;
      if(ev){ try{ allEntries[nk]=JSON.parse(ev); }catch{} }
    }
    if(changedKey?.startsWith("entry2:") && changedValue){
      const nk = changedKey.replace("entry2:","");
      if(!allEntries[nk]){ try{ allEntries[nk]=JSON.parse(changedValue); }catch{} }
    }
    doc["entries"] = JSON.stringify(allEntries);

    const rEntryResult = lsList("rentry2:");
    const allREntries = {};
    for(const ek of (rEntryResult?.keys||[])){
      const nk = ek.replace("rentry2:","");
      const ev = (changedKey===ek) ? changedValue : lsGet(ek)?.value;
      if(ev){ try{ allREntries[nk]=JSON.parse(ev); }catch{} }
    }
    if(changedKey?.startsWith("rentry2:") && changedValue){
      const nk = changedKey.replace("rentry2:","");
      if(!allREntries[nk]){ try{ allREntries[nk]=JSON.parse(changedValue); }catch{} }
    }
    doc["rentries"] = JSON.stringify(allREntries);
    doc["cfg:lastWriteTime1"] = String(Date.now());
    await db.collection(FB_COL).doc(FB_DOC).set(doc);
  }catch(e){ console.warn("Firebase save error:",e); }
}

// --- STORAGE -----------------------------------------------------------------
// Dreistufige Storage-Strategie:
// 1. window.storage shared (Artifact-API, geteilt)
// 2. window.storage local (Artifact-API, nur lokal)
// 3. localStorage (Browser-Standard, immer verfuegbar)

let _storageMode = "unknown"; // "shared" | "local" | "browser"

function lsGet(k){ try{ const v=localStorage.getItem("rp:"+k); return v?{value:v}:null; }catch{ return null; } }
function lsSet(k,v){ try{ localStorage.setItem("rp:"+k,v); return true; }catch{ return null; } }
function lsList(prefix){
  try{
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("rp:"+prefix)) keys.push(k.replace("rp:",""));
    }
    return {keys};
  }catch{ return {keys:[]}; }
}

async function sGet(k){
  if(_storageMode==="shared"){ try{ return await window.storage.get(k,true); }catch{} }
  if(_storageMode==="local"){  try{ return await window.storage.get(k,false); }catch{} }
  return lsGet(k);
}
async function sSet(k,v){
  lsSet(k,v); // immer zuerst lokal (schnell)
  if(_storageMode==="shared"){ try{ await window.storage.set(k,v,true); }catch{} }
  if(_storageMode==="local"){  try{ await window.storage.set(k,v,false); }catch{} }
  fbSaveAll(k,v).catch(e=>console.warn("FB write:",e)); // async, blockiert nicht
  return true;
}
async function sList(p){
  if(_storageMode==="shared"){ try{ const r=await window.storage.list(p,true); if(r) return r; }catch{} }
  if(_storageMode==="local"){  try{ const r=await window.storage.list(p,false); if(r) return r; }catch{} }
  return lsList(p);
}

async function testStorage(){
  const tk="cfg:storageTest", tv=String(Date.now());
  // Test 1: window.storage shared
  try{
    await window.storage.set(tk,tv,true);
    const r=await window.storage.get(tk,true);
    if(r?.value===tv){ _storageMode="shared"; return "shared"; }
  }catch{}
  // Test 2: window.storage local
  try{
    await window.storage.set(tk,tv,false);
    const r=await window.storage.get(tk,false);
    if(r?.value===tv){ _storageMode="local"; return "local"; }
  }catch{}
  // Test 3: localStorage (immer verfuegbar)
  try{
    localStorage.setItem("rp:test",tv);
    const r=localStorage.getItem("rp:test");
    if(r===tv){ _storageMode="browser"; return "browser"; }
  }catch{}
  return "error";
}

// Alle bekannten Keys aus ALLEN bisherigen Versionen (vollstaendige Liste)
const ALL_KNOWN_PERSON_KEYS  = ["cfg:persons3","cfg:persons2","config:persons"];
const ALL_KNOWN_WINDOW_KEYS  = ["cfg:windows3","cfg:windows2","config:routines","config:windows"];
const ALL_KNOWN_ENTRY_PREFIXES = ["entry2:","entry:","routine:"];
const ALL_KNOWN_CAT_KEYS     = ["cfg:categories1"];

const SYNC_MS = 30000;
const WAKE_WORD = "hans bitte";
// Hilfsfunktion: liest den letzten Schreib-Timestamp aus dem Storage
async function getStorageWriteTime(){
  const r = await sGet(SK.lastWriteTime);
  return r?.value ? parseInt(r.value)||0 : 0;
}
// Schreibt den aktuellen Timestamp als letzten Schreib-Zeitpunkt
async function setStorageWriteTime(){
  await sSet(SK.lastWriteTime, String(Date.now()));
}

// Sucht in ALLEN bekannten Keys nach gespeicherten Personen (nimmt den ersten Fund)
async function findSavedPersons(){
  for(const key of ALL_KNOWN_PERSON_KEYS){
    const r = await sGet(key);
    if(r?.value){ try{ const v=JSON.parse(r.value); if(Array.isArray(v)&&v.length>0) return v; }catch{} }
  }
  return null;
}

// Sucht in ALLEN bekannten Keys nach gespeicherten Zeitfenstern
async function findSavedWindows(){
  for(const key of ALL_KNOWN_WINDOW_KEYS){
    const r = await sGet(key);
    if(r?.value){ try{ const v=JSON.parse(r.value); if(typeof v==="object"&&v!==null&&!Array.isArray(v)&&Object.keys(v).length>0) return v; }catch{} }
  }
  return null;
}

// Sucht in ALLEN bekannten Keys nach gespeicherten Kategorien
async function findSavedCategories(){
  for(const key of ALL_KNOWN_CAT_KEYS){
    const r = await sGet(key);
    if(r?.value){ try{ const v=JSON.parse(r.value); if(Array.isArray(v)&&v.length>0) return v; }catch{} }
  }
  return null;
}

// Laedt ALLE Eintraege aus ALLEN bekannten Prefixen (merged, neuere ueberschreiben aeltere)
async function findAllEntries(){
  const entries = {};
  // Aeltere zuerst laden, neuere ueberschreiben
  for(const prefix of [...ALL_KNOWN_ENTRY_PREFIXES].reverse()){
    const result = await sList(prefix);
    for(const key of (result?.keys||[])){
      const raw = await sGet(key);
      if(raw?.value){
        try{
          const normalizedKey = key.replace(prefix,"");
          entries[normalizedKey] = JSON.parse(raw.value);
        }catch{}
      }
    }
  }
  return entries;
}

// Laedt alles aus Storage. Durchsucht ALLE bekannten Keys aller Versionen.
// Gespeicherte Daten haben IMMER Vorrang vor Code-Defaults.
async function loadAllFromStorage(defaultPersons, defaultWindowsMap){
  // Personen: suche in allen bekannten Keys
  const savedPersons = await findSavedPersons();
  let persons = savedPersons || [...defaultPersons];

  // Zeitfenster: suche in allen bekannten Keys
  const savedWindows = await findSavedWindows();
  let windowsMap = {};
  if(savedWindows){
    for(const [p,w] of Object.entries(savedWindows)){
      if(Array.isArray(w)&&w.length>0) windowsMap[p]=w;
    }
  }
  // Fuer Personen ohne gespeicherte Fenster: Fallback auf Defaults
  const fallback = windowsMap[persons[0]] || windowsMap.Stefan || defaultWindowsMap.Stefan || Object.values(defaultWindowsMap)[0];
  for(const p of persons){ if(!windowsMap[p]) windowsMap[p]=[...fallback]; }

  // Kategorien: suche in allen bekannten Keys
  const savedCats = await findSavedCategories();
  const categories = savedCats || [...DEFAULT_CATEGORIES];

  // Eintraege: merge aus allen bekannten Prefixen
  const entries = await findAllEntries();

  // Aktuelle Keys mit gefundenen Daten befuellen (fuer kuenftige Versionen)
  // Nur wenn die aktuellen Keys noch leer sind
  const curP = await sGet(SK.persons);
  if(!curP?.value && savedPersons) await sSet(SK.persons, JSON.stringify(savedPersons));
  const curW = await sGet(SK.windows);
  if(!curW?.value && savedWindows) await sSet(SK.windows, JSON.stringify(windowsMap));

  const writeTime = await getStorageWriteTime();
  return {persons, windowsMap, entries, categories, writeTime};
}

          <div key={a.id} style={{display:"flex",alignItems:"center",gap:6,background:col.bg,borderRadius:6,padding:"5px 8px",border:`1.5px solid ${a.stars?STAR_BORDER[a.stars]:col.border}`,transition:"border-color .2s"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:col.text}}>{a.label}</div>
              <div style={{display:"flex",gap:4,alignItems:"center",marginTop:1}}>
                {(a.start||a.ende)&&<span style={{fontSize:9,color:col.text,opacity:.8}}>{a.start}{a.start&&a.ende?" - ":""}{a.ende}</span>}
                {a.kategorie&&<span style={{fontSize:8,background:"rgba(0,0,0,.12)",color:col.text,borderRadius:8,padding:"0 5px"}}>{(categories||DEFAULT_CATEGORIES).find(c=>c.id===a.kategorie)?.label||a.kategorie}</span>}
              </div>

            <StarRating stars={a.stars} onChange={s=>updateStars(a.id,s)} size={9}/>

        <div style={{background:"#fff",borderRadius:7,padding:"8px 10px",border:"1px solid #ddd"}}>

            style={{width:"100%",border:"none",borderBottom:"1px solid #ddd",fontFamily:"Georgia,serif",fontSize:12,outline:"none",marginBottom:6,background:"transparent",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:6}}>
            <input value={form.start||""} onChange={e=>setForm(f=>({...f,start:e.target.value}))} placeholder="Start 08:30"

            <span style={{color:"#aaa",fontSize:11}}>-</span>
            <input value={form.ende||""} onChange={e=>setForm(f=>({...f,ende:e.target.value}))} placeholder="Ende 10:00"

          </div>
          <select value={form.kategorie||""} onChange={e=>setForm(f=>({...f,kategorie:e.target.value}))}
            style={{width:"100%",border:"1px solid #ddd",borderRadius:6,padding:"4px 6px",fontFamily:"Georgia,serif",fontSize:11,outline:"none",background:"#fff",marginTop:6}}>
            <option value="">Kategorie waehlen...</option>
            {(categories||DEFAULT_CATEGORIES).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}}>
            <button onClick={()=>{setEditing(null);setForm({});}} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:10,color:"#888"}}>Abbruch</button>
            <button onClick={save} style={{padding:"4px 12px",borderRadius:20,border:"none",background:accent,cursor:"pointer",fontSize:10,fontWeight:700,color:"#fff"}}>OK</button>
          </div>
        </div>
      )}
      <button onClick={startAdd} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:20,border:`1px dashed ${accent}`,background:"transparent",cursor:"pointer",fontSize:10,color:accent,fontWeight:600,alignSelf:"flex-start"}}>
        <PlusIcon/> Hinzufuegen
      </button>
    </div>
  );
}

// --- ZEITACHSE + GRID ---------------------------------------------------------
function TimeAxis(){
  const hours=[]; for(let h=Math.ceil(DAY_START);h<=DAY_END;h++) hours.push(h);
  return(
    <div style={{width:38,flexShrink:0,position:"relative",height:TOTAL_HEIGHT}}>
      {hours.map(h=><div key={h} style={{position:"absolute",top:timeToY(h)-7,right:3,fontSize:9,color:"#bbb",fontFamily:"monospace"}}>{formatHour(h)}</div>)}
    </div>
  );
}
function GridLines(){
  const hours=[]; for(let h=Math.ceil(DAY_START);h<=DAY_END;h++) hours.push(h);
  return(
    <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
      {hours.map(h=><div key={h} style={{position:"absolute",top:timeToY(h),left:0,right:0,borderTop:"1px solid #ece9e4"}}/>)}
    </div>
  );
}

// --- FENSTER-BLOCK ------------------------------------------------------------
function WindowBlock({win,sollStart,sollEnde,istData,compact,onIstChange,accent,categories}){
  const [expanded,setExpanded]=useState(false);
  const istStart=istData?.istStart||"";
  const istEnde=istData?.istEnde||"";
  const stars=istData?.stars||null;
  const aktivitaeten=istData?.aktivitaeten||[];
  const hasIst=win.typ==="fest"?!!(istStart||istEnde):aktivitaeten.length>0;

  const startY=timeToY(sollStart);
  const rawH=timeToY(sollEnde>sollStart?sollEnde:sollEnde+24)-startY;
  const height=Math.max(rawH,compact?16:30);

  const col=WIN_GRAY;
  const accentBg = accent && accent!==WIN_GRAY.bg ? accent+"33" : col.bg;
  const accentBgSolid = accent && accent!==WIN_GRAY.bg ? accent+"55" : col.bg+"88";
  const borderColor=(!compact&&stars&&win.typ==="fest")?STAR_BORDER[stars]:(accent||col.darkBorder);

  if(compact){
    return(
      <div style={{position:"absolute",top:startY,left:1,right:1,height,background:hasIst?accentBg:accentBgSolid,border:`1px ${hasIst?"solid":"dashed"} ${accent||borderColor}`,borderRadius:4,overflow:"hidden",boxSizing:"border-box",padding:"1px 3px"}}>
        <div style={{fontSize:7,fontWeight:700,color:"#000",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{win.label}</div>
        {win.typ==="flexibel"&&aktivitaeten.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:1,marginTop:1}}>
            {aktivitaeten.slice(0,3).map(a=>{const c=aktColor(a.label,a.kategorie,categories);return(<div key={a.id} style={{fontSize:6,background:c.bg,color:c.text,borderRadius:3,padding:"0 3px",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",maxWidth:40,textOverflow:"ellipsis"}}>{a.label}</div>);})}
          </div>
        )}
        {win.typ==="fest"&&hasIst&&<div style={{fontSize:6,color:"#333",opacity:.8}}>{istStart}{istStart&&istEnde?" - ":""}{istEnde}</div>}
      </div>
    );
  }

  return(
    <div style={{position:"absolute",top:startY,left:1,right:1,minHeight:height,background:hasIst?accentBg:col.bg+"66",border:`2px ${hasIst?"solid":"dashed"} ${accent||col.darkBorder}`,borderRadius:7,overflow:"visible",boxSizing:"border-box",transition:"border-color .2s",zIndex:expanded?10:1}}>
      {/* Header */}
      <div onClick={()=>setExpanded(!expanded)} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 7px",cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:10,fontWeight:700,color:"#000",flex:1}}>{win.label}</span>
        {win.typ==="fest"&&stars&&<span style={{fontSize:9,color:STAR_BORDER[stars]}}>{Array(stars||0).fill("★").join("")}</span>}
        {win.typ==="flexibel"&&aktivitaeten.length>0&&<span style={{fontSize:9,color:"#888"}}>{aktivitaeten.length}x</span>}
        <span style={{fontSize:8,background:win.typ==="fest"?"#ddd":"#e8f4e8",color:win.typ==="fest"?"#666":"#2d6a2d",borderRadius:10,padding:"1px 5px"}}>{win.typ}</span>
        <span style={{fontSize:8,color:"#aaa"}}>{expanded?"▲":"▼"}</span>
      </div>
      {/* Soll-Zeiten */}
      <div style={{padding:"0 7px 3px",fontSize:8,color:"#aaa"}}>
        Soll: {formatHour(sollStart)} - {formatHour(sollEnde>sollStart?sollEnde:sollEnde+24)}
      </div>
      {/* Aktivitaeten-Vorschau (im nicht-erweiterten Zustand) */}
      {!expanded&&win.typ==="flexibel"&&aktivitaeten.length>0&&(
        <div style={{padding:"0 7px 5px",display:"flex",flexWrap:"wrap",gap:3}}>
          {aktivitaeten.map(a=>{
            const c=aktColor(a.label,a.kategorie,categories);
            return(
              <div key={a.id} style={{fontSize:9,background:c.bg,color:c.text,borderRadius:20,padding:"1px 7px",fontWeight:700,border:`1px solid ${a.stars?STAR_BORDER[a.stars]:c.border}`}}>
                {a.label}{a.start?" "+a.start:""}{a.stars?" "+Array(a.stars||0).fill("★").join(""):""}
              </div>
            );
          })}
        </div>
      )}
      {!expanded&&win.typ==="fest"&&hasIst&&(
        <div style={{padding:"0 7px 5px"}}>
          {(() => {
            const fc=festColor(win.id);
            return(
              <div style={{fontSize:9,background:fc.bg,color:fc.text,borderRadius:20,padding:"2px 8px",display:"inline-block",border:`1px solid ${stars?STAR_BORDER[stars]:fc.border}`,fontWeight:700}}>
                {istStart}{istStart&&istEnde?" - ":""}{istEnde}{stars?" "+Array(stars||0).fill("★").join(""):""}
              </div>
            );
          })()}
        </div>
      )}
      {/* Expandiert */}
      {expanded&&(
        <div style={{background:"rgba(255,255,255,.92)",borderRadius:"0 0 6px 6px",padding:"8px 8px 10px",borderTop:"1px solid #ddd"}}>
          {win.typ==="fest"?(
            <div>
              <div style={{fontSize:9,color:"#999",letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Ist-Zeiten</div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,color:"#aaa",marginBottom:2}}>Start</div>
                  <input value={istStart} onChange={e=>onIstChange({...istData,istStart:e.target.value})} placeholder="23:15"
                    style={{width:"100%",border:"none",borderBottom:"1.5px solid #ddd",background:"transparent",fontFamily:"Georgia,serif",fontSize:13,outline:"none",boxSizing:"border-box",padding:"2px 0"}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,color:"#aaa",marginBottom:2}}>Ende</div>
                  <input value={istEnde} onChange={e=>onIstChange({...istData,istEnde:e.target.value})} placeholder="06:45"
                    style={{width:"100%",border:"none",borderBottom:"1.5px solid #ddd",background:"transparent",fontFamily:"Georgia,serif",fontSize:13,outline:"none",boxSizing:"border-box",padding:"2px 0"}}/>
                </div>
              </div>
              <div style={{fontSize:9,color:"#aaa",marginBottom:5}}>Bewertung</div>
              <StarRating stars={stars} onChange={s=>onIstChange({...istData,stars:s})} size={16}/>
            </div>
          ):(
            <div>
              <div style={{fontSize:9,color:"#999",letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Aktivitaeten</div>
              <AktivitaetenEditor aktivitaeten={aktivitaeten} onChange={akt=>onIstChange({...istData,aktivitaeten:akt})} accent={accent} categories={categories}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// --- EINSTELLUNGEN: ZEITFENSTER BEARBEITEN ------------------------------------
function WindowEditor({person,windows,onSave,onClose}){
  const [local,setLocal]=useState(windows.map(w=>({...w})));
  const [msg,setMsg]=useState("");

  function update(i,field,val){ const u=[...local]; u[i]={...u[i],[field]:val}; setLocal(u); }
  function add(){
    setLocal([...local,{id:uid(),label:"Neues Fenster",typ:"flexibel",sollStart:"12:00",sollEnde:"13:00"}]);
  }
  function remove(i){
    if(local.length<=1){setMsg("Mind. ein Fenster behalten.");return;}
    const u=[...local]; u.splice(i,1); setLocal(u);
  }
  function moveUp(i){ if(i===0) return; const u=[...local];[u[i-1],u[i]]=[u[i],u[i-1]];setLocal(u); }
  function moveDown(i){ if(i===local.length-1) return; const u=[...local];[u[i],u[i+1]]=[u[i+1],u[i]];setLocal(u); }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"20px 22px",width:360,maxHeight:"85vh",overflow:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#111"}}>Zeitfenster: {person}</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:14}}>Sollzeiten und Typ dauerhaft anpassen</div>
        {local.map((w,i)=>(
          <div key={w.id} style={{background:"#f9f7f3",borderRadius:9,padding:"10px 12px",marginBottom:8,border:"1px solid #e8e5e0"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
              <input value={w.label} onChange={e=>update(i,"label",e.target.value)}
                style={{flex:1,border:"none",borderBottom:"1px solid #ddd",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,outline:"none",background:"transparent"}}/>
              <select value={w.typ} onChange={e=>update(i,"typ",e.target.value)}
                style={{fontSize:10,border:"1px solid #ddd",borderRadius:6,padding:"2px 5px",background:"#fff",fontFamily:"Georgia,serif",outline:"none"}}>
                <option value="fest">fest</option>
                <option value="flexibel">flexibel</option>
              </select>
              <button onClick={()=>moveUp(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:12,padding:2}}>&#8593;</button>
              <button onClick={()=>moveDown(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:12,padding:2}}>&#8595;</button>
              <button onClick={()=>remove(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:2}}><TrashIcon/></button>
            </div>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"#aaa",marginBottom:2}}>Soll-Start</div>
                <input value={w.sollStart} onChange={e=>update(i,"sollStart",e.target.value)} placeholder="HH:MM"
                  style={{width:"100%",border:"none",borderBottom:"1px solid #ddd",fontFamily:"Georgia,serif",fontSize:13,outline:"none",background:"transparent",boxSizing:"border-box"}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"#aaa",marginBottom:2}}>Soll-Ende</div>
                <input value={w.sollEnde} onChange={e=>update(i,"sollEnde",e.target.value)} placeholder="HH:MM"
                  style={{width:"100%",border:"none",borderBottom:"1px solid #ddd",fontFamily:"Georgia,serif",fontSize:13,outline:"none",background:"transparent",boxSizing:"border-box"}}/>
              </div>
            </div>
          </div>
        ))}
        <button onClick={add} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:20,border:"1px dashed #aaa",background:"transparent",cursor:"pointer",fontSize:11,color:"#666",marginBottom:12}}>
          <PlusIcon/> Fenster hinzufuegen
        </button>
        {msg&&<div style={{fontSize:11,color:"#c0392b",marginBottom:8}}>{msg}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"8px 0",borderRadius:30,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,color:"#888"}}>Abbrechen</button>
          <button onClick={()=>{onSave(local);onClose();}} style={{flex:2,padding:"8px 0",borderRadius:30,border:"none",background:"#111",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// --- NUTZERVERWALTUNG ---------------------------------------------------------
function PersonManager({persons,onClose,onSave}){
  const [local,setLocal]=useState([...persons]);
  const [editing,setEditing]=useState(null);
  const [editName,setEditName]=useState("");
  const [newName,setNewName]=useState("");
  const [msg,setMsg]=useState("");
  function startEdit(i){setEditing(i);setEditName(local[i]);}
  function confirmEdit(){const t=editName.trim();if(!t||(local.includes(t)&&t!==local[editing])){setMsg("Name vergeben.");return;}const u=[...local];u[editing]=t;setLocal(u);setEditing(null);setMsg("");}
  function add(){const t=newName.trim();if(!t)return;if(local.includes(t)){setMsg("Bereits vorhanden.");return;}setLocal([...local,t]);setNewName("");setMsg("");}
  function remove(i){if(local.length<=1){setMsg("Mind. eine Person.");return;}const u=[...local];u.splice(i,1);setLocal(u);}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"22px 24px",width:300,maxHeight:"80vh",overflow:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#111"}}>Nutzer verwalten</div>
        {local.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,background:"#f9f7f3",borderRadius:8,padding:"7px 10px"}}>
            {editing===i?(
              <>
                <input value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmEdit()} autoFocus
                  style={{flex:1,border:"1px solid #ddd",borderRadius:6,padding:"4px 8px",fontFamily:"Georgia,serif",fontSize:13,outline:"none"}}/>
                <button onClick={confirmEdit} style={{padding:"4px 10px",borderRadius:20,border:"none",background:"#27ae60",color:"#fff",cursor:"pointer",fontSize:11}}>OK</button>
                <button onClick={()=>setEditing(null)} style={{padding:"4px 8px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:11,color:"#888"}}>X</button>
              </>
            ):(
              <>
                <span style={{flex:1,fontSize:14,color:"#222"}}>{p}</span>
                <button onClick={()=>startEdit(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#888",padding:4}}><EditIcon/></button>
                <button onClick={()=>remove(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:4}}><TrashIcon/></button>
              </>
            )}
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Neuer Name..."
            style={{flex:1,border:"1px solid #ddd",borderRadius:8,padding:"7px 10px",fontFamily:"Georgia,serif",fontSize:13,outline:"none"}}/>
          <button onClick={add} style={{padding:"7px 12px",borderRadius:8,border:"none",background:"#111",color:"#fff",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center"}}><PlusIcon/></button>
        </div>
        {msg&&<div style={{fontSize:11,color:"#c0392b",marginTop:8}}>{msg}</div>}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={onClose} style={{flex:1,padding:"8px 0",borderRadius:30,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,color:"#888"}}>Abbrechen</button>
          <button onClick={()=>{onSave(local);onClose();}} style={{flex:2,padding:"8px 0",borderRadius:30,border:"none",background:"#111",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function DayView({windows,entryData,adaptedWins,onWindowChange,accent,categories,gcalEvents,gcalLoading,onLoadGcal,dateStr,persons,personColors,onPersonColorChange,onUpdateEvent,onDeleteEvent}){
  const dayEvents = gcalEvents||[];
  const [selEv,setSelEv] = useState(null);

  return(
  <div>
    <div style={{flex:1,overflow:"auto"}}>
      <div style={{display:"flex",minHeight:TOTAL_HEIGHT+32}}>
        <TimeAxis/>
        {/* SOLL */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
          <div style={{textAlign:"center",padding:"3px 0",fontSize:9,fontWeight:700,color:"#999",letterSpacing:1,background:"#faf9f7",borderLeft:"1px solid #ece9e4",borderBottom:"1px solid #ece9e4",position:"sticky",top:0,zIndex:4}}>SOLL</div>
          <div style={{flex:1,position:"relative",borderLeft:"1px solid #ece9e4"}}>
            <GridLines/>
            {windows.map(w=>{
              const s=adaptedWins[w.id]?.start??parseTime(w.sollStart);

              if(s===null) return null;
              const startY=timeToY(s);
              const endY=timeToY(e>s?e:e+24);
              const height=Math.max(endY-startY,28);
              return(
                <div key={w.id} style={{position:"absolute",top:startY,left:1,right:1,height,background:WIN_GRAY.bg+"55",border:`1.5px dashed ${WIN_GRAY.darkBorder}`,borderRadius:6,padding:"3px 6px",boxSizing:"border-box",overflow:"hidden"}}>
                  <div style={{fontSize:10,fontWeight:700,color:WIN_GRAY.text}}>{w.label}</div>
                  <div style={{fontSize:8,color:"#aaa"}}>{formatHour(s)} - {formatHour(e>s?e:e+24)}</div>
                  <div style={{fontSize:8,background:w.typ==="fest"?"#ddd":"#e8f4e8",color:w.typ==="fest"?"#666":"#2d6a2d",borderRadius:10,padding:"1px 5px",display:"inline-block",marginTop:2}}>{w.typ}</div>
                </div>
              );
            })}
          </div>
        </div>
        {/* IST */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
          <div style={{textAlign:"center",padding:"3px 0",fontSize:9,fontWeight:700,color:"#333",letterSpacing:1,background:"#f0f7f0",borderLeft:"1px solid #ece9e4",borderBottom:"1px solid #ece9e4",position:"sticky",top:0,zIndex:4}}>IST</div>
          <div style={{flex:1,position:"relative",borderLeft:"1px dashed #ddd",overflow:"visible"}}>
            <GridLines/>
            {windows.map(w=>{
              const s=adaptedWins[w.id]?.start??parseTime(w.sollStart);
              const e=adaptedWins[w.id]?.ende??parseTime(w.sollEnde);
              if(s===null) return null;
              const istData=entryData?.windows?.[w.id]||{};
              return(
                <WindowBlock key={w.id} win={w} sollStart={s} sollEnde={e>s?e:e+24}
                  istData={istData} compact={false}
                  onIstChange={data=>onWindowChange(w.id,data)} accent={accent} categories={categories}/>
              );
            })}
          </div>
        </div>
        {/* TERMINE (Google Kalender) */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
          <div style={{textAlign:"center",padding:"3px 0",fontSize:9,fontWeight:700,color:"#c0392b",letterSpacing:1,background:"#fff5f5",borderLeft:"1px solid #ece9e4",borderBottom:"1px solid #ece9e4",display:"flex",alignItems:"center",justifyContent:"center",gap:4,position:"sticky",top:0,zIndex:4}}>
            TERMINE
            <button onClick={onLoadGcal} style={{fontSize:8,background:"#c0392b",color:"#fff",border:"none",borderRadius:8,padding:"1px 5px",cursor:"pointer",fontFamily:"Georgia,serif"}}>
              {gcalLoading?"...":"laden"}
            </button>
          </div>
          <div style={{flex:1,position:"relative",borderLeft:"1px solid #f0c0c0",background:"#fffafa"}}>
            <GridLines/>
            {dayEvents.length===0&&!gcalLoading&&(
              <div style={{position:"absolute",top:timeToY(9),left:2,right:2,textAlign:"center",fontSize:9,color:"#ddd",fontStyle:"italic"}}>
                Tippe "laden"
              </div>
            )}
            {dayEvents.map((ev,i)=>{
              const startDec=isoToH(ev.start?.dateTime);
              const endDec=isoToH(ev.end?.dateTime);
              if(startDec===null) return null;
              const clampedStart=Math.max(startDec,DAY_START);
              const y=timeToY(clampedStart);
              const height=endDec?Math.max((endDec-clampedStart)*PX_PER_HOUR,24):32;
              const evColor=personAccent(ev._person||(persons&&persons[0])||"",persons||[],personColors);
              return(
                <div key={ev.id||i} onClick={()=>setSelEv({...ev,date:dateStr,person:ev._person||""})} style={{
                  position:"absolute",top:y,left:1,right:1,height,
                  background:evColor,
                  borderRadius:5,padding:"3px 5px",
                  boxSizing:"border-box",overflow:"hidden",
                  border:"1.5px solid "+evColor,
                  cursor:"pointer",
                }}>
                  <div style={{fontSize:10,fontWeight:700,color:"#000",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.summary||"(kein Titel)"}</div>
                  {endDec&&<div style={{fontSize:8,color:"#222"}}>{formatHour(startDec)} - {formatHour(endDec)}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
    <PersonColorLegend persons={persons} personColors={personColors} onPersonColorChange={onPersonColorChange}/>
    {selEv&&<EventDetailModal ev={selEv} onClose={()=>setSelEv(null)} persons={persons} personColors={personColors} onUpdate={onUpdateEvent} onDelete={onDeleteEvent}/>}
  </div>
  );
}

// --- MONATSANSICHT ------------------------------------------------------------
function MonthView({today,windows,getEntry,tab,setTab,categories}){
  const blocks=Array.from({length:4},(_,bi)=>Array.from({length:7},(_,i)=>addDays(today,-(27-bi*7-i))));
  function bl(days){return `${formatDate(days[0],{day:"2-digit",month:"2-digit"})} - ${formatDate(days[6],{day:"2-digit",month:"2-digit"})}`;}
  function compl(days){let total=0,filled=0;for(const d of days){const e=getEntry(d);for(const w of windows){total++;const wd=e?.windows?.[w.id];if(w.typ==="fest"&&(wd?.istStart||wd?.istEnde))filled++;if(w.typ==="flexibel"&&wd?.aktivitaeten?.length)filled++;}}return total?Math.round((filled/total)*100):0;}
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",borderBottom:"2px solid #ece9e4",background:"#f9f7f3",flexShrink:0}}>
        {["Ist","Soll"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 22px",border:"none",background:tab===t?"#fff":"transparent",fontFamily:"Georgia,serif",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?"#111":"#aaa",cursor:"pointer",borderBottom:tab===t?"2px solid #111":"none",marginBottom:-2}}>{t}</button>
        ))}
      </div>
      <div style={{flex:1,overflow:"auto"}}>
        {tab==="Ist"?(
          <div style={{display:"flex",minWidth:500}}>
            {blocks.map((days,bi)=>{
              const pct=compl(days);const pc=pct>=80?"#27ae60":pct>=50?"#e67e22":"#c0392b";
              return(
                <div key={bi} style={{flex:1,borderLeft:bi>0?"1px solid #ece9e4":"none",padding:"10px 8px"}}>
                  <div style={{fontSize:9,color:"#aaa",marginBottom:6,textAlign:"center"}}>{bl(days)}</div>
                  <div style={{textAlign:"center",marginBottom:10}}>
                    <div style={{fontSize:24,fontWeight:700,color:pc}}>{pct}%</div>
                  </div>
                  {windows.map(w=>{
                    const daysFilled=days.filter(d=>{const wd=getEntry(d)?.windows?.[w.id];return w.typ==="fest"?(wd?.istStart||wd?.istEnde):wd?.aktivitaeten?.length>0;}).length;
                    const allAkt=days.flatMap(d=>getEntry(d)?.windows?.[w.id]?.aktivitaeten||[]);
                    const uniqueAkt=[...new Map(allAkt.map(a=>[a.label,a])).values()].slice(0,4);
                    return(
                      <div key={w.id} style={{background:WIN_GRAY.bg,borderRadius:5,padding:"4px 6px",marginBottom:4,border:`1px solid ${WIN_GRAY.border}`}}>
                        <div style={{fontSize:9,fontWeight:700,color:WIN_GRAY.text}}>{w.label}</div>
                        <div style={{fontSize:9,color:"#888"}}>{daysFilled}/7 Tage</div>
                        {uniqueAkt.length>0&&(
                          <div style={{display:"flex",flexWrap:"wrap",gap:2,marginTop:2}}>
                            {uniqueAkt.map(a=>{const c=aktColor(a.label,a.kategorie,categories);return(<div key={a.label} style={{fontSize:7,background:c.bg,color:c.text,borderRadius:10,padding:"0 4px",fontWeight:700}}>{a.label}</div>);})}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        ):(
          <div style={{padding:"14px 16px"}}>
            <div style={{fontSize:10,color:"#aaa",marginBottom:12}}>Zeitfenster Sollvorgaben</div>
            {windows.map(w=>(
              <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,background:WIN_GRAY.bg,borderRadius:7,padding:"7px 10px",border:`1.5px dashed ${WIN_GRAY.darkBorder}`,marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:WIN_GRAY.text}}>{w.label}</div>
                  <div style={{fontSize:10,color:"#aaa"}}>{w.sollStart} - {w.sollEnde}</div>
                </div>
                <div style={{fontSize:10,background:w.typ==="fest"?"#ddd":"#e8f4e8",color:w.typ==="fest"?"#666":"#2d6a2d",borderRadius:10,padding:"1px 6px"}}>{w.typ}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// --- KATEGORIEN EDITOR -------------------------------------------------------
function KategorienEditor({categories, onSave, onClose}){
  const [local, setLocal] = useState(categories.map(c=>({...c})));
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState("");

  function startEdit(i){ setEditing(i); setForm({...local[i]}); }
  function confirmEdit(){
    if(!form.label?.trim()){setMsg("Name erforderlich.");return;}
    const u=[...local]; u[editing]={...form}; setLocal(u); setEditing(null); setMsg("");
  }
  function add(){
    const id="kat_"+uid();
    setLocal([...local,{id,label:"Neue Kategorie",bg:"#c8c4be",text:"#555",border:"#aaa"}]);
    setEditing(local.length); setForm({id,label:"Neue Kategorie",bg:"#c8c4be",text:"#555",border:"#aaa"});
  }
  function remove(i){
    if(local.length<=1){setMsg("Mind. eine Kategorie.");return;}
    const u=[...local]; u.splice(i,1); setLocal(u);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"20px 22px",width:340,maxHeight:"85vh",overflow:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#111"}}>Kategorien verwalten</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:14}}>Farben und Namen anpassen</div>
        {local.map((c,i)=>(
          <div key={c.id} style={{background:c.bg+"33",borderRadius:9,padding:"8px 10px",marginBottom:6,border:`1.5px solid ${c.border}`}}>
            {editing===i?(
              <div>
                <input value={form.label||""} onChange={e=>setForm(f=>({...f,label:e.target.value}))} autoFocus
                  style={{width:"100%",border:"none",borderBottom:"1px solid #ddd",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,outline:"none",background:"transparent",marginBottom:8,boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <label style={{fontSize:10,color:"#aaa"}}>Hintergrund</label>
                  <input type="color" value={form.bg||"#cccccc"} onChange={e=>setForm(f=>({...f,bg:e.target.value}))}
                    style={{width:32,height:24,border:"1px solid #ddd",borderRadius:4,cursor:"pointer",padding:1}}/>
                  <label style={{fontSize:10,color:"#aaa"}}>Text</label>
                  <input type="color" value={form.text||"#333333"} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
                    style={{width:32,height:24,border:"1px solid #ddd",borderRadius:4,cursor:"pointer",padding:1}}/>
                  <label style={{fontSize:10,color:"#aaa"}}>Rand</label>
                  <input type="color" value={form.border||"#aaaaaa"} onChange={e=>setForm(f=>({...f,border:e.target.value}))}
                    style={{width:32,height:24,border:"1px solid #ddd",borderRadius:4,cursor:"pointer",padding:1}}/>
                </div>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                  <button onClick={()=>{setEditing(null);setForm({});}} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:10,color:"#888"}}>Abbruch</button>
                  <button onClick={confirmEdit} style={{padding:"4px 12px",borderRadius:20,border:"none",background:"#111",cursor:"pointer",fontSize:10,fontWeight:700,color:"#fff"}}>OK</button>
                </div>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:c.bg,border:`2px solid ${c.border}`,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:c.text||"#333"}}>{c.label}</span>
                <button onClick={()=>startEdit(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",padding:2}}><EditIcon/></button>
                <button onClick={()=>remove(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:2}}><TrashIcon/></button>
              </div>
            )}
          </div>
        ))}
        <button onClick={add} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:20,border:"1px dashed #aaa",background:"transparent",cursor:"pointer",fontSize:11,color:"#666",marginBottom:12}}>
          <PlusIcon/> Kategorie hinzufuegen
        </button>
        {msg&&<div style={{fontSize:11,color:"#c0392b",marginBottom:8}}>{msg}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"8px 0",borderRadius:30,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,color:"#888"}}>Abbrechen</button>
          <button onClick={()=>{onSave(local);onClose();}} style={{flex:2,padding:"8px 0",borderRadius:30,border:"none",background:"#111",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// --- KI PANEL ----------------------------------------------------------------
function KIPanel({activePerson,activeDate,windows,onSave,accent,categories,onAddCalEvent,onAddPerson,persons,onAddShoppingItems,onAddTodo,onCheckTodo,onAddNutrition,onAddRecipe,onShowPanel,apiKey}){
  const [inputText,setInputText]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiError,setAiError]=useState("");
  const [saveMsg,setSaveMsg]=useState("");
  const [listening,setListening]=useState(false);
  const [wakeMode,_setWakeMode]=useState(false);
  const [wakeActive,setWakeActive]=useState(false);
  const [clarification,setClarification]=useState(null);
  const [speechOn,setSpeechOn]=useState(()=>{ try{ return localStorage.getItem("rp:speechOn")==="1"; }catch{ return false; } });
  const [showSpeechSettings,setShowSpeechSettings]=useState(false);
  const [voices,setVoices]=useState([]);
  const [voiceURI,setVoiceURI]=useState(()=>{ try{ return localStorage.getItem("rp:voiceURI")||""; }catch{ return ""; } });
  const [speechPitch,setSpeechPitch]=useState(()=>{ try{ return parseFloat(localStorage.getItem("rp:speechPitch")||"1"); }catch{ return 1; } });
  const [speechRate,setSpeechRate]=useState(()=>{ try{ return parseFloat(localStorage.getItem("rp:speechRate")||"1"); }catch{ return 1; } });

  const recRef=useRef(null);
  const wakeRecRef=useRef(null);
  const wakeModeRef=useRef(false);

  function setWakeMode(v){ wakeModeRef.current=v; _setWakeMode(v); }

  useEffect(()=>{
    function loadVoices(){ const v=window.speechSynthesis?.getVoices()||[]; if(v.length) setVoices(v); }
    loadVoices();
    window.speechSynthesis?.addEventListener("voiceschanged",loadVoices);
    return()=>{ window.speechSynthesis?.removeEventListener("voiceschanged",loadVoices); };
  },[]);

  useEffect(()=>{ return()=>{ recRef.current?.stop(); wakeRecRef.current?.stop(); }; },[]);

  function speak(text){
    if(!speechOn||!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=voices.find(x=>x.voiceURI===voiceURI);
    if(v) u.voice=v;
    u.lang="de-DE"; u.pitch=speechPitch; u.rate=speechRate;
    window.speechSynthesis.speak(u);
  }
  function saveSpeechPref(key,val){ try{ localStorage.setItem("rp:"+key,String(val)); }catch{} }

  function toggleListening(){
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){
      setAiError("Spracheingabe wird in diesem Browser nicht unterstuetzt."); return;
    }
    if(listening){ recRef.current?.stop(); setListening(false); return; }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.lang="de-DE"; rec.continuous=false; rec.interimResults=false;
    rec.onstart=()=>setListening(true);
    rec.onresult=e=>{ const t=e.results[0]?.[0]?.transcript||""; if(t) setInputText(p=>p?p+" "+t:t); setListening(false); };
    rec.onerror=()=>{ setAiError("Mikrofon-Fehler."); setListening(false); };
    rec.onend=()=>setListening(false);
    try{ rec.start(); recRef.current=rec; }catch(e){ setAiError("Aufnahme nicht moeglich: "+e.message); }
  }

  function toggleWakeMode(){
    if(wakeMode){ wakeRecRef.current?.stop(); setWakeMode(false); setWakeActive(false); return; }
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){
      setAiError("Spracheingabe nicht unterstuetzt."); return;
    }
    setWakeMode(true);
    startWakeListener();
  }

  function startWakeListener(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.lang="de-DE"; rec.continuous=false; rec.interimResults=false;
    rec.onresult=e=>{
      const t=(e.results[0]?.[0]?.transcript||"").toLowerCase().trim();
      if(t.includes(WAKE_WORD)){
        const cmd=t.split(WAKE_WORD).slice(1).join(" ").trim();
        setWakeActive(true);
        if(cmd){ handleWakeCommand(cmd); }
        else { startCommandListenerWithSilence(); return; }
      }
    };
    rec.onend=()=>{ if(wakeModeRef.current) setTimeout(()=>startWakeListener(),300); };
    rec.onerror=()=>{ if(wakeModeRef.current) setTimeout(()=>startWakeListener(),1000); };
    try{ rec.start(); wakeRecRef.current=rec; }catch{}
  }

  function startCommandListenerWithSilence(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.lang="de-DE"; rec.continuous=true; rec.interimResults=true;
    let accumulated="";
    let silenceTimer=null;
    function resetSilence(){ if(silenceTimer) clearTimeout(silenceTimer); silenceTimer=setTimeout(()=>rec.stop(),2000); }
    rec.onstart=resetSilence;
    rec.onresult=e=>{
      resetSilence();
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) accumulated+=e.results[i][0].transcript+" ";
      }
    };
    rec.onend=()=>{
      if(silenceTimer) clearTimeout(silenceTimer);
      const cmd=accumulated.trim();
      setWakeActive(false);
      if(cmd) handleWakeCommand(cmd);
      if(wakeModeRef.current) setTimeout(()=>startWakeListener(),300);
    };
    rec.onerror=()=>{
      if(silenceTimer) clearTimeout(silenceTimer);
      setWakeActive(false);
      if(wakeModeRef.current) setTimeout(()=>startWakeListener(),1000);
    };
    try{ rec.start(); }catch{}
  }

  function handleWakeCommand(cmd){
    setInputText(cmd);
    if(onShowPanel) onShowPanel();
    setWakeActive(false);
    setTimeout(()=>runAI(cmd),150);
  }

  async function runAI(text){
    const t=(text||"").trim();
    if(!t) return;
    setAiLoading(true); setAiError("");
    const today=todayStr();
    const tomorrow=addDays(today,1);
    const d2=addDays(today,2);
    const winList=windows.map(w=>`- id:"${w.id}", label:"${w.label}", typ:"${w.typ}", soll:${w.sollStart}-${w.sollEnde}`).join("\n");
    const catList=(categories||DEFAULT_CATEGORIES).map(c=>`${c.id}:${c.label}`).join(", ");
    const personsList=(persons||[]).join(", ");
    const sys=`Du bist Hans, ein KI-Sprachassistent fuer eine Tagesplaner-App. Heute: ${today}, morgen: ${tomorrow}, uebermorgen: ${d2}.
Aktive Person: ${activePerson}. Bekannte Nutzer: ${personsList}.
Zeitfenster fuer ${activePerson}:\n${winList}
Verfuegbare Kategorien: ${catList}

Antworte AUSSCHLIESSLICH mit einem gueltigen JSON-Objekt. Kein Text davor oder danach. Kein Markdown.

Verfuegbare Typen:
- Tagesroutine: {"type":"routine","windows":{"<id>":{"istStart":"HH:MM","istEnde":"HH:MM","stars":<1-5>,"aktivitaeten":[{"id":"neu","label":"<name>","start":"HH:MM","ende":"HH:MM","stars":<1-5>,"kategorie":"<kat-id>"}]}}}
- Kalendertermin: {"type":"calendar","event":{"title":"<titel>","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","person":"<name>"}}
- Neuer Nutzer: {"type":"newuser","name":"<name>"}
- Einkaufsliste: {"type":"shopping","items":[{"text":"<artikel>","qty":"<menge oder leer>"}]}
- Todo erstellen: {"type":"todo_add","label":"<aufgabe>","todoTyp":"regel|sonder","intervalDays":<zahl>,"prio":"hoch|mittel|gering","assignedTo":"<person>"}
- Todo abhaken: {"type":"todo_check","label":"<name>"}
- Rezept speichern: {"type":"recipe_add","title":"<name>","portionen":<zahl>,"zutaten":[{"id":"z1","name":"<zutat>","menge":"<menge>"}],"makrosProPortion":{"kcal":<zahl>,"protein":<g>,"carbs":<g>,"fett":<g>}}
- Mahlzeit: {"type":"nutrition","subtype":"meal","meal":{"zeit":"HH:MM","name":"<name>","kcal":<zahl>,"protein":<g>,"carbs":<g>,"fett":<g>}}
- Wasser: {"type":"nutrition","subtype":"water","ml":<zahl>}
- Fehlende Info: {"type":"clarification_needed","question":"<konkrete Rueckfrage auf Deutsch>","partial":{"title":"...","date":"...","startTime":"..."}}

REGELN:
1. Datum IMMER YYYY-MM-DD. heute=${today}, morgen=${tomorrow}, uebermorgen=${d2}
2. Uhrzeiten IMMER HH:MM (17 Uhr = 17:00, 5 Uhr nachmittags = 17:00)
3. Kalendertermin: Wenn Titel ODER Datum fehlen -> clarification_needed mit gezielter Frage
4. Kalendertermin: Wenn nur Uhrzeit fehlt -> trotzdem calendar (startTime weglassen)
5. stars: super/toll/perfekt=5, gut=4, okay/ok=3, schlecht=2, sehr schlecht/miserabel=1
6. kategorie aus Kontext: Fussball/Laufen/Sport->sport, Schlafen/Pause->erholung, Essen/Kochen->ernaehr, Lernen/Meeting->arbeit`;
    try{
      const res=await anthropicFetch(apiKey,{model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:t}]});
      if(!res.ok){
        const errData=await res.json().catch(()=>({}));
        throw new Error("API "+res.status+": "+(errData?.error?.message||"Unbekannter Fehler"));
      }
      const data=await res.json();
      const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
      const cleaned=raw.replace(/^```json\s*/,"").replace(/\s*```$/,"").replace(/^```\s*/,"").trim();
      const parsed=JSON.parse(cleaned);

      if(parsed.type==="clarification_needed"&&parsed.question){
        setClarification({question:parsed.question,partial:parsed.partial||{}});
        speak(parsed.question);
        setAiLoading(false);
        return;
      }
      if(parsed.windows){
        for(const wd of Object.values(parsed.windows)){
          if(wd.aktivitaeten) wd.aktivitaeten=wd.aktivitaeten.map(a=>({...a,id:uid()}));
        }
      }
      if(parsed.type==="calendar"&&onAddCalEvent){
        const ev=parsed.event||{};
        if(!ev.title||!ev.date){
          const q=!ev.title?"Wie soll der Termin heissen?":"Fuer welches Datum soll der Termin sein?";
          setClarification({question:q,partial:ev}); speak(q); setAiLoading(false); return;
        }
        await onAddCalEvent({id:"app_"+uid(),...ev,isApp:true});
        const dateLabel=formatDate(ev.date,{day:"2-digit",month:"long"});
        const msg="Termin "+ev.title+" am "+dateLabel+(ev.startTime?" um "+ev.startTime:"")+" eingetragen.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),3500);
      }
      else if(parsed.type==="todo_add"&&parsed.label&&onAddTodo){
        await onAddTodo({label:parsed.label,todoTyp:parsed.todoTyp||"sonder",intervalDays:parsed.intervalDays||7,assignedTo:parsed.assignedTo||activePerson,prio:parsed.prio||"hoch"});
        const msg="Todo "+parsed.label+" erstellt.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else if(parsed.type==="todo_check"&&parsed.label&&onCheckTodo){
        await onCheckTodo(parsed.label);
        const msg=parsed.label+" abgehakt.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else if(parsed.type==="recipe_add"&&parsed.title&&onAddRecipe){
        const recipe={id:"rec_"+uid(),title:parsed.title,portionen:parsed.portionen||1,zutaten:parsed.zutaten||[],makrosProPortion:parsed.makrosProPortion||{kcal:0,protein:0,carbs:0,fett:0},createdAt:todayStr()};
        await onAddRecipe(recipe);
        const msg="Rezept "+parsed.title+" gespeichert.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else if(parsed.type==="nutrition"&&onAddNutrition){
        if(parsed.subtype==="meal"&&parsed.meal?.name){
          await onAddNutrition("meal",parsed.meal);
          const msg=parsed.meal.name+(parsed.meal.kcal?" ("+parsed.meal.kcal+" kcal)":"")+" eingetragen.";
          setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
          setTimeout(()=>setSaveMsg(""),2500);
        } else if(parsed.subtype==="water"&&parsed.ml){
          await onAddNutrition("water",{ml:parsed.ml});
          const msg=parsed.ml+" Milliliter Wasser eingetragen.";
          setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
          setTimeout(()=>setSaveMsg(""),2500);
        } else { setAiError("Ernaehrungseintrag unvollstaendig."); }
      }
      else if(parsed.type==="shopping"&&parsed.items?.length&&onAddShoppingItems){
        for(const item of parsed.items) await onAddShoppingItems(item);
        const msg=parsed.items.length+" Artikel zur Einkaufsliste hinzugefuegt.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else if(parsed.type==="newuser"&&parsed.name&&onAddPerson){
        await onAddPerson(parsed.name);
        const msg="Nutzer "+parsed.name+" hinzugefuegt.";
        setSaveMsg("✓ "+msg); speak(msg); setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else if(parsed.type==="routine"||parsed.windows){
        await onSave(parsed);
        setSaveMsg("✓ Eingetragen."); speak("Eingetragen.");
        setInputText(""); setClarification(null);
        setTimeout(()=>setSaveMsg(""),2500);
      }
      else { setAiError("Befehl nicht erkannt. Bitte nochmal versuchen."); }
    }catch(e){
      console.error("KI-Fehler:",e);
      setAiError("Fehler: "+(e.message||"Bitte nochmal versuchen."));
    }
    setAiLoading(false);
  }

  async function handleSubmit(){
    if(!inputText.trim()||aiLoading) return;
    if(clarification){
      const fullText="Vorherige Angaben: "+JSON.stringify(clarification.partial||{})+". Antwort auf '"+clarification.question+"': "+inputText.trim();
      setClarification(null);
      await runAI(fullText);
    } else {
      await runAI(inputText.trim());
    }
  }

  return(
    <div style={{background:"transparent",marginBottom:8}}>
      <div style={{fontSize:9,letterSpacing:1.5,color:"#bbb",textTransform:"uppercase",marginBottom:7,display:"flex",alignItems:"center",gap:4}}>
        {activePerson} · {formatDate(activeDate,{day:"2-digit",month:"2-digit"})}
        {saveMsg&&<span style={{color:"#27ae60",marginLeft:4}}>✓</span>}
        {aiError&&<span style={{color:"#e74c3c",marginLeft:4}}>✗</span>}
      </div>
      {clarification&&(
        <div style={{background:"#f3e5f5",borderRadius:7,padding:"8px 10px",marginBottom:8,border:"1px solid #ce93d8",display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{fontSize:16,lineHeight:1}}>&#129300;</span>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"#6a1b9a",marginBottom:2}}>Hans fragt:</div>
            <div style={{fontSize:12,color:"#333",lineHeight:1.4}}>{clarification.question}</div>
          </div>
          <button onClick={()=>setClarification(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:14,padding:0,lineHeight:1,flexShrink:0}}>&#10005;</button>
        </div>
      )}
      <textarea value={inputText} onChange={e=>setInputText(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); handleSubmit(); } }}
        placeholder={clarification?"Antwort eingeben oder sprechen...":"z.B. Heute Nacht 23:15-6:50 geschlafen super 5 Sterne. Morgenblock: 7:00-7:30 Fruehstueck..."}
        style={{width:"100%",minHeight:60,border:"1.5px solid "+(clarification?"#ce93d8":"#e4dfd8"),
          background:"rgba(255,255,255,0.80)",borderRadius:12,padding:"8px 10px",
          fontFamily:"Georgia,serif",fontSize:12,color:"#222",resize:"vertical",
          outline:"none",lineHeight:1.6,boxSizing:"border-box",
          boxShadow:"inset 0 1px 3px rgba(0,0,0,.06)"}}/>
      <div style={{display:"flex",gap:6,marginTop:7,alignItems:"center",flexWrap:"wrap",position:"relative"}}>
        <button onClick={toggleListening} title="Einmal sprechen"
          style={{width:32,height:32,borderRadius:"50%",border:"none",cursor:"pointer",
            background:listening?"#c0392b":"#f0ede8",color:listening?"#fff":"#555",
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:listening?"0 0 0 3px rgba(192,57,43,.3)":"none",transition:"all .2s"}}>
          <MicIcon/>
        </button>
        <button onClick={toggleWakeMode} title="Signalwort: hans bitte (bleibt aktiv wenn Panel minimiert)"
          style={{padding:"4px 10px",borderRadius:20,border:"1.5px solid "+(wakeMode?"#8e44ad":"#ddd"),cursor:"pointer",
            background:wakeMode?(wakeActive?"#6a1b9a":"#8e44ad"):"#fff",
            color:wakeMode?"#fff":"#888",fontSize:9,fontFamily:"Georgia,serif",
            boxShadow:wakeActive?"0 0 0 4px rgba(142,68,173,.35)":"none",transition:"all .2s"}}>
          {wakeActive?"&#9679; Hoere zu&#8230;":wakeMode?"Hans aktiv":"Hans, bitte"}
        </button>
        <button onClick={()=>{ const n=!speechOn; setSpeechOn(n); saveSpeechPref("speechOn",n?"1":"0"); if(n) speak("Sprachausgabe aktiviert."); }}
          title="Hans spricht"
          style={{padding:"4px 8px",borderRadius:20,border:"1.5px solid "+(speechOn?"#27ae60":"#ddd"),cursor:"pointer",
            background:speechOn?"#27ae60":"#fff",color:speechOn?"#fff":"#888",fontSize:9,fontFamily:"Georgia,serif",transition:"all .2s"}}>
          &#128266;
        </button>
        {speechOn&&(
          <button onClick={()=>setShowSpeechSettings(s=>!s)}
            style={{padding:"4px 6px",borderRadius:20,border:"1.5px solid #ddd",cursor:"pointer",background:showSpeechSettings?"#eee":"#fff",color:"#888",fontSize:9}}>&#9881;</button>
        )}
        {listening&&<span style={{fontSize:10,color:"#c0392b",fontWeight:600}}>&#9679; Aufnahme&#8230;</span>}
        {wakeActive&&!listening&&<span style={{fontSize:10,color:"#8e44ad",fontWeight:600}}>&#9679; Befehl&#8230;</span>}
        {aiLoading&&<span style={{fontSize:10,color:accent,fontWeight:600}}>KI denkt&#8230;</span>}
        {showSpeechSettings&&speechOn&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"10px 12px",zIndex:100,marginTop:4,boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:8}}>Spracheinstellungen</div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:9,color:"#888",marginBottom:3}}>Stimme</div>
              <select value={voiceURI} onChange={e=>{ setVoiceURI(e.target.value); saveSpeechPref("voiceURI",e.target.value); }}
                style={{width:"100%",fontSize:10,padding:"3px 6px",border:"1px solid #ddd",borderRadius:4,fontFamily:"Georgia,serif"}}>
                <option value="">Standard</option>
                {voices.filter(v=>v.lang.startsWith("de")||v.lang.startsWith("en")).map(v=>(
                  <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>
                ))}
              </select>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:9,color:"#888",marginBottom:2}}>Tonhoehe: {speechPitch.toFixed(1)}</div>
              <input type="range" min="0.5" max="2" step="0.1" value={speechPitch}
                onChange={e=>{ const v=parseFloat(e.target.value); setSpeechPitch(v); saveSpeechPref("speechPitch",v); }} style={{width:"100%"}}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:"#888",marginBottom:2}}>Geschwindigkeit: {speechRate.toFixed(1)}</div>
              <input type="range" min="0.5" max="2" step="0.1" value={speechRate}
                onChange={e=>{ const v=parseFloat(e.target.value); setSpeechRate(v); saveSpeechPref("speechRate",v); }} style={{width:"100%"}}/>
            </div>
            <button onClick={()=>speak("Hallo, ich bin Hans. Wie klingt das?")}
              style={{padding:"4px 12px",borderRadius:20,border:"none",background:"#27ae60",color:"#fff",fontSize:10,cursor:"pointer",fontFamily:"Georgia,serif"}}>Test &#128266;</button>
          </div>
        )}
        <div style={{flex:1}}/>
        <button onClick={handleSubmit} disabled={!inputText.trim()||aiLoading}
          style={{padding:"6px 16px",borderRadius:30,border:"none",
            cursor:(inputText.trim()&&!aiLoading)?"pointer":"default",
            background:(inputText.trim()&&!aiLoading)?accent:"#ddd",
            color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,transition:"background .2s"}}>
          {aiLoading?"&#8230;":(clarification?"Antworten":"Eintragen")}
        </button>
      </div>
      {aiError&&<div style={{fontSize:10,color:"#c0392b",marginTop:5,lineHeight:1.4}}>{aiError}</div>}
      {saveMsg&&<div style={{textAlign:"center",fontSize:11,color:"#27ae60",marginTop:5,fontWeight:700}}>{saveMsg}</div>}
    </div>
  );
}

function PersonsTab({persons,onSave,personColors,onPersonColorChange}){
  const [local,setLocal]=useState([...persons]);
  const [editing,setEditing]=useState(null);
  const [editName,setEditName]=useState("");
  const [newName,setNewName]=useState("");
  const [msg,setMsg]=useState("");
  function startEdit(i){setEditing(i);setEditName(local[i]);}
  function confirmEdit(){const t=editName.trim();if(!t||(local.includes(t)&&t!==local[editing])){setMsg("Name vergeben.");return;}const u=[...local];u[editing]=t;setLocal(u);setEditing(null);setMsg("");}
  function add(){const t=newName.trim();if(!t)return;if(local.includes(t)){setMsg("Bereits vorhanden.");return;}setLocal([...local,t]);setNewName("");setMsg("");}
  function remove(i){if(local.length<=1){setMsg("Mind. eine Person.");return;}const u=[...local];u.splice(i,1);setLocal(u);}
  return(
    <div>
      {local.map((p,i)=>{
        const col=(personColors&&personColors[p])||PERSON_ACCENT_POOL[i%PERSON_ACCENT_POOL.length];
        return(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,background:"#f9f7f3",borderRadius:8,padding:"7px 10px"}}>
          {/* Farbkreis */}
          <label style={{cursor:"pointer",flexShrink:0}} title="Farbe ändern">
            <input type="color" value={col} onChange={e=>onPersonColorChange&&onPersonColorChange(p,e.target.value)}
              style={{width:0,height:0,opacity:0,position:"absolute",pointerEvents:"none"}} id={"cp-"+p}/>
            <div onClick={()=>document.getElementById("cp-"+p).click()}
              style={{width:18,height:18,borderRadius:"50%",background:col,border:"2px solid rgba(0,0,0,.15)",cursor:"pointer"}}/>
          </label>
          {editing===i?(
            <>
              <input value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmEdit()} autoFocus
                style={{flex:1,border:"1px solid #ddd",borderRadius:6,padding:"4px 8px",fontFamily:"Georgia,serif",fontSize:13,outline:"none"}}/>
              <button onClick={confirmEdit} style={{padding:"4px 10px",borderRadius:20,border:"none",background:"#27ae60",color:"#fff",cursor:"pointer",fontSize:11}}>OK</button>
              <button onClick={()=>setEditing(null)} style={{padding:"4px 8px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:11,color:"#888"}}>X</button>
            </>
          ):(
            <>
              <span style={{flex:1,fontSize:14,color:"#222"}}>{p}</span>
              <button onClick={()=>startEdit(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#888",padding:4}}><EditIcon/></button>
              <button onClick={()=>remove(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:4}}><TrashIcon/></button>
            </>
          )}
        </div>
        );
      })}
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Neuer Name..."
          style={{flex:1,border:"1px solid #ddd",borderRadius:8,padding:"7px 10px",fontFamily:"Georgia,serif",fontSize:13,outline:"none"}}/>
        <button onClick={add} style={{padding:"7px 12px",borderRadius:8,border:"none",background:"#111",color:"#fff",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center"}}><PlusIcon/></button>
      </div>
      {msg&&<div style={{fontSize:11,color:"#c0392b",marginTop:8}}>{msg}</div>}
      <button onClick={()=>onSave(local)} style={{width:"100%",padding:"9px 0",borderRadius:30,border:"none",background:"#111",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff",marginTop:14}}>Speichern</button>
    </div>
  );
}

function ApiKeyTab({apiKey,onSave}){
  const [key,setKey]=useState(apiKey||"");
  const [show,setShow]=useState(false);
  const [msg,setMsg]=useState("");
  function save(){
    const k=key.trim();
    if(!k){setMsg("Bitte Key eingeben.");return;}
    onSave(k);
    setMsg("✓ Gespeichert.");
    setTimeout(()=>setMsg(""),2000);
  }
  return(
    <div>
      <div style={{fontSize:12,color:"#666",marginBottom:14,lineHeight:1.7}}>
        Trage hier deinen <strong>Anthropic API-Key</strong> ein. Er wird lokal gespeichert und
        nie weitergegeben. Erhältlich unter{" "}
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" style={{color:"#c0392b"}}>console.anthropic.com</a>.
      </div>
      <div style={{position:"relative",marginBottom:10}}>

// Versuch 1: Marktguru API direkt
async function searchViaMarktguru(query, zipCode){
  try{
    const url = "https://api.marktguru.de/api/v1/offers/search?as=web&limit=8&offset=0&q="
      + encodeURIComponent(query) + "&zipCode=" + encodeURIComponent(zipCode);
    const res = await fetch(url, {
      headers:{"x-clientkey":MG_CLIENT,"x-apikey":MG_API},
    });
    if(!res.ok) return null;
    const data = await res.json();
    const results = (data.results||[]).filter(r=>r.price);
    if(!results.length) return null;
    const best = results.reduce((a,b)=>parseFloat(a.price)<parseFloat(b.price)?a:b);
    // Preis pro Einheit (z.B. "1,23 EUR/kg") aus Marktguru
    const pricePerUnit = best.pricePerUnit
      ? best.pricePerUnit+(best.pricePerUnitUnit?" "+best.pricePerUnitUnit:"")
      : (best.basicPrice||null);
    return {
      price: best.price+(best.unit?" /"+best.unit:""),
      shop:  best.advertisers?.[0]?.name||"",
      pricePerUnit: pricePerUnit||null,
      source:"marktguru",
    };
  }catch(e){ return null; }
}

// Versuch 2: KI + Web Search als Fallback
async function searchViaKI(query, zipCode, radius, apiKey){
  try{
    const res = await anthropicFetch(apiKey,{
        model:"claude-sonnet-4-6", max_tokens:400,
        system:"Suche den aktuellen guenstigsten Supermarkt-Preis. Antworte NUR mit JSON ohne Backticks. Felder: price (Preis als String z.B. 1.99 EUR), shop (Shopname), pricePerUnit (Grundpreis pro kg/l als String z.B. 4.99 EUR/kg, oder null), found (boolean).",
        messages:[{role:"user",content:"Guenstigster Preis fuer "+query+" in PLZ "+zipCode+" Umkreis "+(radius||5)+"km. Suche Lidl, Aldi, Rewe, Kaufland, Netto, Edeka."}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    if(!text) return null;
    const clean = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    if(!parsed.found) return null;
    return {price:parsed.price, shop:parsed.shop, pricePerUnit:parsed.pricePerUnit||null, source:"ki"};
  }catch(e){ return null; }
}

// Hauptfunktion: Marktguru zuerst, dann KI
async function searchPriceViaKI(product, brand, zipCode, radius, apiKey){
  const query = brand ? brand+" "+product : product;
  // Versuch 1: Marktguru (schnell, strukturiert)
  const mg = await searchViaMarktguru(query, zipCode);
  if(mg) return mg;
  // Versuch 2: KI + Web Search (Fallback)
  return await searchViaKI(query, zipCode, radius, apiKey);
}

  const PRIO_ORDER={hoch:0,mittel:1,gering:2};
  const PERSON_COLORS=["#c0392b","#2471a3","#27ae60","#8e44ad","#e67e22","#16a085"];
  function pColor(n){ return PERSON_COLORS[persons.indexOf(n)%PERSON_COLORS.length]||"#888"; }

    return list
      .filter(t=>!filterPrio||filterPrio==="alle"||t.prio===filterPrio)
      .filter(t=>!filterPerson||filterPerson==="alle"||!t.assignedTo||t.assignedTo===filterPerson);
  }

  const todoItems = applyFilters((todos||[]).filter(t=>{

    if(t.typ==="sonder") return true;
    if(t.typ==="regel") return t.dueDate && t.dueDate<=todayStr();

    if(aD!==bD) return aD.localeCompare(bD);
    return (PRIO_ORDER[a.prio||"gering"]||2)-(PRIO_ORDER[b.prio||"gering"]||2);
  });

  // Wiederkehrend: nur regel-Items die NOCH NICHT fällig sind
  const regelItems = applyFilters((todos||[]).filter(t=>
    t.typ==="regel" && !(t.dueDate && t.dueDate<=todayStr())
  )).sort((a,b)=>{
    const aD=a.dueDate||"9999-99-99", bD=b.dueDate||"9999-99-99";
    if(aD!==bD) return aD.localeCompare(bD);
    return (PRIO_ORDER[a.prio||"gering"]||2)-(PRIO_ORDER[b.prio||"gering"]||2);
  });

  const erledigtItems = applyFilters((todos||[]).filter(t=>t.typ==="erledigt"))
    .sort((a,b)=>(b.doneAt||"").localeCompare(a.doneAt||""));

  function addItem(){
