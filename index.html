      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
        {children}
      </div>
    </button>
  );
}

// --- CIRCLE PROGRESS (Ernährung) ---
function CircleProgress({ pct, color, label, valueStr }) {
  var r = 19;
  var circ = +(2 * Math.PI * r).toFixed(2);
  var offset = +(circ - (pct / 100) * circ).toFixed(2);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <div style={{position:"relative",width:48,height:48}}>
        <svg width="48" height="48" viewBox="0 0 48 48">
          <g>
            <circle cx="24" cy="24" r={r} fill="none" stroke="rgba(0,0,0,0.12)" strokeWidth="4"/>
            <circle cx="24" cy="24" r={r} fill="none" stroke={color} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={offset}
              strokeLinecap="round" transform="rotate(-90 24 24)"/>
          </g>
        </svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center",pointerEvents:"none"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#111",lineHeight:1}}>{pct}%</div>
        </div>
      </div>
      <div style={{fontSize:8,color:color,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{label}</div>
      <div style={{fontSize:9,color:"#555"}}>{valueStr}</div>
    </div>
  );
}

// --- DASHBOARD VIEW ---
function DashboardView(props) {
  var todos         = props.todos        || [];
  var shoppingList  = props.shoppingList || [];
  var nutritionData = props.nutritionData|| {};
  var entries       = props.entries      || {};
  var persons       = props.persons      || [];
  var activePerson  = props.activePerson;
  var activeDate    = props.activeDate;
  var onNavigate    = props.onNavigate;
  var onOpenSettings= props.onOpenSettings;
  var personProfiles= props.personProfiles || {};
  var gcalEvents    = props.gcalEvents   || {};
  var appEvents     = props.appEvents    || [];
  var accent        = props.accent       || "#c0392b";
  var recipes       = props.recipes      || [];
  var routineWindows2   = props.routineWindows2   || {};
  var routineEntries    = props.routineEntries    || {};
  var routineActivities = props.routineActivities || [];

  var today   = new Date();
  var dayName = today.toLocaleDateString("de-DE", {weekday:"long"});
  var dateStr = today.toLocaleDateString("de-DE", {day:"2-digit", month:"long"});

  // --- Kalender: heutige Termine sortiert, upcoming first ---
  var gcalToday = gcalEvents[activeDate] || [];
  var appToday  = appEvents.filter(function(e){ return e.date===activeDate; });
  var allEvents = gcalToday.concat(appToday);
  var nowH = today.getHours() + today.getMinutes()/60;
  var sortedEvents = allEvents.slice().sort(function(a,b){
    var ta = a.startTime ? parseTime(a.startTime) : isoToH(a.start&&a.start.dateTime);
    var tb = b.startTime ? parseTime(b.startTime) : isoToH(b.start&&b.start.dateTime);
    return (ta||0)-(tb||0);
  });
  var upcomingEvents = sortedEvents.filter(function(e){
    var t = e.startTime ? parseTime(e.startTime) : isoToH(e.start&&e.start.dateTime);
    return t===null||t>=nowH;
  });
  var showEvents = upcomingEvents.slice(0,3);

  // --- Einkaufsliste ---
  // Nur Artikel anzeigen, die tatsächlich in der aktiven Liste sind:
  // nicht erledigt UND (kein Wiederkehrender ODER Wiederkehrender ist fällig)
  var openItems = shoppingList.filter(function(i){
    if(i.done) return false;
    if(!i.recurring) return true;
    var diff = i.nextDue ? (new Date(i.nextDue+"T12:00:00") - new Date()) / (1000*60*60*24) : -1;
    return diff <= 0;
  });
  var showItems = openItems.slice(0,5);

  // --- Todos (aktive Person, offen) ---
  var openTodos = todos.filter(function(t){
    if(t.typ==="erledigt") return false;
    if(t.assignedTo && t.assignedTo!==activePerson) return false;
    if(t.typ==="sonder") return true;
    if(t.typ==="regel") return t.dueDate && t.dueDate<=activeDate;
    return false;
  }).sort(function(a,b){
    var aD=a.frist||a.dueDate||"9999-99-99", bD=b.frist||b.dueDate||"9999-99-99";
    if(aD!==bD) return aD.localeCompare(bD);
    var PO={hoch:0,mittel:1,gering:2};
    return (PO[a.prio||"gering"]||2)-(PO[b.prio||"gering"]||2);
  });
  var showTodos = openTodos.slice(0,4);

  // --- Routine (Aktivitäten heute) ---
  var dayEntry = entries[activePerson+"|"+activeDate] || {windows:{}};
  var allAkts = [];
  Object.values(dayEntry.windows||{}).forEach(function(w){ (w.aktivitaeten||[]).forEach(function(a){ allAkts.push(a); }); });
  var showAkts = allAkts.slice().sort(function(a,b){ return (parseTime(a.start)||0)-(parseTime(b.start)||0); }).slice(0,3);

  // --- Routine 2.0 (neues Feature) ---
  var r2Windows = routineWindows2[activePerson] || [];
  var r2Day = routineEntries[r2EntryKey(activePerson,activeDate)] || {windows:{}};
  var r2Open = r2Windows.filter(function(w){ var d=r2Day.windows[w.id]; return !d||d.status==="offen"; }).slice(0,3);
  var r2DoneCount = r2Windows.filter(function(w){ var d=r2Day.windows[w.id]; return d&&d.status==="erledigt"; }).length;

  // --- Ernährung ---
  var nutrDay     = nutritionData[activePerson+"|"+activeDate] || {wasser:0, mahlzeiten:[]};
  var eaten       = (nutrDay.mahlzeiten||[]).reduce(function(s,m){ return s+(m.kcal||0); }, 0);
  var drank       = nutrDay.wasser || 0;
  var profile     = personProfiles[activePerson] || null;
  var tdeeForDash  = (profile && profile.aktivitaetsModus==="multiplikator")
    ? (computeKcalTarget(profile, profile.aktivitaetsFaktor)||2000)
    : (computeBMRBase(profile)||2000);
  var dashMacros  = computeMacroTargets(profile, tdeeForDash);
  var kcalTarget  = dashMacros.kcal;
  var waterTarget = dashMacros.water;
  var kcalPct     = Math.min(100, eaten>0 ? Math.round(eaten/kcalTarget*100) : 0);
  var waterPct    = Math.min(100, drank>0 ? Math.round(drank/waterTarget*100) : 0);
  var kcalVal     = eaten>0 ? (eaten+" kcal") : "—";
  var waterVal    = drank>0 ? (drank>=1000 ? (drank/1000).toFixed(1)+"L" : drank+"ml") : "—";

  return (
    <div style={{flex:1,overflowY:"auto",background:"transparent",display:"flex",flexDirection:"column",position:"relative"}}>
      {/* Header */}
      <div style={{padding:"22px 16px 12px",flexShrink:0}}>
        <div style={{fontSize:11,color:"#444",textTransform:"uppercase",letterSpacing:2,marginBottom:4,textShadow:"0 1px 3px rgba(255,255,255,0.7)"}}>{dayName}</div>
        <div style={{fontSize:24,fontWeight:700,color:"#111",lineHeight:1.2,textShadow:"0 1px 4px rgba(255,255,255,0.8)"}}>{dateStr}</div>
        <div style={{fontSize:11,color:"#555",marginTop:5,textShadow:"0 1px 3px rgba(255,255,255,0.7)"}}>{activePerson}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"4px 12px 24px",flex:1}}>

        {/* Routine (neu) */}
        <DashCard title="Routine" accentColor={accent} onClick={function(){ onNavigate("routine2"); }}>
          {r2Windows.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Noch nicht eingerichtet</div>
            : r2Open.length===0
              ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Alles erledigt ✓</div>
              : r2Open.map(function(w,i){
                  return (
                    <div key={w.id||i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                      <div style={{width:5,height:5,borderRadius:"50%",background:accent,flexShrink:0}}/>
                      <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{w.label}</div>
                      <div style={{fontSize:8,color:"#3a3a3a",flexShrink:0}}>{w.sollStart}</div>
                    </div>
                  );
                })
          }
          {r2DoneCount>0&&<div style={{fontSize:9,color:"#777",marginTop:1}}>{r2DoneCount} erledigt</div>}
        </DashCard>

        {/* Kalender */}
        <DashCard title="Kalender" accentColor="#5b8dee" onClick={function(){ onNavigate("kalender"); }}>
          {showEvents.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Keine Termine heute</div>
            : showEvents.map(function(ev,i){
                var label = ev.title||ev.summary||"Termin";
                var tStr  = ev.startTime || (ev.start&&ev.start.dateTime
                  ? new Date(ev.start.dateTime).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})
                  : "");
                return (
                  <div key={ev.id||i} style={{display:"flex",gap:5,alignItems:"flex-start",marginBottom:4}}>
                    {tStr&&<div style={{fontSize:9,color:"#5b8dee",fontWeight:700,marginTop:1,minWidth:30,flexShrink:0}}>{tStr}</div>}
                    <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
                  </div>
                );
              })
          }
          {upcomingEvents.length>3&&<div style={{fontSize:9,color:"#777",marginTop:1}}>+{upcomingEvents.length-3} weitere</div>}
        </DashCard>

        {/* To-Do */}
        <DashCard title="To-Do" accentColor="#f9c74f" onClick={function(){ onNavigate("todo"); }}>
          {showTodos.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Alles erledigt ✓</div>
            : showTodos.map(function(t,i){
                return (
                  <div key={t.id||i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <div style={{width:11,height:11,borderRadius:"50%",border:"1.5px solid #f9c74f",flexShrink:0,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {t.typ==="regel"&&<div style={{width:4,height:4,borderRadius:"50%",background:"#f9c74f"}}/>}
                    </div>
                    <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{t.label}</div>
                  </div>
                );
              })
          }
          {openTodos.length>4&&<div style={{fontSize:9,color:"#777",marginTop:1}}>+{openTodos.length-4} weitere</div>}
        </DashCard>

        {/* Einkaufen */}
        <DashCard title="Einkaufen" accentColor="#43aa8b" onClick={function(){ onNavigate("einkauf"); }}>
          {showItems.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Liste leer ✓</div>
            : showItems.map(function(item,i){
                return (
                  <div key={item.id||i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:"#43aa8b",flexShrink:0}}/>
                    <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{item.text}</div>
                    {item.qty&&<div style={{fontSize:9,color:"#777",flexShrink:0}}>{item.qty}</div>}
                  </div>
                );
              })
          }
          {openItems.length>5&&<div style={{fontSize:9,color:"#777",marginTop:1}}>+{openItems.length-5} weitere</div>}
        </DashCard>

        {/* Ernährung */}
        <DashCard title="Ernährung" accentColor="#ff6b35" onClick={function(){ onNavigate("ernaehrung"); }}>
          <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",flex:1,paddingTop:2}}>
            <CircleProgress pct={kcalPct} color="#ff6b35" label="Kcal" valueStr={kcalVal}/>
            <CircleProgress pct={waterPct} color="#4cc9f0" label="Wasser" valueStr={waterVal}/>
          </div>
        </DashCard>

        {/* Rezepte */}
        <DashCard title="Rezepte" accentColor="#e67e22" onClick={function(){ onNavigate("rezepte"); }}>
          {recipes.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Noch keine Rezepte</div>
            : recipes.slice(0,3).map(function(r,i){
                var ds=daysSince(r.lastEaten);
                var dc=ds===null?"#bbb":ds===0?"#27ae60":ds<=3?"#2980b9":ds<=7?"#e67e22":"#c0392b";
                return (
                  <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:"#e67e22",flexShrink:0}}/>
                    <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{r.title}</div>
                    <div style={{fontSize:8,color:dc,flexShrink:0,fontWeight:700}}>
                      {ds===null?"–":ds===0?"✓ heute":ds+"T"}
                    </div>
                  </div>
                );
              })
          }
          {recipes.length>3&&<div style={{fontSize:9,color:"#777",marginTop:1}}>+{recipes.length-3} weitere</div>}
        </DashCard>

        {/* Einstellungen */}
        <DashCard title="Einstellungen" accentColor="#444" onClick={function(){ onOpenSettings(); }}>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:2}}>
            {persons.map(function(p,i){
              return (
                <div key={p} style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:PERSON_ACCENT_POOL[i%PERSON_ACCENT_POOL.length],flexShrink:0}}/>
                  <div style={{fontSize:11,color:"#333"}}>{p}</div>
                </div>
              );
            })}
            <div style={{marginTop:4,fontSize:9,color:"#555"}}>⚙ Konfiguration</div>
          </div>
        </DashCard>

        {/* Routine alt */}
        <DashCard title="Routine alt" accentColor="#999" onClick={function(){ onNavigate("tag"); }}>
          {showAkts.length===0
            ? <div style={{color:"#555",fontSize:11,marginTop:2}}>Keine Einträge heute</div>
            : showAkts.map(function(a,i){
                return (
                  <div key={a.id||i} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:"#999",flexShrink:0}}/>
                    <div style={{fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{a.label}</div>
                    {a.start&&<div style={{fontSize:8,color:"#3a3a3a",flexShrink:0}}>{a.start}</div>}
                  </div>
                );
              })
          }
          {allAkts.length>3&&<div style={{fontSize:9,color:"#777",marginTop:1}}>+{allAkts.length-3} weitere</div>}
        </DashCard>

      </div>
    </div>
  );
}

const R2_PX_PER_HOUR = 64;
const R2_TOTAL_HEIGHT = (DAY_END-DAY_START)*R2_PX_PER_HOUR;
function r2TimeToY(h){ return (h-DAY_START)*R2_PX_PER_HOUR; }
function r2YToTime(y){
  var h = DAY_START + y/R2_PX_PER_HOUR;
  h = Math.round(h*12)/12; // 5-Minuten-Raster
  return Math.max(DAY_START, Math.min(DAY_END, h));
}
function r2DecToHHMM(dec){
  var h=Math.floor(dec), m=Math.round((dec-h)*60);
  if(m===60){m=0;h+=1;}
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function RoutineNeuView(props){
  var persons          = props.persons || [];
  var activePerson      = props.activePerson;
  var activeDate        = props.activeDate;
  var routineCategories = props.routineCategories || [];
  var routineActivities = props.routineActivities || [];
  var routineWindows2   = props.routineWindows2 || {};
  var routineEntries    = props.routineEntries || {};
  var onSaveCategories  = props.onSaveCategories;
  var onSaveActivities  = props.onSaveActivities;
  var onSaveWindows     = props.onSaveWindows;
  var onSaveEntry       = props.onSaveEntry;
  var accent            = props.accent || "#c0392b";

  var [tab,setTab] = React.useState("heute");
  var windows = routineWindows2[activePerson] || [];
  var dayKey  = r2EntryKey(activePerson, activeDate);
  var dayData = routineEntries[dayKey] || {windows:{}};

  function getAktForWindow(w){
    return (w.activityIds||[]).map(function(id){ return routineActivities.find(function(a){return a.id===id;}); }).filter(Boolean);
  }
  function durationH(w){
    var s=parseTime(w.sollStart), e=parseTime(w.sollEnde);
    if(s==null||e==null) return 1;
    return e>s ? e-s : (24-s+e);
  }

  return (
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",gap:4,padding:"10px 12px 4px",flexShrink:0}}>
        {[["heute","Heute"],["windows","Zeitfenster"],["akts","Aktivitäten"],["kats","Kategorien"]].map(function(t){
          return (
            <button key={t[0]} onClick={function(){setTab(t[0]);}}
              style={{flex:1,padding:"7px 4px",borderRadius:10,border:"1px solid #e0ddd8",cursor:"pointer",
                background:tab===t[0]?accent:"#f5f3ef",color:tab===t[0]?"#fff":"#555",fontSize:11,fontWeight:600}}>
              {t[1]}
            </button>
          );
        })}
      </div>

      {tab==="heute" && (
        <R2HeuteTab person={activePerson} date={activeDate} windows={windows} dayData={dayData}
          routineActivities={routineActivities} routineCategories={routineCategories}
          getAktForWindow={getAktForWindow} durationH={durationH}
          onSaveEntry={onSaveEntry} accent={accent}/>
      )}
      {tab==="windows" && (
        <R2WindowsTab persons={persons} activePerson={activePerson} routineWindows2={routineWindows2}
          routineActivities={routineActivities} onSave={onSaveWindows} accent={accent}/>
      )}
      {tab==="akts" && (
        <R2ActivitiesTab routineActivities={routineActivities} routineCategories={routineCategories}
          onSave={onSaveActivities} accent={accent}/>
      )}
      {tab==="kats" && (
        <R2CategoriesTab routineCategories={routineCategories} onSave={onSaveCategories} accent={accent}/>
      )}
    </div>
  );
}

// --- Heute-Tab: Soll/Ist Tagesausführung -------------------------------------
function R2HeuteTab(props){
  var windows = props.windows, dayData = props.dayData, person=props.person, date=props.date;
  var routineActivities=props.routineActivities, getAktForWindow=props.getAktForWindow, durationH=props.durationH;
  var onSaveEntry = props.onSaveEntry, accent=props.accent;
  var [verwerfFor,setVerwerfFor] = React.useState(null); // windowId, fuer Popup
  var [editIst,setEditIst] = React.useState(null); // windowId, fuer Bearbeiten-Modal
  var [dragWin,setDragWin] = React.useState(null);
  var dragRef = React.useRef({y0:0, start0:0});
  var trackRef = React.useRef(null);

  var sollWindows = windows.filter(function(w){ var d=dayData.windows[w.id]; return !d || d.status!=="erledigt"; });
  var istWindows  = windows.filter(function(w){ var d=dayData.windows[w.id]; return d && d.status==="erledigt"; });

  var aktivKcalSum = istWindows.reduce(function(sum,w){
    var d=dayData.windows[w.id];
    return sum + (d && d.kcalBurned ? d.kcalBurned : 0);
  },0);

  function chooseAkt(w, aktId){
    onSaveEntry(person,date,w.id,{chosenActivityId:aktId});
  }
  function abhaken(w){
    var akts = getAktForWindow(w);
    var d = dayData.windows[w.id]||{};
    var chosenId = d.chosenActivityId || (akts.length===1 ? akts[0].id : null);
    if(!chosenId) return;
    var akt = akts.find(function(a){return a.id===chosenId;}) || routineActivities.find(function(a){return a.id===chosenId;});
    var kcal = akt && akt.kcalPerHour ? Math.round(akt.kcalPerHour*durationH(w)) : 0;
    onSaveEntry(person,date,w.id,{status:"erledigt", chosenActivityId:chosenId, istStart:w.sollStart, kcalBurned:kcal});
  }
  function setVerwerfGrund(w, grund){
    onSaveEntry(person,date,w.id,{status:grund}); // "termin" | "keinelust"
    setVerwerfFor(null);
  }
  function zurueckSetzen(w){
    onSaveEntry(person,date,w.id,{status:"offen", kcalBurned:0});
    setEditIst(null);
  }
  function setIstTime(w, hhmm){
    onSaveEntry(person,date,w.id,{istStart:hhmm});
  }

  function onPointerDownIst(e,w){
    e.preventDefault();
    var d = dayData.windows[w.id]||{};
    var startDec = parseTime(d.istStart||w.sollStart) || DAY_START;
    dragRef.current = {y0:e.clientY, start0:startDec};
    setDragWin(w.id);
  }
  React.useEffect(function(){
    if(!dragWin) return;
    function move(e){
      var dy = e.clientY - dragRef.current.y0;
      var newDec = dragRef.current.start0 + dy/R2_PX_PER_HOUR;
      newDec = Math.round(newDec*12)/12;
      newDec = Math.max(DAY_START, Math.min(DAY_END, newDec));
      var w = windows.find(function(ww){return ww.id===dragWin;});
      if(w) setIstTime(w, r2DecToHHMM(newDec));
    }
    function up(){ setDragWin(null); }
    window.addEventListener("pointermove",move);
    window.addEventListener("pointerup",up);
    return function(){ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); };
  },[dragWin]);

  return (
    <div style={{padding:"6px 12px 24px"}}>
      {aktivKcalSum>0 && (
        <div style={{fontSize:11,color:"#7a5c00",background:"#faf3da",border:"1px solid #e6d9a8",borderRadius:10,padding:"6px 10px",marginBottom:10}}>
          🔥 Aktive Kalorien heute: <b>{aktivKcalSum} kcal</b>
        </div>
      )}

      <div style={{fontSize:10,letterSpacing:1.5,color:"#999",textTransform:"uppercase",marginBottom:6}}>Soll</div>
      {sollWindows.length===0 && <div style={{fontSize:11,color:"#888",marginBottom:14}}>Alles erledigt ✓</div>}
      {sollWindows.map(function(w){
        var d = dayData.windows[w.id]||{};
        var akts = getAktForWindow(w);
        var status = d.status || "offen";
        var col = R2_STATUS_COLORS[status] || R2_STATUS_COLORS.offen;
        var chosenId = d.chosenActivityId || (akts.length===1 ? akts[0].id : null);
        var chosen = akts.find(function(a){return a.id===chosenId;});
        return (
          <div key={w.id} style={{background:col.bg,border:"1px solid "+col.border,borderRadius:12,padding:"9px 11px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:akts.length?5:0}}>
              <div style={{fontSize:11,fontWeight:700,color:col.text}}>{w.label}</div>
              <div style={{fontSize:10,color:col.text,opacity:.75}}>{w.sollStart}–{w.sollEnde}</div>
            </div>
            {status==="termin" && <div style={{fontSize:11,color:col.text}}>📅 Außerordentlicher Termin</div>}
            {status==="keinelust" && <div style={{fontSize:11,color:col.text}}>✕ Keine Lust</div>}
            {status==="offen" && akts.length===0 && <div style={{fontSize:11,color:"#999"}}>Keine Aktivität zugeordnet</div>}
            {status==="offen" && akts.length>0 && (
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {akts.length>1 ? (
                  <select value={chosenId||""} onChange={function(e){chooseAkt(w,e.target.value||null);}}
                    style={{flex:1,fontSize:11,padding:"5px 6px",borderRadius:8,border:"1px solid "+col.border,background:"#fff",color:"#333"}}>
                    <option value="">– auswählen –</option>
                    {akts.map(function(a){ return <option key={a.id} value={a.id}>{a.title}</option>; })}
                  </select>
                ) : (
                  <div style={{flex:1,fontSize:12,color:"#333",fontWeight:600}}>{chosen?chosen.title:""}</div>
                )}
                <button onClick={function(){abhaken(w);}} disabled={!chosenId}
                  style={{width:30,height:30,borderRadius:"50%",border:"none",cursor:chosenId?"pointer":"default",
                    background:chosenId?"#cfe8cf":"#eee",color:chosenId?"#2d5a2d":"#bbb",fontSize:15,flexShrink:0}}>✓</button>
                <button onClick={function(){setVerwerfFor(w.id);}}
                  style={{width:30,height:30,borderRadius:"50%",border:"none",cursor:"pointer",
                    background:"#f2c9c9",color:"#7a2a2a",fontSize:13,flexShrink:0}}>✕</button>
              </div>
            )}
            {verwerfFor===w.id && (
              <div style={{marginTop:8,display:"flex",gap:6}}>
                <button onClick={function(){setVerwerfGrund(w,"termin");}}
                  style={{flex:1,fontSize:10,padding:"6px 4px",borderRadius:8,border:"1px solid #9cc4e0",background:"#c9dff0",color:"#1f4a6e",cursor:"pointer"}}>
                  Außerordentl. Termin
                </button>
                <button onClick={function(){setVerwerfGrund(w,"keinelust");}}
                  style={{flex:1,fontSize:10,padding:"6px 4px",borderRadius:8,border:"1px solid #e0a0a0",background:"#f2c9c9",color:"#7a2a2a",cursor:"pointer"}}>
                  Keine Lust
                </button>
                <button onClick={function(){setVerwerfFor(null);}}
                  style={{fontSize:10,padding:"6px 8px",borderRadius:8,border:"1px solid #ddd",background:"#fff",color:"#888",cursor:"pointer"}}>
                  Abbr.
                </button>
              </div>
            )}
          </div>
        );
      })}

      <div style={{fontSize:10,letterSpacing:1.5,color:"#999",textTransform:"uppercase",margin:"18px 0 6px"}}>Ist</div>
      {istWindows.length===0 && <div style={{fontSize:11,color:"#888",marginBottom:14}}>Noch nichts erledigt</div>}
      <div ref={trackRef} style={{position:"relative",minHeight:Math.max(60,istWindows.length*46),touchAction:"none"}}>
        {istWindows.slice().sort(function(a,b){
          var da=dayData.windows[a.id]||{}, db=dayData.windows[b.id]||{};
          return (parseTime(da.istStart||a.sollStart)||0)-(parseTime(db.istStart||b.sollStart)||0);
        }).map(function(w){
          var d = dayData.windows[w.id]||{};
          var akt = routineActivities.find(function(a){return a.id===d.chosenActivityId;});
          var col = R2_STATUS_COLORS.erledigt;
          return (
            <div key={w.id}
              onPointerDown={function(e){onPointerDownIst(e,w);}}
              onDoubleClick={function(){setEditIst(w.id);}}
              style={{background:col.bg,border:"1px solid "+col.border,borderRadius:10,padding:"7px 10px",
                marginBottom:6,cursor:"grab",display:"flex",justifyContent:"space-between",alignItems:"center",
                userSelect:"none",opacity:dragWin===w.id?0.7:1}}>
              <div style={{fontSize:11,color:col.text,fontWeight:600}}>{akt?akt.title:w.label}</div>
              <div style={{fontSize:10,color:col.text,opacity:.8}}>{d.istStart||w.sollStart}{d.kcalBurned?" · "+d.kcalBurned+" kcal":""}</div>

      {editIst && (function(){

      })()}
    </div>
  );
}

// --- Zeitfenster-Tab: Zuordnung Aktivitäten <-> Zeitfenster (pro Person) ----
function R2WindowsTab(props){
  var persons=props.persons, activePerson=props.activePerson, routineWindows2=props.routineWindows2;
  var routineActivities=props.routineActivities, onSave=props.onSave, accent=props.accent;
  var [editFor,setEditFor]=React.useState(activePerson);
  var windows = routineWindows2[editFor] || [];
  var [form,setForm] = React.useState(null); // {id?,label,sollStart,sollEnde,activityIds}

  function startNew(){ setForm({id:null,label:"",sollStart:"08:00",sollEnde:"09:00",activityIds:[]}); }
  function edit(w){ setForm({...w}); }
  function remove(id){
    var nw = windows.filter(function(w){return w.id!==id;});
    onSave({...routineWindows2,[editFor]:nw});
  }
  function save(){
    if(!form.label) return;
    var id = form.id || ("rw_"+Date.now());
    var nw = form.id ? windows.map(function(w){return w.id===id?{...form,id:id}:w;}) : windows.concat([{...form,id:id}]);
    onSave({...routineWindows2,[editFor]:nw});
    setForm(null);
  }
  function toggleAkt(aid){
    var ids = form.activityIds||[];
    setForm({...form, activityIds: ids.includes(aid)?ids.filter(function(x){return x!==aid;}):ids.concat([aid])});
  }

  return (
    <div style={{padding:"6px 12px 24px"}}>
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        {persons.map(function(p){
          return <button key={p} onClick={function(){setEditFor(p);}}
            style={{padding:"5px 10px",borderRadius:8,border:"1px solid #e0ddd8",fontSize:11,cursor:"pointer",
              background:editFor===p?accent:"#f5f3ef",color:editFor===p?"#fff":"#555"}}>{p}</button>;
        })}
      </div>
      {windows.map(function(w){
        return (
          <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,background:"#f5f3ef",borderRadius:10,padding:"8px 10px",marginBottom:6}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"#333"}}>{w.label}</div>
              <div style={{fontSize:10,color:"#888"}}>{w.sollStart}–{w.sollEnde} · {(w.activityIds||[]).length} Aktivität(en)</div>
            </div>
            <button onClick={function(){edit(w);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:"#777"}}>✎</button>
            <button onClick={function(){remove(w.id);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:"#c0392b"}}>🗑</button>
          </div>
        );
      })}
      <button onClick={startNew} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px dashed "+accent,background:"none",color:accent,fontSize:12,cursor:"pointer",marginTop:6}}>+ Zeitfenster</button>

      {form && (
        <div style={{marginTop:14,background:"#fff",border:"1px solid #e0ddd8",borderRadius:12,padding:12}}>
          <input value={form.label} onChange={function(e){setForm({...form,label:e.target.value});}} placeholder="Bezeichnung"
            style={{width:"100%",fontSize:12,padding:"7px 8px",borderRadius:8,border:"1px solid #ddd",marginBottom:8}}/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input type="time" value={form.sollStart} onChange={function(e){setForm({...form,sollStart:e.target.value});}}
              style={{flex:1,fontSize:12,padding:"7px 8px",borderRadius:8,border:"1px solid #ddd"}}/>
            <input type="time" value={form.sollEnde} onChange={function(e){setForm({...form,sollEnde:e.target.value});}}
              style={{flex:1,fontSize:12,padding:"7px 8px",borderRadius:8,border:"1px solid #ddd"}}/>
          </div>
          <div style={{fontSize:10,color:"#888",marginBottom:6}}>Aktivitäten zuordnen (mehrere möglich)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            {routineActivities.map(function(a){
              var sel = (form.activityIds||[]).includes(a.id);
              return (
                <button key={a.id} onClick={function(){toggleAkt(a.id);}}
                  style={{fontSize:10,padding:"5px 9px",borderRadius:14,border:"1px solid "+(sel?accent:"#ddd"),
                    background:sel?accent:"#f5f3ef",color:sel?"#fff":"#555",cursor:"pointer"}}>{a.title}</button>
              );
            })}
            {routineActivities.length===0 && <div style={{fontSize:10,color:"#aaa"}}>Noch keine Aktivitäten angelegt</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={save} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:accent,color:"#fff",fontSize:12,cursor:"pointer"}}>Speichern</button>
            <button onClick={function(){setForm(null);}} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #ddd",background:"#fff",color:"#777",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
          </div>
        </div>
      )}
    </div>
  );
}

  function gcalConnect(){
    // GIS Script lazy laden - erst wenn der User verbinden möchte
    // Jedes Mal neu initialisieren damit activePerson im Callback aktuell ist
    const connectPerson=activePerson;
    const s=document.createElement("script");
    s.src="https://accounts.google.com/gsi/client";
    s.onload=()=>{
      const client=window.google.accounts.oauth2.initTokenClient({
        client_id:GCAL_CLIENT_ID,
        scope:GCAL_SCOPE,
        callback:(resp)=>{
          if(resp.error){ console.error("GCal OAuth error:",resp.error); return; }
          gcalSaveToken(connectPerson,resp.access_token,resp.expires_in||3600);
          setGcalTokens(prev=>({...prev,[connectPerson]:resp.access_token}));
          // Sofort Events für diese Person laden und mergen
          setGcalLoading(true);
          gcalFetchAllEvents(resp.access_token).then(evs=>{
            gcalSaveEventsCache(connectPerson,evs);
            gcalSaveEventsToFirebase(connectPerson,evs);
            setGcalEvents(prev=>{
              // Behalte Events anderer Personen, ersetze nur diese Person
              const otherEvs={};
              Object.keys(prev).forEach(date=>{
                const filtered=(prev[date]||[]).filter(ev=>ev._person!==connectPerson);
                if(filtered.length) otherEvs[date]=filtered;
              });
              const newMap={...otherEvs};
              evs.forEach(ev=>{
                const d=(ev.start.date||ev.start.dateTime||"").slice(0,10);
                if(!d) return;
                if(!newMap[d]) newMap[d]=[];
                newMap[d].push({...ev,_person:connectPerson});
              });
              return newMap;
            });
            setGcalLoading(false);
          }).catch(e=>{ console.error("GCal post-auth:",e); setGcalLoading(false); });
        },
      });
      gcalClientRef.current=client;
      client.requestAccessToken();
    };
    // Script ggf. bereits geladen
    if(window.google?.accounts?.oauth2){
      s.onload();
    } else {
      document.head.appendChild(s);
    }
  }
  function gcalDisconnect(){

    });

  }

  // Sync: nur aktive Person; andere Personen-Events bleiben unberührt
  async function gcalRefreshAll(forceRefresh){
    const token=gcalToken||gcalGetToken(activePerson);
    if(!token){ console.warn("GCal: kein Token für",activePerson); return; }
    // Ohne Force: aus Cache laden falls vorhanden
    if(!forceRefresh){
      const cached=gcalLoadEventsCache(activePerson);
      if(cached){
        setGcalEvents(prev=>{
          const newMap={};
          Object.keys(prev).forEach(date=>{
            const filtered=(prev[date]||[]).filter(ev=>ev._person!==activePerson);
            if(filtered.length) newMap[date]=filtered;
          });
          cached.forEach(ev=>{
            const d=(ev.start.date||ev.start.dateTime||"").slice(0,10);
            if(!d) return;
            if(!newMap[d]) newMap[d]=[];
            newMap[d].push({...ev,_person:activePerson});
          });
          return newMap;
        });
        return;
      }
    }
    setGcalLoading(true);
    try{
      const events=await gcalFetchAllEvents(token);
      gcalSaveEventsCache(activePerson,events);
      gcalSaveEventsToFirebase(activePerson,events);
      setGcalEvents(prev=>{
        // Andere Personen-Events behalten, nur diese Person ersetzen
        const newMap={};
        Object.keys(prev).forEach(date=>{
          const filtered=(prev[date]||[]).filter(ev=>ev._person!==activePerson);
          if(filtered.length) newMap[date]=filtered;
        });
        events.forEach(ev=>{
          const d=(ev.start.date||ev.start.dateTime||"").slice(0,10);
          if(!d) return;
          if(!newMap[d]) newMap[d]=[];
          newMap[d].push({...ev,_person:activePerson});
        });
        return newMap;
      });
    }catch(e){
      if(e.message==="gcal_401"){
        gcalClearToken(activePerson);
        gcalClearEventsCache(activePerson);
        setGcalTokens(prev=>({...prev,[activePerson]:null}));
      }
      console.error("GCal bulk error:",e);
    }
    setGcalLoading(false);
  }

        />
      )}
      {viewMode==="todo"&&(
        <TodoView
          todos={todos}
          persons={persons}
          activePerson={activePerson}
          accent={accent}
          onSave={handleSaveTodos}
          filterPrio={todoFilterPrio}
          filterPerson={todoFilterPerson}
        />
      )}
      {viewMode==="einkauf"&&(
        <ShoppingView
          items={shoppingList}
          persons={persons}
          activePerson={activePerson}
          accent={accent}
          onAdd={handleAddShoppingItem}
          onToggle={handleToggleShoppingItem}
          onDelete={handleDeleteShoppingItem}
          onUpdate={handleUpdateShoppingItem}
          favorites={favorites}
          onSaveFavorites={async(newFavs)=>{
            setFavorites(newFavs);
            await sSet(SK.favorites,JSON.stringify(newFavs));
            await saveTs();
          }}
          externalShopTab={shopTab}
          wishlist={wishlist}
          onSaveWishlist={handleSaveWishlist}
        />
      )}
      {viewMode==="ernaehrung"&&(
        <NutritionView
          nutritionData={nutritionData}
          activePerson={activePerson}
          activeDate={activeDate}
          accent={accent}
          persons={persons}
          onSave={handleNutritionSave}
          onDateChange={setActiveDate}
          entries={entries}
          personProfiles={personProfiles}
          recipes={recipes}
          externalTab={nutritionTab}
          onMarkRecipeEaten={handleMarkRecipeEaten}
        />
      )}
      {viewMode==="rezepte"&&(
        <RecipesView
          recipes={recipes}
          onSave={handleSaveRecipes}
          onAddRecipe={handleAddRecipe}
          accent={accent}
          apiKey={apiKey}
          today={today}
          onMarkEaten={handleMarkRecipeEaten}
        />
      )}
    </div>
  );
}

    </script>
  </body>
</html>
