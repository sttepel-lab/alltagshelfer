    let item;
    if(newRecurring){
      item={id:uid(),typ:"regel",label:newLabel.trim(),intervalDays:parseInt(newInterval)||7,
            prio:newPrio,assignedTo:newAssign,
            dueDate:addDays(todayStr(),parseInt(newInterval)||7),
            createdBy:activePerson};
    } else {
      item={id:uid(),typ:"sonder",label:newLabel.trim(),assignedTo:newAssign,
            prio:newPrio,frist:newFrist||null,createdBy:activePerson,createdAt:todayStr()};
    }
    onSave([...(todos||[]),item]);
    setNewLabel(""); setNewAssign(activePerson); setNewPrio("gering");
    setNewFrist(""); setNewRecurring(false); setNewInterval("7"); setShowIntervalBox(false);
  }

  function checkItem(t){
    if(t.typ==="regel"){
      // Zurücksetzen: wieder in Wiederkehrend
      onSave((todos||[]).map(x=>x.id!==t.id?x:{...x,dueDate:addDays(todayStr(),x.intervalDays),lastDone:todayStr()}));
    } else {
      const erledigt={...t,typ:"erledigt",doneAt:todayStr()};
      onSave((todos||[]).filter(x=>x.id!==t.id).concat(erledigt));
    }
  }

  function deleteItem(id){ onSave((todos||[]).filter(t=>t.id!==id)); }

  function startEdit(t){
    setEditId(t.id); setEditLabel(t.label);
    setEditInterval(String(t.intervalDays||7));
    setEditAssign(t.assignedTo||activePerson);
    setEditPrio(t.prio||"gering");
    setEditFrist(t.frist||"");
  }

  function saveEdit(t){
    onSave((todos||[]).map(x=>{
      if(x.id!==t.id) return x;
      if(x.typ==="regel") return {...x,label:editLabel.trim()||x.label,intervalDays:parseInt(editInterval)||x.intervalDays,assignedTo:editAssign,prio:editPrio};
      return {...x,label:editLabel.trim()||x.label,assignedTo:editAssign,prio:editPrio,frist:editFrist||null};
    }));
    setEditId(null);
  }

  function dueColor(dueDate){
    const diff=(new Date(dueDate+"T12:00:00")-new Date(todayStr()+"T12:00:00"))/(1000*60*60*24);
    if(diff<=0) return "#c0392b"; if(diff<=2) return "#e67e22"; return "#27ae60";
  }
  function fristColor(frist){
    const diff=(new Date(frist+"T12:00:00")-new Date(todayStr()+"T12:00:00"))/(1000*60*60*24);
    if(diff<0) return "#c0392b"; if(diff<=3) return "#e67e22"; return "#555";
  }
  function daysUntil(d){ return d?(new Date(d+"T12:00:00")-new Date(todayStr()+"T12:00:00"))/(1000*60*60*24):999; }

  const INPUT_STYLE={padding:"5px 8px",border:"1px solid #ddd",borderRadius:5,fontFamily:"Georgia,serif",fontSize:11,background:"#fff"};
  const BTN={padding:"5px 12px",borderRadius:5,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:700};

  // Monats-Gruppierung Erledigt
  const [openMonths,setOpenMonths]=useState({});
  function toggleMonth(key){ setOpenMonths(prev=>({...prev,[key]:!prev[key]})); }
  const erledigtByMonth=erledigtItems.reduce((acc,t)=>{ const k=(t.doneAt||"").slice(0,7); if(!acc[k]) acc[k]=[]; acc[k].push(t); return acc; },{});
  const monthKeys=Object.keys(erledigtByMonth).sort((a,b)=>b.localeCompare(a));
  function monthLabel(key){ if(!key) return "Unbekannt"; const [y,m]=key.split("-"); return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString("de-DE",{month:"long",year:"numeric"}); }

  function ItemRow({t}){
    const isEdit=editId===t.id;
    const pc=PRIO_COLORS[t.prio||"gering"];
    const isRegelDue=t.typ==="regel"&&t.dueDate&&t.dueDate<=todayStr();

    function overdueBg(){
      if(t.typ!=="sonder"||!t.frist) return "#fff";
      const diff=Math.round((new Date(todayStr()+"T12:00:00")-new Date(t.frist+"T12:00:00"))/(1000*60*60*24));
      if(diff<=0) return "#fff";
      const f=Math.min(diff,10)/10;
      return `rgb(255,${Math.round(255*(1-f*0.85))},${Math.round(255*(1-f*0.85))})`;
    }

    return(
      <div style={{background:overdueBg(),borderRadius:7,marginBottom:6,border:"1px solid #ece9e4",overflow:"hidden",borderLeft:"5px solid "+(pc?.border||"#ddd")}}>
        {isEdit?(
          <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
            <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} style={{...INPUT_STYLE,width:"100%",boxSizing:"border-box"}} placeholder="Aufgabe"/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {t.typ==="regel"&&(
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10,color:"#888"}}>Alle</span>
                  <input type="number" value={editInterval} onChange={e=>setEditInterval(e.target.value)} style={{...INPUT_STYLE,width:48}} min="1"/>
                  <span style={{fontSize:10,color:"#888"}}>Tage</span>
                </div>
              )}
              <select value={editPrio} onChange={e=>setEditPrio(e.target.value)} style={{...INPUT_STYLE}}>
                <option value="hoch">🔴 Hoch</option>
                <option value="mittel">🟡 Mittel</option>
                <option value="gering">🟢 Gering</option>
              </select>
              {t.typ==="sonder"&&(
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10,color:"#888"}}>Frist:</span>
                  <input type="date" value={editFrist} onChange={e=>setEditFrist(e.target.value)} style={{...INPUT_STYLE,fontSize:10}}/>
                  {editFrist&&<button onClick={()=>setEditFrist("")} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:11}}>✕</button>}
                </div>
              )}
              <select value={editAssign} onChange={e=>setEditAssign(e.target.value)} style={{...INPUT_STYLE}}>
                {persons.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
              <button onClick={()=>saveEdit(t)} style={{...BTN,background:accent,color:"#fff"}}>✓</button>
              <button onClick={()=>setEditId(null)} style={{...BTN,background:"#eee",color:"#555"}}>✕</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px"}}>
            {t.typ!=="erledigt"&&(
              <button onClick={()=>checkItem(t)}
                style={{width:20,height:20,borderRadius:"50%",border:"2px solid "+pColor(t.assignedTo||t.createdBy),background:"#fff",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                <span style={{fontSize:10,color:pColor(t.assignedTo||t.createdBy)}}>✓</span>
              </button>
            )}
            {t.typ==="erledigt"&&<span style={{width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:13}}>✅</span>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:t.typ==="erledigt"?"#aaa":"#222",fontFamily:"Georgia,serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:t.typ==="erledigt"?"line-through":"none"}}>{t.label}</div>
              <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap",alignItems:"center"}}>
                {t.assignedTo&&<span style={{fontSize:9,color:pColor(t.assignedTo),fontWeight:700}}>{t.assignedTo}</span>}
                {t.prio&&(
                  <span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:8,background:PRIO_COLORS[t.prio]?.bg,color:PRIO_COLORS[t.prio]?.text,border:"1px solid "+PRIO_COLORS[t.prio]?.border}}>
                    {t.prio.toUpperCase()}
                  </span>
                )}
                {t.typ==="sonder"&&t.frist&&(()=>{
                  const diff=Math.round((new Date(todayStr()+"T12:00:00")-new Date(t.frist+"T12:00:00"))/(1000*60*60*24));
                  return <span style={{fontSize:9,color:fristColor(t.frist),fontWeight:600}}>📅 {diff>0?`Überfällig – ${diff}d`:diff===0?"Heute fällig":"bis "+formatDate(t.frist,{day:"2-digit",month:"2-digit"})}</span>;
                })()}
                {t.typ==="regel"&&t.dueDate&&(
                  isRegelDue
                    ? <span style={{fontSize:9,color:"#c0392b",fontWeight:700,background:"#fdecea",borderRadius:4,padding:"1px 5px"}}>⚠ Fällig</span>
                    : <span style={{fontSize:9,color:dueColor(t.dueDate),fontWeight:600}}>Fällig {formatDate(t.dueDate,{day:"2-digit",month:"2-digit"})}</span>
                )}
                {t.typ==="regel"&&<span style={{fontSize:9,color:"#aaa"}}>↺ alle {t.intervalDays}d</span>}
                {t.typ==="erledigt"&&t.doneAt&&<span style={{fontSize:9,color:"#aaa"}}>erledigt {formatDate(t.doneAt,{day:"2-digit",month:"2-digit"})}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              {t.typ!=="erledigt"&&<button onClick={()=>startEdit(t)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:13,padding:2}}>✎</button>}
              <button onClick={()=>deleteItem(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:13,padding:2}}>✕</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  const curItems = tab==="sonder"?todoItems:tab==="regel"?regelItems:erledigtItems;
  const emptyMsg = tab==="sonder"?"Keine offenen Aufgaben":tab==="regel"?"Keine wiederkehrenden Aufgaben":"Noch nichts erledigt";

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"transparent"}}>
      {/* Tabs */}
      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #ece9e4",flexShrink:0}}>
        {[["sonder","ToDo's"],["regel","Wiederkehrend"],["erledigt","Erledigt"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"8px 14px",border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:tab===v?700:400,background:tab===v?"#fff":"transparent",color:tab===v?"#111":"#aaa",borderBottom:tab===v?"2px solid #111":"none",marginBottom:-2}}>
            {l}{v==="erledigt"&&erledigtItems.length>0?` (${erledigtItems.length})`:""}
            {v==="sonder"&&todoItems.length>0?` (${todoItems.length})`:""}
          </button>
        ))}
      </div>

      {/* Neue Aufgabe – nur im ToDo's-Tab */}
      {tab==="sonder"&&(
        <div style={{background:"#fff",borderBottom:"1px solid #ece9e4",padding:"8px 12px",flexShrink:0}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <input value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addItem()}
              placeholder="Neue Aufgabe…"
              style={{...INPUT_STYLE,flex:1,minWidth:120}}/>
            <select value={newPrio} onChange={e=>setNewPrio(e.target.value)} style={{...INPUT_STYLE}}>
              <option value="hoch">🔴 Hoch</option>
              <option value="mittel">🟡 Mittel</option>
              <option value="gering">🟢 Gering</option>
            </select>
            {!newRecurring&&(
              <input type="date" value={newFrist} onChange={e=>setNewFrist(e.target.value)}
                title="Frist (optional)" style={{...INPUT_STYLE,fontSize:10}}/>
            )}
            <select value={newAssign} onChange={e=>setNewAssign(e.target.value)} style={{...INPUT_STYLE}}>
              {persons.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center",flexWrap:"wrap"}}>
            {/* Wiederkehrend-Checkbox */}
            <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:11,color:"#555"}}>
              <div onClick={()=>{setNewRecurring(v=>!v);setShowIntervalBox(v=>!v);}}
                style={{width:18,height:18,borderRadius:4,border:"2px solid "+(newRecurring?accent:"#ccc"),background:newRecurring?accent:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.15s",flexShrink:0}}>
                {newRecurring&&<span style={{color:"#fff",fontSize:11,lineHeight:1}}>✓</span>}
              </div>
              ↺ Wiederkehrend
            </label>
            {showIntervalBox&&(
              <div style={{display:"flex",alignItems:"center",gap:4,background:"#f5f3ef",borderRadius:6,padding:"3px 8px",border:"1px solid #ece9e4"}}>
                <span style={{fontSize:10,color:"#888"}}>Alle</span>
                <input type="number" value={newInterval} onChange={e=>setNewInterval(e.target.value)} min="1"
                  style={{...INPUT_STYLE,width:48,padding:"3px 6px"}}/>
                <span style={{fontSize:10,color:"#888"}}>Tage</span>
              </div>
            )}
            <button onClick={addItem} style={{...BTN,background:accent,color:"#fff",marginLeft:"auto"}}>+ Hinzufügen</button>
          </div>
        </div>
      )}

      {/* Liste */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {tab!=="erledigt"&&(
          curItems.length===0
            ? <div style={{textAlign:"center",color:"#bbb",fontSize:11,marginTop:30,fontFamily:"Georgia,serif"}}>{emptyMsg}</div>
            : curItems.map(t=><ItemRow key={t.id} t={t}/>)
        )}
        {tab==="erledigt"&&(
          erledigtItems.length===0
            ? <div style={{textAlign:"center",color:"#bbb",fontSize:11,marginTop:30,fontFamily:"Georgia,serif"}}>Noch nichts erledigt</div>
            : <React.Fragment>
                {monthKeys.map(key=>{
                  const isOpen=openMonths[key]!==false;
                  return(
                    <div key={key} style={{marginBottom:8}}>
                      <button onClick={()=>toggleMonth(key)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:"#ece9e4",border:"none",borderRadius:6,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:700,color:"#555"}}>
                        <span>{monthLabel(key)} <span style={{fontWeight:400,color:"#999"}}>({erledigtByMonth[key].length})</span></span>
                        <span style={{fontSize:10}}>{isOpen?"▲":"▼"}</span>
                      </button>
                      {isOpen&&erledigtByMonth[key].map(t=><ItemRow key={t.id} t={t}/>)}
                    </div>
                  );
                })}
                <button onClick={()=>onSave((todos||[]).filter(t=>t.typ!=="erledigt"))}
                  style={{display:"block",margin:"10px auto 0",padding:"5px 16px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,color:"#c0392b"}}>
                  Alle löschen
                </button>
              </React.Fragment>
        )}
      </div>
    </div>
  );
}

function ShoppingView({items,persons,activePerson,accent,onAdd,onToggle,onDelete,onUpdate,favorites,onSaveFavorites,externalShopTab,wishlist,onSaveWishlist}){
  const [shopTabInternal,setShopTabInternal] = useState("liste");
  const shopTab = externalShopTab||shopTabInternal;
  const [newText,setNewText]     = useState("");
  const [newQty,setNewQty]       = useState("");
  // PLZ + Radius settings
  const [zipCode,setZipCode]     = useState("01069");
  const [radius,setRadius]       = useState(5);
  const [editZip,setEditZip]     = useState(false);
  // Favoriten: [{id, category, brand, price, shop, checkedAt}]
  const [newCat,setNewCat]       = useState("");
  const [newBrand,setNewBrand]   = useState("");
  const [expandedCat,setExpandedCat] = useState(null);
  const [loadingId,setLoadingId] = useState(null);
  const [newRecurring,setNewRecurring] = useState(false);
  const [newInterval,setNewInterval]   = useState(7);
  const [recurrEdit,setRecurrEdit]     = useState(null);
  const [recurrDays,setRecurrDays]     = useState(7);
  const [wishText,setWishText]         = useState("");
  const [wishNote,setWishNote]         = useState("");
  const localWishlist = wishlist||[];
  function addWish(){
    const t=wishText.trim(); if(!t) return;
    onSaveWishlist&&onSaveWishlist([...localWishlist,{id:Date.now().toString(),text:t,note:wishNote.trim(),done:false,addedAt:new Date().toISOString().slice(0,10)}]);
    setWishText(""); setWishNote("");
  }
  function toggleWish(id){ onSaveWishlist&&onSaveWishlist(localWishlist.map(w=>w.id===id?{...w,done:!w.done}:w)); }
  function deleteWish(id){ onSaveWishlist&&onSaveWishlist(localWishlist.filter(w=>w.id!==id)); }
  function moveWishToCart(w){
    onAdd&&onAdd(w.text,"");
    deleteWish(w.id);
  }

  function daysUntil(dateStr){
    if(!dateStr) return 0;
    const today=new Date(); today.setHours(0,0,0,0);
    const due=new Date(dateStr); due.setHours(0,0,0,0);
    return Math.ceil((due-today)/86400000);
  }
  function nextDueDate(n){ const d=new Date(); d.setDate(d.getDate()+Number(n)); return d.toISOString().slice(0,10); }

  const PERSON_COLORS = ["#2471a3","#27ae60","#8e44ad","#e67e22","#16a085","#c0392b"];
  function pColor(name){ return PERSON_COLORS[persons.indexOf(name)%PERSON_COLORS.length]||"#888"; }

  const dueItems   = items.filter(i=>!i.done && (!i.recurring || daysUntil(i.nextDue)<=0));
  const recurItems = items.filter(i=>i.recurring && daysUntil(i.nextDue)>0)
                          .sort((a,b)=>daysUntil(a.nextDue)-daysUntil(b.nextDue));

  async function handleAdd(){
    if(!newText.trim()) return;
    const payload={text:newText.trim(), qty:newQty.trim(), addedBy:activePerson};
    if(newRecurring){ payload.recurring=true; payload.intervalDays=Number(newInterval); }
    onAdd(payload);
    setNewText(""); setNewQty(""); setNewRecurring(false); setNewInterval(7);
  }

  function handleToggleItem(item){
    if(item.recurring){ onUpdate({...item, nextDue:nextDueDate(item.intervalDays)}); }
    else { onToggle(item.id); }
  }
  function handleToggleRecurring(item){ onUpdate({...item, nextDue:nextDueDate(item.intervalDays)}); }
  function applyRecurring(item){
    if(!recurrDays||recurrDays<1) return;
    onUpdate({...item, recurring:true, intervalDays:Number(recurrDays), nextDue:nextDueDate(recurrDays)});
    setRecurrEdit(null);
  }

  // Grupiere Favoriten nach Kategorie
  const categories = [...new Set((favorites||[]).map(f=>f.category))].filter(Boolean);

  function addFavorite(){
    if(!newCat.trim()||!newBrand.trim()) return;
    const newFav = {id:uid(), category:newCat.trim(), brand:newBrand.trim(), price:null, shop:null, checkedAt:null};
    onSaveFavorites([...(favorites||[]), newFav]);
    setNewBrand("");
  }

  function deleteFavorite(id){
    onSaveFavorites((favorites||[]).filter(f=>f.id!==id));
  }

  // Ref um immer den aktuellsten Stand zu haben (vermeidet stale-closure Bug)
  const favRef = useRef(favorites);
  favRef.current = favorites;

  async function searchPrice(fav){
    setLoadingId(fav.id);
    const result = await searchPriceViaKI(fav.category, fav.brand, zipCode, radius);
    // Nur updaten wenn Ergebnis gefunden - vorhandene Preise NICHT loeschen
    const updated = favRef.current.map(f=>{
      if(f.id!==fav.id) return f;
      if(result){
        // Treffer: Preis aktualisieren
        return {...f, price:result.price, shop:result.shop, pricePerUnit:result.pricePerUnit||null, checkedAt:new Date().toISOString().slice(0,10), found:true};
      } else {
        // Kein Treffer: NUR Datum und found-Flag setzen, alten Preis behalten
        return {...f, checkedAt:new Date().toISOString().slice(0,10), found:false};
      }
    });
    onSaveFavorites(updated);
    setLoadingId(null);
  }

  async function searchAllPrices(){
    // Sequenziell suchen - favRef.current wird nach jedem Schritt aktualisiert
    for(const fav of [...(favorites||[])]){
      await searchPrice(fav);
    }
  }

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"transparent"}}>

      {/* EINKAUFSLISTE */}
      {shopTab==="liste"&&(
        <>
          <div style={{padding:"8px 12px",background:"#fff",borderBottom:"1px solid #ece9e4",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
              <span style={{fontSize:12,fontWeight:700,color:"#111",flex:1}}>Einkaufsliste</span>
              <span style={{fontSize:10,color:"#27ae60",fontWeight:600}}>{dueItems.length} offen</span>
            </div>
            <div style={{display:"flex",gap:5}}>
              <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} placeholder="Artikel hinzufuegen..."
                style={{flex:1,border:"1px solid #ddd",borderRadius:7,padding:"6px 9px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
              <input value={newQty} onChange={e=>setNewQty(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} placeholder="Menge"
                style={{width:60,border:"1px solid #ddd",borderRadius:7,padding:"6px 7px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
              <button onClick={handleAdd} style={{padding:"6px 14px",borderRadius:20,border:"none",background:accent,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>+</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5}}>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:11,color:newRecurring?"#e67e22":"#aaa",fontWeight:newRecurring?700:400}}>
                <input type="checkbox" checked={newRecurring} onChange={e=>setNewRecurring(e.target.checked)} style={{accentColor:"#e67e22",width:13,height:13,cursor:"pointer"}}/>
                &#8635; Wiederkehrend
              </label>
              {newRecurring&&(
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10,color:"#888"}}>alle</span>
                  <input type="number" min="1" max="365" value={newInterval} onChange={e=>setNewInterval(e.target.value)}
                    style={{width:44,border:"1px solid #e67e22",borderRadius:6,padding:"2px 6px",fontFamily:"Georgia,serif",fontSize:12,outline:"none",color:"#e67e22",fontWeight:700,textAlign:"center"}}/>
                  <span style={{fontSize:10,color:"#888"}}>Tage</span>
                </div>
              )}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 40px 28px 24px",padding:"4px 12px",background:"#f0ede8",borderBottom:"1px solid #e0ddd8",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1}}>ARTIKEL</div>
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1,textAlign:"center"}}>OK</div>

// --- ERNÄHRUNG & WASSER -------------------------------------------------------
const NUTRITION_DEFAULTS = { kcal:2000, water:2500, protein:150, carbs:200, fett:70 };

const MET_KEYWORDS = [
  ["schlafen",1.0],["liegen",1.0],["sitzen",1.3],["lesen",1.3],
  ["meditation",1.3],["yoga",2.5],["dehnen",2.5],["stretching",2.5],
  ["spazieren",3.5],["gehen",3.5],["wandern",4.5],
  ["einkaufen",2.5],["haushalt",3.0],["putzen",3.5],["staubsaugen",3.5],
  ["kochen",2.0],["gartenarbeit",4.0],["garten",4.0],
  ["radfahren",7.0],["fahrrad",7.0],
  ["tanzen",5.0],["joggen",8.0],["laufen",9.0],["rennen",9.5],["sprint",11.0],
  ["schwimmen",6.0],["schwimmbad",6.0],
  ["krafttraining",5.0],["hantel",5.0],["gewichte",5.0],
  ["gym",5.0],["fitness",5.0],["crossfit",8.0],["hiit",8.0],
  ["fußball",7.0],["tennis",7.0],["basketball",6.5],
  ["volleyball",4.0],["badminton",5.5],["tischtennis",4.0],
  ["klettern",7.5],["bouldern",7.5],["boxen",8.0],
  ["pilates",3.0],["aerobik",6.5],["zumba",6.0],
  ["skifahren",6.0],["snowboard",5.0],
];
const MET_CAT = {sport:5.0,erholung:1.5,arbeit:1.5,haushalt:3.0,freizeit:3.0,familie:2.5,ernaehr:1.5,gesund:2.5};
function getMET(label,kategorie){
  const lw=(label||"").toLowerCase();
  for(const [kw,met] of MET_KEYWORDS){ if(lw.includes(kw)) return met; }
  return MET_CAT[kategorie]||2.5;
}
function computeActiveFromEntries(dayEntry,weight){
  const result=[];
  for(const [,wd] of Object.entries(dayEntry?.windows||{})){
    for(const akt of (wd.aktivitaeten||[])){
      const s=parseTime(akt.start),e=parseTime(akt.ende);
      if(s===null||e===null) continue;
      const h=e-s; if(h<=0) continue;
      const met=getMET(akt.label,akt.kategorie);
      const kcal=Math.round(met*(weight||70)*h);
      result.push({id:akt.id,name:akt.label,start:akt.start,ende:akt.ende,dauer_h:h,met,kcal,source:"tagesplan"});
    }
  }
  return result;
}
function computeAge(geburtsdatum){
  if(!geburtsdatum) return null;
  const today=new Date(), birth=new Date(geburtsdatum);
  if(isNaN(birth)) return null;
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return age>0?age:null;
}
const AKTIVITAET_STUFEN = [
  {wert:1.2,  label:"Sitzend",       beschr:"Bürojob, kaum Bewegung"},
  {wert:1.375,label:"Leicht aktiv",  beschr:"1–3× Sport/Woche"},
  {wert:1.55, label:"Moderat",       beschr:"3–5× Sport/Woche"},
  {wert:1.725,label:"Sehr aktiv",    beschr:"6–7× Sport/Woche"},
  {wert:1.9,  label:"Extrem",        beschr:"2× täglich Training"},
];
const ERNAEHRUNGS_ZIELE=[
  {id:"aufbau",icon:"💪",label:"Muskelaufbau",  delta:+300, beschr:"+300 kcal Überschuss",  proteinPerKg:2.0},
  {id:"halten",icon:"⚖️",label:"Gewicht halten",delta:0,    beschr:"Ausgeglichene Ernährung",proteinPerKg:1.6},
  {id:"abbau", icon:"🔥",label:"Fettabbau",     delta:-500, beschr:"−500 kcal Defizit",     proteinPerKg:2.2},
];
function computeBMRRaw(profile){
  const alter=computeAge(profile?.geburtsdatum);
  if(!alter||!profile?.groesse||!profile?.gewicht) return null;
  const {geschlecht,groesse,gewicht}=profile;
  return geschlecht==="w"?(10*gewicht+6.25*groesse-5*alter-161):(10*gewicht+6.25*groesse-5*alter+5);
}
function computeBMRBase(profile){
  const bmr=computeBMRRaw(profile); return bmr?Math.round(bmr*1.2):null;
}
function computeKcalTarget(profile,faktor=1.55){
  const bmr=computeBMRRaw(profile); return bmr?Math.round(bmr*faktor):null;
}
function computeWaterTarget(profile){
  if(!profile?.gewicht) return null;
  return Math.min(5000,Math.max(1500,Math.round(profile.gewicht*35/100)*100));
}
// Berechnet alle Makro-Ziele basierend auf Ziel (aufbau/halten/abbau) und TDEE
function computeMacroTargets(profile, tdee){
  const ziel=ERNAEHRUNGS_ZIELE.find(z=>z.id===(profile?.ernaehrungsziel||"halten"))||ERNAEHRUNGS_ZIELE[1];
  const weight=profile?.gewicht||70;
  const kcal=Math.max(1200, Math.round(tdee+ziel.delta));
  const protein=Math.round(weight*ziel.proteinPerKg);
  const fett=Math.round((kcal*0.25)/9);
  const carbs=Math.max(50,Math.round((kcal-protein*4-fett*9)/4));
  const water=computeWaterTarget(profile)||Math.round(weight*35/100)*100;
  return {kcal,protein,fett,carbs,water};
}

// Alle Funktionen person-spezifisch – jede Person hat eigenen Token + Cache
function gcalGetToken(person){

}

function gcalClearToken(person){

// Firebase GCal: Events nach Person+Monat aufteilen und speichern
async function gcalSaveEventsToFirebase(person,events){
  try{
    const db=getDB(); if(!db) return;
    const byMonth={};
    events.forEach(ev=>{
      const d=(ev.start.date||ev.start.dateTime||"").slice(0,7);
      if(!d) return;
      if(!byMonth[d]) byMonth[d]=[];
      byMonth[d].push(ev);
    });
    const writes=Object.entries(byMonth).map(([month,evs])=>
      db.collection(FB_GCAL_COL).doc(person+"_"+month).set({person,month,events:JSON.stringify(evs),updatedAt:Date.now()})
    );
    await Promise.all(writes);
  }catch(e){ console.warn("GCal Firebase save:",e); }
}
// Firebase GCal: alle Dokumente lesen → { Person: [events] }
async function gcalLoadEventsFromFirebase(){
  try{
    const db=getDB(); if(!db) return null;
    const snap=await db.collection(FB_GCAL_COL).get();
    if(snap.empty) return null;
    const byPerson={};
    snap.forEach(doc=>{
      const {person,events}=doc.data();
      if(!person||!events) return;
      try{
        const evs=JSON.parse(events);
        if(!byPerson[person]) byPerson[person]=[];
        byPerson[person]=byPerson[person].concat(evs);
      }catch{}
    });
    return Object.keys(byPerson).length?byPerson:null;
  }catch(e){ console.warn("GCal Firebase load:",e); return null; }
}
// Firebase GCal: alle Dokumente einer Person löschen
async function gcalClearEventsFromFirebase(person){
  try{
    const db=getDB(); if(!db) return;
    const snap=await db.collection(FB_GCAL_COL).where("person","==",person).get();
    await Promise.all(snap.docs.map(d=>d.ref.delete()));
  }catch(e){ console.warn("GCal Firebase clear:",e); }
}
// Alle Personen-Caches zu einem Date→Events-Map zusammenführen
function gcalBuildEventsMap(persons,caches){
  const map={};
  persons.forEach(p=>{
    (caches[p]||[]).forEach(ev=>{
      const d=(ev.start.date||ev.start.dateTime||"").slice(0,10);
      if(!d) return;
      if(!map[d]) map[d]=[];
      map[d].push({...ev,_person:p});
    });
  });
  return map;
}
// Bulk-Fetch: gestern bis +3 Jahre, mit Pagination
async function gcalFetchAllEvents(token){
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const future=new Date(); future.setFullYear(future.getFullYear()+1);
  const tMin=yesterday.toISOString().slice(0,10)+"T00:00:00Z";
  const tMax=future.toISOString().slice(0,10)+"T23:59:59Z";
  let items=[]; let pageToken=null;
  do{
    let url="https://www.googleapis.com/calendar/v3/calendars/primary/events"
      +"?timeMin="+encodeURIComponent(tMin)
      +"&timeMax="+encodeURIComponent(tMax)
      +"&singleEvents=true&orderBy=startTime&maxResults=2500";
    if(pageToken) url+="&pageToken="+encodeURIComponent(pageToken);
    const res=await fetch(url,{headers:{Authorization:"Bearer "+token}});
    if(res.status===401) throw new Error("gcal_401");
    if(!res.ok) throw new Error("GCal API "+res.status);
    const data=await res.json();
    items=items.concat(data.items||[]);
    pageToken=data.nextPageToken||null;
  }while(pageToken);
  return items.map(ev=>({
    id:ev.id,
    summary:ev.summary||"(Kein Titel)",
    start:ev.start,
    end:ev.end,
  }));
}
async function gcalCreateEvent(token,title,startISO,endISO,description){
  const res=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events",{
    method:"POST",
    headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({
      summary:title,
      start:{dateTime:startISO,timeZone:"Europe/Berlin"},
      end:  {dateTime:endISO,  timeZone:"Europe/Berlin"},
      description:description||"",
    }),
  });
  if(!res.ok) throw new Error("GCal create "+res.status);
  return res.json();
}

function NutritionTube({ value, total, type, label, unit }) {
  const pct = Math.min(100, Math.round((value / total) * 100));
  const W = 80, TH = 230;
  const rx1 = 14, rx2 = W - 14;
  const tubeTop = 14, tubeBottomY = TH - 20;
  const innerH = tubeBottomY - tubeTop;
  const fillY = tubeTop + (1 - pct / 100) * innerH;
  const isWater = type === "water";
  const clipId = "nclip-" + type;
  const gradId = "ngrad-" + type;
  const tubeW = rx2 - rx1;
  // Tube shape: straight walls, semicircle at bottom
  const tubeD = `M${rx1},${tubeTop} L${rx1},${tubeBottomY-22} Q${rx1},${tubeBottomY} ${W/2},${tubeBottomY} Q${rx2},${tubeBottomY} ${rx2},${tubeBottomY-22} L${rx2},${tubeTop} Z`;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:"100%"}}>
      <div style={{fontSize:9,color:"#666",marginBottom:5,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700}}>{label}</div>
      <svg width={W} height={TH} viewBox={`0 0 ${W} ${TH}`}
        style={{filter: isWater
          ? "drop-shadow(0 0 12px rgba(76,201,240,0.5)) drop-shadow(0 0 24px rgba(76,201,240,0.2))"
          : "drop-shadow(0 0 14px rgba(255,80,0,0.6)) drop-shadow(0 0 28px rgba(200,20,0,0.3))"}}>
        <defs>
          <clipPath id={clipId}>
            <path d={tubeD}/>
          </clipPath>
          {isWater ? (
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#7ee8fa" stopOpacity="0.95"/>
              <stop offset="60%" stopColor="#1a90cc" stopOpacity="1"/>
              <stop offset="100%" stopColor="#0a4a7a" stopOpacity="1"/>
            </linearGradient>
          ) : (
            <radialGradient id={gradId} cx="40%" cy="55%" r="70%">
              <stop offset="0%" stopColor="#ff7b00"/>
              <stop offset="35%" stopColor="#dd2200"/>
              <stop offset="75%" stopColor="#7a0000"/>
              <stop offset="100%" stopColor="#1a0000"/>
            </radialGradient>
          )}
          {isWater && (
            <linearGradient id="wave-top-placeholder" x1="0" y1="0" x2="0" y2="1"/>
          )}
        </defs>

        {/* Dark tube body */}
        <path d={tubeD} fill={isWater ? "#010c14" : "#0a0000"} stroke="#2a2a2a" strokeWidth="1.5"/>

        {/* Fluid fill clipped to tube */}
        <g clipPath={`url(#${clipId})`}>
          {/* Base fill rectangle */}
          <rect x={rx1} y={fillY} width={tubeW} height={TH} fill={`url(#${gradId})`}/>

          {isWater ? (
            // Wave surface: wide path animated left
            <g className="wave-anim">
              <path
                d={`M${rx1-80},${fillY+1} C${rx1-60},${fillY-8} ${rx1-40},${fillY+8} ${rx1-20},${fillY+1} C${rx1},${fillY-8} ${rx1+20},${fillY+8} ${rx1+40},${fillY+1} C${rx1+60},${fillY-8} ${rx1+80},${fillY+8} ${rx1+100},${fillY+1} C${rx1+120},${fillY-8} ${rx1+140},${fillY+8} ${rx1+160},${fillY+1} L${rx1+160},${TH} L${rx1-80},${TH} Z`}
                fill={`url(#${gradId})`} opacity="0.95"/>
              {/* Foam highlight on wave top */}
              <path
                d={`M${rx1-80},${fillY+1} C${rx1-60},${fillY-8} ${rx1-40},${fillY+8} ${rx1-20},${fillY+1} C${rx1},${fillY-8} ${rx1+20},${fillY+8} ${rx1+40},${fillY+1} C${rx1+60},${fillY-8} ${rx1+80},${fillY+8} ${rx1+100},${fillY+1} C${rx1+120},${fillY-8} ${rx1+140},${fillY+8} ${rx1+160},${fillY+1} L${rx1+160},${fillY+12} L${rx1-80},${fillY+12} Z`}
                fill="rgba(255,255,255,0.12)"/>
            </g>
          ) : (
            // Lava: irregular animated surface + glowing blobs
            <g>
              <g className="lava-surface">
                <path
                  d={`M${rx1},${fillY+12} C${rx1+6},${fillY+3} ${rx1+14},${fillY+14} ${rx1+22},${fillY+7} C${rx1+30},${fillY+1} ${rx1+36},${fillY+10} ${rx1+42},${fillY+5} C${rx1+48},${fillY} ${rx1+52},${fillY+9} ${rx2},${fillY+7} L${rx2},${TH} L${rx1},${TH} Z`}
                  fill={`url(#${gradId})`}/>
              </g>
              <ellipse cx={rx1+10} cy={fillY+9}  rx="7" ry="5" fill="#ff9500" opacity="0.75" className="lava-b1"/>
              <ellipse cx={rx1+32} cy={fillY+7}  rx="5" ry="3" fill="#ff4400" opacity="0.65" className="lava-b2"/>
              <ellipse cx={rx1+22} cy={fillY+18} rx="3" ry="2.5" fill="#ffcc00" opacity="0.55" className="lava-b3"/>
              <ellipse cx={W/2} cy={tubeBottomY-15} rx={tubeW/2-4} ry="8" fill="#ff3300" opacity="0.15"/>
            </g>
          )}
        </g>

        {/* Glass tube outline */}
        <path d={tubeD} fill="none" stroke="#4a4a4a" strokeWidth="2.5"/>
        {/* Sheen highlight */}
        <line x1={rx1+4} y1={tubeTop+16} x2={rx1+4} y2={tubeBottomY-28}
          stroke="rgba(255,255,255,0.06)" strokeWidth="3.5" strokeLinecap="round"/>

        {/* Graduation marks on right side */}
        {[0,25,50,75,100].map(t => {
          const my = tubeTop + (1 - t / 100) * innerH;
          const isMaj = t % 50 === 0;
          return (
            <g key={t}>
              <line x1={rx2} y1={my} x2={rx2 + (isMaj?7:4)} y2={my}
                stroke={isMaj?"#555":"#333"} strokeWidth={isMaj?1.5:0.8}/>
              {isMaj && <text x={rx2+9} y={my+3.5} fontSize="7" fill="#444" fontFamily="monospace">{t}</text>}
            </g>
          );
        })}

        {/* Rim / stopper at top */}
        <rect x={rx1-6} y={tubeTop-10} width={tubeW+12} height={12} rx="3"
          fill="#1e1e1e" stroke="#4a4a4a" strokeWidth="1.5"/>
        <rect x={rx1-2} y={tubeTop-7} width={tubeW+4} height={6} rx="2"
          fill="#2a2a2a"/>

        {/* Percentage label - inside fill if room, else above */}
        {pct > 14 ? (
          <text x={W/2} y={fillY + 14} textAnchor="middle" fontSize="13" fontWeight="bold"
            fill="rgba(255,255,255,0.9)" fontFamily="Georgia,serif">{pct}%</text>
        ) : (
          <text x={W/2} y={fillY - 6} textAnchor="middle" fontSize="11" fontWeight="bold"
            fill={isWater?"#7ee8fa":"#ff7b00"} fontFamily="Georgia,serif">{pct}%</text>
        )}
      </svg>

      {/* Numeric value below tube */}
      <div style={{textAlign:"center",marginTop:6}}>
        <span style={{fontSize:15,fontWeight:700,color:"#e0e0e0"}}>{value}</span>
        <span style={{fontSize:9,color:"#444",marginLeft:3}}>{unit}</span>
      </div>
      <div style={{fontSize:8,color:"#333",marginTop:1}}>Ziel: {total} {unit}</div>
    </div>
  );
}
