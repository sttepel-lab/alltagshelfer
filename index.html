                  <button onClick={()=>setShowAddMeal(!showAddMeal)} style={{width:20,height:20,borderRadius:"50%",border:"none",background:"#ff6b35",color:"#fff",cursor:"pointer",fontSize:13,lineHeight:"20px",padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
                {showAddMeal&&(
                  <div style={{background:"#0d0d0d",borderRadius:6,padding:"8px",marginBottom:8,border:"1px solid #2a2a2a"}}>
                    {/* Tab: Manuell / Aus Rezept */}
                    {(recipes||[]).length>0&&(
                      <div style={{display:"flex",gap:0,marginBottom:8,background:"#1a1a1a",borderRadius:6,overflow:"hidden"}}>
                        {[["manuell","Manuell"],["rezept","Aus Rezept"]].map(([v,l])=>(
                          <button key={v} onClick={()=>setMealTab(v)} style={{flex:1,padding:"4px 0",border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,background:mealTab===v?"#ff6b35":"transparent",color:mealTab===v?"#fff":"#555",fontWeight:mealTab===v?700:400}}>{l}</button>
                        ))}
                      </div>
                    )}
                    {mealTab==="rezept"&&(recipes||[]).length>0?(
                      <RecipeQuickSelect recipes={recipes} onSelect={async(r,portionen)=>{
                        const m={id:uid(),zeit:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
                          name:r.title+(portionen!==1?" (×"+portionen+")":""),
                          kcal:Math.round((r.makrosProPortion?.kcal||0)*portionen),
                          protein:Math.round((r.makrosProPortion?.protein||0)*portionen*10)/10,
                          carbs:Math.round((r.makrosProPortion?.carbs||0)*portionen*10)/10,
                          fett:Math.round((r.makrosProPortion?.fett||0)*portionen*10)/10,
                          recipeId:r.id,
                          addedAt:new Date().toISOString()};
                        const newData={...dayData,mahlzeiten:[...(dayData.mahlzeiten||[]),m]};
                        await onSave(key,newData);
                        if(onMarkRecipeEaten) onMarkRecipeEaten(r.id, activeDate);
                        setShowAddMeal(false); setMealTab("manuell");
                      }}/>
                    ):(
                      <>
                        <div style={{display:"flex",gap:4,marginBottom:5}}>
                          <input value={newMeal.zeit} onChange={e=>setNewMeal(n=>({...n,zeit:e.target.value}))} placeholder="08:30" style={{...INP,width:56}}/>
                          <input value={newMeal.name} onChange={e=>setNewMeal(n=>({...n,name:e.target.value}))} placeholder="Mahlzeit" style={{...INP,flex:1}}/>
                        </div>
                        <div style={{display:"flex",gap:3,marginBottom:5}}>
                          {[["kcal","kcal","#ff6b35"],["protein","Pg","#9b72cf"],["carbs","Cg","#c8a200"],["fett","Fg","#ff6b35"]].map(([k,ph,c])=>(
                            <input key={k} type="number" value={newMeal[k]} onChange={e=>setNewMeal(n=>({...n,[k]:e.target.value}))} placeholder={ph} style={{...INP,width:"100%",flex:1,borderColor:c+"55"}}/>
                          ))}
                        </div>
                        {addMsg&&<div style={{fontSize:9,color:"#c0392b",marginBottom:4}}>{addMsg}</div>}
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={addMeal} style={{flex:1,padding:"4px",borderRadius:10,border:"none",background:"#ff6b35",color:"#fff",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif"}}>OK</button>
                          <button onClick={()=>setShowAddMeal(false)} style={{padding:"4px 8px",borderRadius:10,border:"1px solid #2a2a2a",background:"transparent",cursor:"pointer",fontSize:10,color:"#444"}}>✕</button>
                        </div>
                      </>
                    )}
                  </div>
                )}
                {(dayData.mahlzeiten||[]).length===0
                  ? <div style={{fontSize:9,color:"#2a2a2a",fontStyle:"italic",textAlign:"center",padding:"5px 0"}}>Noch leer</div>
                  : [...(dayData.mahlzeiten||[])].sort((a,b)=>(a.zeit||"99").localeCompare(b.zeit||"99")).map(m=>(
                    <div key={m.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 0",borderBottom:"1px solid #161616"}}>
                      {m.zeit&&<span style={{fontSize:8,color:"#333",minWidth:24}}>{m.zeit}</span>}
                      <span style={{fontSize:10,color:"#aaa",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</span>
                      <span style={{fontSize:9,color:"#ff6b35",fontWeight:700,flexShrink:0}}>{m.kcal}</span>
                      <button onClick={()=>deleteMeal(m.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#2a2a2a",fontSize:11,padding:"0 2px",flexShrink:0}}>✕</button>
                    </div>
                  ))
                }
              </div>
            </div>

            {/* RIGHT COLUMN: Wasser tube + Buttons */}
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",maxWidth:180}}>
              <NutritionTube value={totalWasser} total={TARGETS.water} type="water" label="Wasser" unit="ml"/>
              {/* Water buttons directly under water tube */}
              <div style={{width:"100%",marginTop:10,padding:"8px 10px",background:"#111",borderRadius:8,border:"1px solid #1e1e1e"}}>
                <div style={{fontSize:8,color:"#1a6fa8",marginBottom:7,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>💧 Hinzufügen</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:5}}>
                  {[200,250,330,500].map(ml=>(
                    <button key={ml} onClick={()=>addWater(ml)} style={{flex:"1 1 40%",padding:"6px 0",borderRadius:20,border:"1px solid #1a6fa8",background:"#010c14",color:"#4cc9f0",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif",fontWeight:600}}>+{ml}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>addWater(1000)} style={{flex:1,padding:"6px",borderRadius:20,border:"1px solid #2471a3",background:"#010c14",color:"#7ee8fa",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif",fontWeight:700}}>+1 L</button>
                  {totalWasser>0&&<button onClick={()=>removeWater(250)} style={{padding:"6px 8px",borderRadius:20,border:"1px solid #1e1e1e",background:"transparent",color:"#333",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif"}}>−250</button>}
                </div>
              </div>
            </div>

          </div>{/* end tubes row */}
          {/* AKTIVITÄTEN KARTE - nur im Aktivitäten-Modus */}
          {aktivModus==="aktivitaeten"&&(
          <div style={{marginTop:8,padding:"8px 10px",background:"#111",borderRadius:8,border:"1px solid #1e1e1e"}}>
            <div style={{display:"flex",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:9,color:"#6fcf97",textTransform:"uppercase",letterSpacing:1,fontWeight:700,flex:1}}>🏃 Aktive Kalorien</span>
              {totalActiveKcal>0&&<span style={{fontSize:11,color:"#6fcf97",fontWeight:700}}>{totalActiveKcal} kcal</span>}
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,color:"#2a2a2a",textTransform:"uppercase",letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
                <span>📅 Aus Tagesplan</span>
                {autoAkt.length>0&&<span style={{color:"#3a5a3a",fontWeight:700}}>{totalAutoKcal} kcal</span>}
              </div>
              {autoAkt.length===0
                ? <div style={{fontSize:9,color:"#1e1e1e",fontStyle:"italic",padding:"2px 0"}}>Keine Aktivitäten im heutigen Tagesplan</div>
                : autoAkt.map(a=>(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",borderBottom:"1px solid #161616"}}>
                    <span style={{fontSize:9,color:"#3a3a3a",minWidth:32,flexShrink:0}}>{a.start}–{a.ende}</span>
                    <span style={{fontSize:10,color:"#666",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                    <span style={{fontSize:8,color:"#2a2a2a",marginRight:3}}>MET {a.met}</span>
                    <span style={{fontSize:9,color:"#6fcf97",fontWeight:700,flexShrink:0}}>{a.kcal}</span>
                  </div>
                ))
              }
            </div>
            <div>
              <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:8,color:"#2a2a2a",textTransform:"uppercase",letterSpacing:1,flex:1}}>
                  ✍️ Manuell {manualAkt.length>0&&"("+totalManualKcal+" kcal)"}
                </span>
                <button onClick={()=>setShowAddActivity(v=>!v)} style={{width:18,height:18,borderRadius:"50%",border:"none",background:"#6fcf97",color:"#0a2a0a",cursor:"pointer",fontSize:12,lineHeight:"18px",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
              </div>
              {showAddActivity&&(
                <div style={{background:"#0d0d0d",borderRadius:6,padding:"8px",marginBottom:6,border:"1px solid #2a2a2a"}}>
                  <input value={newAct.name} onChange={e=>setNewAct(n=>({...n,name:e.target.value}))} placeholder="Aktivität (z.B. Spaziergang)"
                    style={{...INP,width:"100%",marginBottom:4,boxSizing:"border-box"}}/>
                  <div style={{display:"flex",gap:3,marginBottom:4}}>
                    <input value={newAct.start} onChange={e=>setNewAct(n=>({...n,start:e.target.value}))} placeholder="Start" style={{...INP,flex:1}}/>
                    <span style={{color:"#333",alignSelf:"center"}}>–</span>
                    <input value={newAct.ende} onChange={e=>setNewAct(n=>({...n,ende:e.target.value}))} placeholder="Ende" style={{...INP,flex:1}}/>
                    <input value={newAct.dauer_min} type="number" onChange={e=>setNewAct(n=>({...n,dauer_min:e.target.value}))} placeholder="Min" style={{...INP,width:44}}/>
                  </div>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <span style={{fontSize:9,color:"#555",flexShrink:0}}>MET:</span>
                    <input value={newAct.met} type="number" step="0.5" min="1" max="15" onChange={e=>setNewAct(n=>({...n,met:e.target.value}))} placeholder={String(previewMet.toFixed(1))} style={{...INP,width:54}}/>
                    {previewKcal>0&&<span style={{fontSize:9,color:"#6fcf97",flex:1}}>≈ {previewKcal} kcal</span>}
                    <button onClick={addActivity} style={{padding:"3px 10px",borderRadius:10,border:"none",background:"#6fcf97",color:"#0a2a0a",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif",fontWeight:700}}>OK</button>
                    <button onClick={()=>setShowAddActivity(false)} style={{padding:"3px 6px",borderRadius:10,border:"1px solid #2a2a2a",background:"transparent",cursor:"pointer",fontSize:10,color:"#444"}}>✕</button>
                  </div>
                </div>
              )}
              {manualAkt.length===0&&!showAddActivity&&(
                <div style={{fontSize:9,color:"#1e1e1e",fontStyle:"italic",padding:"2px 0"}}>Noch keine manuellen Aktivitäten</div>
              )}
              {manualAkt.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",borderBottom:"1px solid #161616"}}>
                  {a.start&&<span style={{fontSize:9,color:"#3a3a3a",minWidth:32,flexShrink:0}}>{a.start}{a.ende?"–"+a.ende:""}</span>}
                  <span style={{fontSize:10,color:"#aaa",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                  <span style={{fontSize:8,color:"#2a2a2a",marginRight:3}}>MET {a.met}</span>
                  <span style={{fontSize:9,color:"#6fcf97",fontWeight:700,flexShrink:0}}>{a.kcal_berechnet}</span>
                  <button onClick={()=>deleteActivity(a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#2a2a2a",fontSize:11,padding:"0 2px",flexShrink:0}}>✕</button>
                </div>
              ))}
            </div>
          </div>
          )}

          <div style={{fontSize:8,color:"#222",textAlign:"center",padding:"6px 0 4px"}}>💡 Hans: „Müsli 350 kcal 12g Protein" · „500ml Wasser"</div>
        </div>
      )}

      {tab==="woche"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px 10px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:10}}>7-Tage-Übersicht – {activePerson}</div>
          {[{label:"🔥 Kalorien",k:"kcal",total:TARGETS.kcal,color:"#ff6b35"},{label:"💧 Wasser",k:"water",total:TARGETS.water,color:"#4cc9f0"}].map(({label,k,total,color})=>(
            <div key={k} style={{background:"#111",borderRadius:10,padding:"10px 12px",border:"1px solid #1a1a1a",marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color,marginBottom:8}}>{label} (Ziel: {total}{k==="kcal"?" kcal":" ml"})</div>
              <div style={{display:"flex",gap:4,alignItems:"flex-end",height:70}}>
                {weekDays.map(d=>{
                  const dk=`${activePerson}|${d}`;
                  const dd=nutritionData[dk]||{wasser:0,mahlzeiten:[]};
                  const v=k==="kcal"?(dd.mahlzeiten||[]).reduce((s,m)=>s+(m.kcal||0),0):(dd.wasser||0);
                  const p=Math.min(100,Math.round((v/total)*100));
                  const isAct=d===activeDate;
                  return(
                    <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{fontSize:7,color:"#333",height:14,display:"flex",alignItems:"flex-end"}}>{v>0?(k==="water"&&v>=1000?(v/1000).toFixed(1)+"L":v):""}</div>
                      <div style={{width:"100%",background:"#1a1a1a",borderRadius:3,height:46,display:"flex",alignItems:"flex-end",overflow:"hidden"}}>
                        <div style={{width:"100%",height:Math.max(p,0)+"%",background:isAct?"#fff":p>=100?"#27ae60":color,borderRadius:3,transition:"height .3s"}}/>
                      </div>
                      <div style={{fontSize:7,color:isAct?"#fff":"#444",fontWeight:isAct?700:400}}>{new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short"})}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{background:"#111",borderRadius:10,border:"1px solid #1a1a1a",overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"56px repeat(4,1fr)",borderBottom:"1px solid #1e1e1e"}}>
              {["","kcal","H₂O","P","F"].map((h,i)=>(
                <div key={i} style={{padding:"5px 3px",fontSize:9,fontWeight:700,color:"#333",textAlign:"center",background:"#0d0d0d"}}>{h}</div>
              ))}
            </div>
            {weekDays.map(d=>{
              const dk=`${activePerson}|${d}`;
              const dd=nutritionData[dk]||{wasser:0,mahlzeiten:[]};
              const kcal=(dd.mahlzeiten||[]).reduce((s,m)=>s+(m.kcal||0),0);
              const prot=(dd.mahlzeiten||[]).reduce((s,m)=>s+(m.protein||0),0);
              const fett=(dd.mahlzeiten||[]).reduce((s,m)=>s+(m.fett||0),0);
              const w=dd.wasser||0;
              const isAct=d===activeDate;
              return(
                <div key={d} style={{display:"grid",gridTemplateColumns:"56px repeat(4,1fr)",borderBottom:"1px solid #111",background:isAct?"rgba(255,107,0,0.07)":"#111"}}>
                  <div style={{padding:"5px 2px",fontSize:8,fontWeight:isAct?700:400,color:isAct?"#ff6b00":"#444",textAlign:"center"}}>{new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})}</div>
                  <div style={{padding:"5px 2px",fontSize:9,color:kcal>=TARGETS.kcal?"#27ae60":kcal>0?"#ff6b35":"#222",textAlign:"center"}}>{kcal||"–"}</div>
                  <div style={{padding:"5px 2px",fontSize:9,color:w>=TARGETS.water?"#27ae60":w>0?"#4cc9f0":"#222",textAlign:"center"}}>{w>0?(w>=1000?(w/1000).toFixed(1)+"L":w+"ml"):"–"}</div>
                  <div style={{padding:"5px 2px",fontSize:9,color:"#9b72cf",textAlign:"center"}}>{prot>0?prot+"g":"–"}</div>
                  <div style={{padding:"5px 2px",fontSize:9,color:"#ff6b35",textAlign:"center"}}>{fett>0?fett+"g":"–"}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// --- REZEPT SCHNELLAUSWAHL (im Ernährungs-Tab) --------------------------------
function RecipeQuickSelect({recipes,onSelect}){
  const [chosen,setChosen]=useState(null);
  const [portionen,setPortionen]=useState(1);
  const [manKcal,setManKcal]=useState("");
  const [manProt,setManProt]=useState("");
  const [manCarbs,setManCarbs]=useState("");
  const [manFett,setManFett]=useState("");

  function selectRecipe(r){
    setChosen(r);
    setPortionen(1);
    setManKcal(String(r.makrosProPortion?.kcal||""));
    setManProt(String(r.makrosProPortion?.protein||""));
    setManCarbs(String(r.makrosProPortion?.carbs||""));
    setManFett(String(r.makrosProPortion?.fett||""));
  }
  function updatePortionen(p){
    const v=Math.max(0.5,parseFloat(p)||1);
    setPortionen(v);
  }

  if(!chosen) return(
    <div style={{maxHeight:180,overflowY:"auto"}}>
      {(recipes||[]).map(r=>(
        <button key={r.id} onClick={()=>selectRecipe(r)}
          style={{display:"block",width:"100%",textAlign:"left",padding:"7px 10px",marginBottom:4,borderRadius:7,border:"1px solid #2a2a2a",background:"#111",cursor:"pointer",fontFamily:"Georgia,serif",color:"#ddd"}}>
          <div style={{fontSize:11,fontWeight:700}}>{r.title}</div>
          <div style={{fontSize:9,color:"#555",marginTop:1}}>
            {r.makrosProPortion?.kcal||"?"} kcal/Port. · {r.portionen||1} Port.
            {r.zutaten?.length?" · "+r.zutaten.length+" Zutaten":""}
          </div>
        </button>
      ))}
    </div>
  );

  const calcKcal=Math.round((parseFloat(manKcal)||0)*portionen);
  const calcProt=Math.round((parseFloat(manProt)||0)*portionen*10)/10;
  const calcCarbs=Math.round((parseFloat(manCarbs)||0)*portionen*10)/10;
  const calcFett=Math.round((parseFloat(manFett)||0)*portionen*10)/10;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
        <button onClick={()=>setChosen(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#555",fontSize:14,padding:0}}>←</button>
        <span style={{fontSize:11,fontWeight:700,color:"#ddd",flex:1}}>{chosen.title}</span>
      </div>
      {/* Portionen */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontSize:10,color:"#666"}}>Portionen:</span>
        <button onClick={()=>updatePortionen(portionen-0.5)} style={{width:22,height:22,borderRadius:"50%",border:"1px solid #333",background:"#1a1a1a",color:"#aaa",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <input type="number" value={portionen} min="0.5" step="0.5" onChange={e=>updatePortionen(e.target.value)}
          style={{width:44,border:"1px solid #333",borderRadius:5,padding:"3px 6px",fontFamily:"Georgia,serif",fontSize:11,background:"#1a1a1a",color:"#ddd",textAlign:"center",outline:"none"}}/>
        <button onClick={()=>updatePortionen(portionen+0.5)} style={{width:22,height:22,borderRadius:"50%",border:"1px solid #333",background:"#1a1a1a",color:"#aaa",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        <span style={{fontSize:9,color:"#444"}}>(Rez. für {chosen.portionen||1})</span>
      </div>
      {/* Makros manuell anpassbar */}
      <div style={{display:"flex",gap:3,marginBottom:8}}>
        {[[manKcal,setManKcal,"kcal","#ff6b35"],[manProt,setManProt,"P","#9b72cf"],[manCarbs,setManCarbs,"C","#c8a200"],[manFett,setManFett,"F","#ff6b35"]].map(([v,sv,ph,c],i)=>(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
            <span style={{fontSize:8,color:c,textAlign:"center"}}>{ph}/Port.</span>
            <input type="number" value={v} onChange={e=>sv(e.target.value)}
              style={{width:"100%",border:"1px solid "+c+"44",borderRadius:5,padding:"3px 4px",fontFamily:"Georgia,serif",fontSize:10,background:"#1a1a1a",color:"#ddd",textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
      </div>
      {/* Ergebnis */}
      <div style={{background:"#1a1a1a",borderRadius:6,padding:"5px 8px",marginBottom:8,display:"flex",gap:8,justifyContent:"space-around"}}>
        <span style={{fontSize:9,color:"#ff6b35"}}>{calcKcal} kcal</span>
        <span style={{fontSize:9,color:"#9b72cf"}}>{calcProt}g P</span>
        <span style={{fontSize:9,color:"#c8a200"}}>{calcCarbs}g C</span>
        <span style={{fontSize:9,color:"#888"}}>{calcFett}g F</span>
      </div>
      <div style={{display:"flex",gap:4}}>
        <button onClick={()=>onSelect(chosen,portionen,{kcal:calcKcal,protein:calcProt,carbs:calcCarbs,fett:calcFett})}
          style={{flex:1,padding:"5px",borderRadius:10,border:"none",background:"#ff6b35",color:"#fff",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif",fontWeight:700}}>
          Eintragen
        </button>
        <button onClick={()=>setChosen(null)} style={{padding:"5px 8px",borderRadius:10,border:"1px solid #2a2a2a",background:"transparent",cursor:"pointer",fontSize:10,color:"#555"}}>✕</button>
      </div>
    </div>
  );
}

// --- REZEPTE ------------------------------------------------------------------
function RecipesView({recipes,onSave,onAddRecipe,accent,apiKey,today,onMarkEaten}){
  const [view,setView]=useState("liste"); // "liste"|"neu"|"url"
  const [editId,setEditId]=useState(null);
  // Zähler-Bearbeitung
  const [editEatenId,setEditEatenId]=useState(null);
  const [editEatenDate,setEditEatenDate]=useState("");

  // Filter & Sort State
  const [showFilter,setShowFilter]=useState(false);
  const [filterText,setFilterText]=useState("");
  const [filterDays,setFilterDays]=useState("alle"); // "alle"|"nie"|"3"|"7"|"alt"
  const [sortBy,setSortBy]=useState("standard"); // "standard"|"az"|"za"|"tage_desc"|"tage_asc"|"gesundheit"|"geschmack"|"kalorien"|"schwierigkeit"

  // Formular-State
  const emptyForm={title:"",portionen:"1",zutaten:[{id:uid(),name:"",menge:""}],manKcal:"",manProt:"",manCarbs:"",manFett:""};
  const [form,setForm]=useState(emptyForm);
  const [urlInput,setUrlInput]=useState("");
  const [urlLoading,setUrlLoading]=useState(false);
  const [urlMsg,setUrlMsg]=useState("");
  const [saveMsg,setSaveMsg]=useState("");
  const [kiLoading,setKiLoading]=useState(false);

  function resetForm(){ setForm(emptyForm); setEditId(null); }

  // Expose setView + toggleFilter globally für den App-Header
  useEffect(()=>{
    window.__recipesSetView=(v)=>{ if(v==="neu") resetForm(); setView(v); };
    window.__recipesToggleFilter=()=>setShowFilter(v=>!v);
    return()=>{ delete window.__recipesSetView; delete window.__recipesToggleFilter; };
  },[]);

  function updateZutat(id,field,val){
    setForm(f=>({...f,zutaten:f.zutaten.map(z=>z.id===id?{...z,[field]:val}:z)}));
  }
  function addZutat(){
    setForm(f=>({...f,zutaten:[...f.zutaten,{id:uid(),name:"",menge:""}]}));
  }
  function removeZutat(id){
    setForm(f=>({...f,zutaten:f.zutaten.filter(z=>z.id!==id)}));
  }

  // Bewertung eines Rezepts inline aktualisieren
  async function updateRating(id,key,val){
    await onSave((recipes||[]).map(r=>r.id===id?{...r,ratings:{...(r.ratings||{}),[key]:val===((r.ratings||{})[key])?0:val}}:r));
  }

  // Makros von Claude schätzen lassen
  async function estimateMakros(){
    if(!form.title.trim()&&form.zutaten.filter(z=>z.name.trim()).length===0) return;
    setKiLoading(true);
    try{
      const zList=form.zutaten.filter(z=>z.name.trim()).map(z=>z.menge+" "+z.name).join(", ");
      const prompt="Schätze die Makronährstoffe pro Portion für: "+form.title+" mit "+zList+". Portionen: "+(form.portionen||1)+". Antworte NUR mit JSON ohne Backticks: {kcal:zahl,protein:zahl,carbs:zahl,fett:zahl}";
      const res=await anthropicFetch(apiKey,{model:"claude-sonnet-4-6",max_tokens:200,
        system:"Du bist Ernährungsexperte. Antworte nur mit JSON ohne Backticks.",
        messages:[{role:"user",content:prompt}]});
      const data=await res.json();
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setForm(f=>({...f,manKcal:String(parsed.kcal||""),manProt:String(parsed.protein||""),manCarbs:String(parsed.carbs||""),manFett:String(parsed.fett||"")}));
    }catch(e){ setSaveMsg("Fehler beim Schätzen: "+e.message); }
    setKiLoading(false);
  }

  async function importFromUrl(){
    if(!urlInput.trim()){ setUrlMsg("URL eingeben."); return; }
    setUrlLoading(true); setUrlMsg("");
    try{
      // Seite direkt über Claude mit web_fetch laden
      const prompt="Rufe diese URL ab und extrahiere das Rezept: "+urlInput.trim()+". Antworte NUR mit JSON ohne Backticks: {\"title\":string,\"portionen\":number,\"zutaten\":[{\"id\":string,\"name\":string,\"menge\":string}],\"makrosProPortion\":{\"kcal\":number,\"protein\":number,\"carbs\":number,\"fett\":number}}. Schätze Makros wenn nicht angegeben.";
      const res=await anthropicFetch(apiKey,{
        model:"claude-sonnet-4-6",max_tokens:1500,
        system:"Du bist ein Rezept-Extraktor. Antworte NUR mit JSON ohne Backticks und ohne weiteren Text.",
        messages:[{role:"user",content:prompt}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      });
      const data=await res.json();
      if(data.error){ setUrlMsg("Fehler: "+data.error.message); setUrlLoading(false); return; }
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(!text){ setUrlMsg("Kein Ergebnis von Claude."); setUrlLoading(false); return; }
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      const zutaten=(parsed.zutaten||[]).map(z=>({id:uid(),name:z.name||"",menge:z.menge||""}));
      const m=parsed.makrosProPortion||{};
      setForm({title:parsed.title||"",portionen:String(parsed.portionen||1),
        zutaten:zutaten.length?zutaten:[{id:uid(),name:"",menge:""}],
        manKcal:String(m.kcal||""),manProt:String(m.protein||""),manCarbs:String(m.carbs||""),manFett:String(m.fett||"")});
      setView("neu"); setUrlMsg("");
    }catch(e){ setUrlMsg("Fehler: "+e.message); }
    setUrlLoading(false);
  }

  async function saveRecipe(){
    if(!form.title.trim()){ setSaveMsg("Titel erforderlich."); return; }
    const prev=editId?(recipes||[]).find(r=>r.id===editId):null;
    const recipe={
      id: editId||"rec_"+uid(),
      title: form.title.trim(),
      portionen: parseFloat(form.portionen)||1,
      zutaten: form.zutaten.filter(z=>z.name.trim()),
      makrosProPortion: {kcal:parseInt(form.manKcal)||0,protein:parseFloat(form.manProt)||0,carbs:parseFloat(form.manCarbs)||0,fett:parseFloat(form.manFett)||0},
      createdAt: todayStr(),
      lastEaten: prev?.lastEaten,
      ratings: prev?.ratings,
    };
    if(editId){
      await onSave((recipes||[]).map(r=>r.id===editId?recipe:r));
    } else {
      await onAddRecipe(recipe);
    }
    setSaveMsg("✓ Gespeichert.");
    setTimeout(()=>{ setSaveMsg(""); setView("liste"); resetForm(); },1500);
  }

  function startEdit(r){
    setForm({title:r.title,portionen:String(r.portionen||1),
      zutaten:r.zutaten?.length?r.zutaten.map(z=>({...z})):[{id:uid(),name:"",menge:""}],
      manKcal:String(r.makrosProPortion?.kcal||""),manProt:String(r.makrosProPortion?.protein||""),
      manCarbs:String(r.makrosProPortion?.carbs||""),manFett:String(r.makrosProPortion?.fett||"")});
    setEditId(r.id); setView("neu");
  }

  async function deleteRecipe(id){
    await onSave((recipes||[]).filter(r=>r.id!==id));
  }

  const INP={border:"1px solid #ddd",borderRadius:6,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none",background:"#fff"};

  // Bewertungskategorien
  const RATINGS=[
    {key:"gesundheit",icon:"🥗",label:"Gesundheit"},
    {key:"kalorien",  icon:"⚡",label:"Kalorien"},
    {key:"geschmack", icon:"😋",label:"Geschmack"},
    {key:"schwierigkeit",icon:"👨‍🍳",label:"Schwierigkeit"},
  ];

  // Filter + Sort berechnen
  let displayed=(recipes||[]).filter(r=>{
    if(filterText){
      const q=filterText.toLowerCase();
      if(!r.title.toLowerCase().includes(q)&&!(r.zutaten||[]).some(z=>z.name.toLowerCase().includes(q))) return false;
    }
    const ds=daysSince(r.lastEaten);
    if(filterDays==="nie") return ds===null;
    if(filterDays==="3")   return ds!==null&&ds<=3;
    if(filterDays==="7")   return ds!==null&&ds<=7;
    if(filterDays==="alt") return ds===null||ds>7;
    return true;
  });
  displayed=[...displayed].sort((a,b)=>{
    if(sortBy==="az") return a.title.localeCompare(b.title,"de");
    if(sortBy==="za") return b.title.localeCompare(a.title,"de");
    if(sortBy==="tage_asc"){
      const da=daysSince(a.lastEaten),db=daysSince(b.lastEaten);
      if(da===null&&db===null) return 0; if(da===null) return 1; if(db===null) return -1; return da-db;
    }
    if(sortBy==="tage_desc"){
      const da=daysSince(a.lastEaten),db=daysSince(b.lastEaten);
      if(da===null&&db===null) return 0; if(da===null) return -1; if(db===null) return 1; return db-da;
    }
    if(["gesundheit","kalorien","geschmack","schwierigkeit"].includes(sortBy))
      return ((b.ratings||{})[sortBy]||0)-((a.ratings||{})[sortBy]||0);
    return 0;
  });
  const activeFilters=(filterText?1:0)+(filterDays!=="alle"?1:0)+(sortBy!=="standard"?1:0);

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"transparent"}}>
      {/* Sub-Navigation: nur sichtbar wenn in URL/Neu-Ansicht */}
      {view!=="liste"&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px 7px",background:"#f9f7f3",borderBottom:"1px solid #ece9e4",flexShrink:0}}>
          <button onClick={()=>{setView("liste");resetForm();setUrlInput("");setUrlMsg("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:16,padding:0}}>←</button>
          <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{view==="url"?"Aus URL importieren":"Rezept "+(editId?"bearbeiten":"anlegen")}</span>
        </div>
      )}

      {/* ── FILTER-PANEL (nur in Listenansicht) ── */}
      {view==="liste"&&showFilter&&(
        <div style={{padding:"10px 14px",background:"#faf9f7",borderBottom:"1px solid #ece9e4",flexShrink:0}}>
          {/* Suche */}
          <input value={filterText} onChange={e=>setFilterText(e.target.value)}
            placeholder="🔍 Titel oder Zutat suchen..."
            style={{...INP,width:"100%",boxSizing:"border-box",fontSize:11,marginBottom:9}}/>
          {/* Sortierung */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:9}}>
            <span style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap",flexShrink:0}}>Sortierung</span>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{flex:1,fontSize:10,border:"1px solid #ddd",borderRadius:6,padding:"4px 6px",
                fontFamily:"Georgia,serif",outline:"none",background:"#fff",color:"#333"}}>
              <option value="standard">Standard</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
              <option value="tage_desc">Längste Pause zuerst</option>
              <option value="tage_asc">Kürzeste Pause zuerst</option>
              <option value="gesundheit">🥗 Gesundheit ↓</option>
              <option value="geschmack">😋 Geschmack ↓</option>
              <option value="kalorien">⚡ Kalorien ↓</option>
              <option value="schwierigkeit">👨‍🍳 Schwierigkeit ↓</option>
            </select>
          </div>
          {/* Tage-Filter */}
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap",flexShrink:0}}>Gegessen</span>
            {[["alle","Alle"],["nie","Nie"],["3","≤ 3 Tage"],["7","≤ 7 Tage"],["alt","> 7 Tage"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterDays(v)}
                style={{padding:"3px 9px",borderRadius:20,fontSize:9,fontFamily:"Georgia,serif",cursor:"pointer",border:"1px solid",
                  borderColor:filterDays===v?accent:"#ddd",
                  background:filterDays===v?accent+"22":"transparent",
                  color:filterDays===v?accent:"#777",fontWeight:filterDays===v?700:400}}>
                {l}
              </button>
            ))}
          </div>
          {activeFilters>0&&(
            <button onClick={()=>{setFilterText("");setFilterDays("alle");setSortBy("standard");}}
              style={{marginTop:8,fontSize:9,color:"#c0392b",background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}>
              ✕ Filter zurücksetzen ({activeFilters})
            </button>
          )}
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>

        {/* LISTE */}
        {view==="liste"&&(
          <>
            {displayed.length===0&&(recipes||[]).length===0&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:"#aaa"}}>
                <div style={{fontSize:32,marginBottom:10}}>🍽</div>
                <div style={{fontSize:13,marginBottom:6}}>Noch keine Rezepte gespeichert.</div>
                <div style={{fontSize:11}}>Lege dein erstes Rezept an oder importiere es per URL.</div>
              </div>
            )}
            {displayed.length===0&&(recipes||[]).length>0&&(
              <div style={{textAlign:"center",padding:"30px 20px",color:"#aaa"}}>
                <div style={{fontSize:24,marginBottom:8}}>🔍</div>
                <div style={{fontSize:12,marginBottom:8}}>Keine Rezepte für diesen Filter.</div>
                <button onClick={()=>{setFilterText("");setFilterDays("alle");setSortBy("standard");}}
                  style={{fontSize:10,color:accent,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Filter zurücksetzen</button>
              </div>
            )}
            {displayed.map(r=>{
              const ds=daysSince(r.lastEaten);
              // Farbe des Zähler-Badges
              const badgeColor=ds===null?"#bbb":ds===0?"#27ae60":ds<=3?"#2980b9":ds<=7?"#e67e22":"#c0392b";
              const badgeBg=ds===null?"#f5f5f5":ds===0?"#eafaf1":ds<=3?"#eaf3fb":ds<=7?"#fef5e7":"#fdf0ef";
              const rats=r.ratings||{};
              return(
              <div key={r.id} style={{background:"#fff",borderRadius:10,padding:"12px 14px",marginBottom:10,border:"1px solid #ece9e4",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#111"}}>{r.title}</div>
                      {/* ── TAGE-ZÄHLER BADGE ── */}
                      <span style={{
                        fontSize:9,fontWeight:700,color:badgeColor,background:badgeBg,
                        borderRadius:20,padding:"2px 8px",border:`1px solid ${badgeColor}33`,
                        whiteSpace:"nowrap",letterSpacing:.3
                      }}>
                        {ds===null?"noch nie gegessen":ds===0?"heute gegessen":`vor ${ds} Tag${ds===1?"":"en"}`}
                      </span>
                    </div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:6}}>
                      <span style={{fontSize:10,color:"#888"}}>{r.portionen||1} Portion{(r.portionen||1)!==1?"en":""}</span>
                      {r.zutaten?.length>0&&<span style={{fontSize:10,color:"#888"}}>{r.zutaten.length} Zutaten</span>}
                    </div>
                    {/* Makros */}
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                      {[[(r.makrosProPortion?.kcal||0)+" kcal","kcal","#e74c3c"],[(r.makrosProPortion?.protein||0)+"g","P","#9b72cf"],[(r.makrosProPortion?.carbs||0)+"g","C","#c8a200"],[(r.makrosProPortion?.fett||0)+"g","F","#e67e22"]].map(([v,l,c])=>(
                        <span key={l} style={{fontSize:9,background:c+"15",color:c,borderRadius:8,padding:"2px 7px",fontWeight:700}}>{v} {l}</span>
                      ))}
                    </div>

                    {/* ── BEWERTUNGEN (2×2 Grid, inline klickbar) ── */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 10px",marginBottom:8,padding:"8px 10px",background:"#faf9f7",borderRadius:8,border:"1px solid #f0ede8"}}>
                      {RATINGS.map(({key,icon,label})=>(
                        <div key={key} style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:11,flexShrink:0}}>{icon}</span>
                          <span style={{fontSize:8,color:"#999",width:58,flexShrink:0,lineHeight:1}}>{label}</span>
                          <StarRating stars={rats[key]||0} onChange={v=>updateRating(r.id,key,v)} size={10}/>
                        </div>
                      ))}
                    </div>

                    {/* Zutaten-Preview */}
                    {r.zutaten?.length>0&&(
                      <div style={{marginTop:3,fontSize:10,color:"#888",lineHeight:1.6}}>
                        {r.zutaten.slice(0,4).map(z=>z.menge+" "+z.name).join(" · ")}
                        {r.zutaten.length>4&&" · +"+( r.zutaten.length-4)+" weitere"}
                      </div>
                    )}

                    {/* ── ZÄHLER-STEUERUNG ── */}
                    <div style={{display:"flex",alignItems:"center",gap:5,marginTop:9,flexWrap:"wrap"}}>
                      {/* Heute-Taste */}
                      <button
                        onClick={()=>onMarkEaten&&onMarkEaten(r.id,today)}
                        title="Heute als gegessen markieren"
                        style={{padding:"3px 10px",borderRadius:20,border:"1px solid #27ae60",
                          background:"#eafaf1",color:"#27ae60",cursor:"pointer",fontSize:10,
                          fontFamily:"Georgia,serif",fontWeight:700}}>
                        ✓ Heute
                      </button>
                      {/* Datum manuell setzen */}
                      {editEatenId===r.id?(
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <input type="date" value={editEatenDate}
                            onChange={e=>setEditEatenDate(e.target.value)}
                            max={today}
                            style={{fontSize:10,padding:"2px 5px",border:"1px solid #ddd",borderRadius:6,fontFamily:"Georgia,serif",outline:"none"}}/>
                          <button onClick={()=>{ onMarkEaten&&onMarkEaten(r.id,editEatenDate); setEditEatenId(null); }}
                            style={{padding:"2px 8px",borderRadius:20,border:"none",background:accent,color:"#fff",cursor:"pointer",fontSize:10}}>OK</button>
                          <button onClick={()=>setEditEatenId(null)}
                            style={{padding:"2px 6px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:10,color:"#888"}}>✕</button>
                        </div>
                      ):(
                        <button
                          onClick={()=>{ setEditEatenId(r.id); setEditEatenDate(r.lastEaten||today); }}
                          title="Datum manuell setzen"
                          style={{padding:"3px 8px",borderRadius:20,border:"1px solid #ddd",
                            background:"#f9f7f3",color:"#888",cursor:"pointer",fontSize:10,
                            fontFamily:"Georgia,serif",display:"flex",alignItems:"center",gap:3}}>
                          📅 {r.lastEaten?formatDate(r.lastEaten,{day:"2-digit",month:"2-digit",year:"2-digit"}):"Datum setzen"}
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    <button onClick={()=>startEdit(r)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:13,padding:2}}>✎</button>
                    <button onClick={()=>deleteRecipe(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:13,padding:2}}>✕</button>
                  </div>
                </div>
              </div>
              );
            })}
          </>
        )}

        {/* URL IMPORT */}
        {view==="url"&&(
          <div>
            <div style={{fontSize:11,color:"#888",marginBottom:12,lineHeight:1.6}}>
              Gib die URL eines Rezepts ein. Claude liest die Seite und extrahiert Titel, Zutaten und Makros automatisch.
            </div>
            <input value={urlInput} onChange={e=>setUrlInput(e.target.value)}
              placeholder="https://www.chefkoch.de/rezepte/..."
              style={{...INP,width:"100%",boxSizing:"border-box",marginBottom:10,fontSize:11}}/>
            {urlMsg&&<div style={{fontSize:11,color:"#c0392b",marginBottom:8}}>{urlMsg}</div>}
            <button onClick={importFromUrl} disabled={urlLoading}
              style={{width:"100%",padding:"9px 0",borderRadius:30,border:"none",background:urlLoading?"#ddd":accent,color:"#fff",cursor:urlLoading?"default":"pointer",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>
              {urlLoading?"Lade Rezept...":"Rezept importieren"}
            </button>
          </div>
        )}

        {/* FORMULAR */}
        {view==="neu"&&(
          <div>
            {/* Titel */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:"#aaa",marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Titel</div>
              <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="z.B. Haferflocken Porridge"
                style={{...INP,width:"100%",boxSizing:"border-box",fontSize:13,fontWeight:700}}/>
            </div>
            {/* Portionen */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#aaa",marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Rezept ergibt … Portionen</div>
              <input type="number" value={form.portionen} min="0.5" step="0.5" onChange={e=>setForm(f=>({...f,portionen:e.target.value}))}
                style={{...INP,width:80}}/>
            </div>
            {/* Zutaten */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#aaa",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Zutaten</div>
              {form.zutaten.map((z,i)=>(
                <div key={z.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                  <input value={z.menge} onChange={e=>updateZutat(z.id,"menge",e.target.value)} placeholder="200g"
                    style={{...INP,width:68,flexShrink:0}}/>
                  <input value={z.name} onChange={e=>updateZutat(z.id,"name",e.target.value)} placeholder="Zutat..."
                    style={{...INP,flex:1}}/>
                  {form.zutaten.length>1&&(
                    <button onClick={()=>removeZutat(z.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:14,padding:2,flexShrink:0}}>✕</button>
                  )}
                </div>
              ))}
              <button onClick={addZutat} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,border:"1px dashed #aaa",background:"transparent",cursor:"pointer",fontSize:10,color:"#888",marginTop:2}}>
                <PlusIcon/> Zutat hinzufügen
              </button>
            </div>
            {/* Makros */}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:1,flex:1}}>Makros pro Portion</div>
                <button onClick={estimateMakros} disabled={kiLoading}
                  style={{padding:"3px 10px",borderRadius:20,border:"1px solid #aaa",background:"transparent",cursor:"pointer",fontSize:9,color:"#666",fontFamily:"Georgia,serif",display:"flex",alignItems:"center",gap:3}}>
                  <SparkIcon/>{kiLoading?"Schätze...":"KI schätzen"}
                </button>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[[form.manKcal,"manKcal","kcal","#e74c3c"],[form.manProt,"manProt","Protein g","#9b72cf"],[form.manCarbs,"manCarbs","Carbs g","#c8a200"],[form.manFett,"manFett","Fett g","#e67e22"]].map(([v,k,ph,c])=>(
                  <div key={k} style={{flex:1}}>
                    <div style={{fontSize:8,color:c,marginBottom:2,textAlign:"center"}}>{ph}</div>
                    <input type="number" value={v} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder="0"
                      style={{...INP,width:"100%",boxSizing:"border-box",borderColor:c+"55",textAlign:"center",padding:"5px 3px"}}/>
                  </div>
                ))}
              </div>
            </div>
            {saveMsg&&<div style={{fontSize:11,color:"#27ae60",marginBottom:8,fontWeight:700}}>{saveMsg}</div>}
            <button onClick={saveRecipe}
              style={{width:"100%",padding:"10px 0",borderRadius:30,border:"none",background:accent,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"Georgia,serif"}}>
              {editId?"Änderungen speichern":"Rezept speichern"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const PERSON_CAL_COLORS = ["#2471a3","#27ae60","#8e44ad","#e67e22","#16a085","#c0392b","#d4ac0d"];
function personCalColor(name, persons){ return PERSON_CAL_COLORS[persons.indexOf(name)%PERSON_CAL_COLORS.length]; }

function EventDetailModal({ev, onClose, persons, personColors, onUpdate, onDelete}){
  if(!ev) return null;
  const isGcal  = ev.isGcal||!!ev.start?.dateTime;
  const person  = ev.person||ev._person||"";
  const accentC = person&&persons?personAccent(person,persons,personColors):"#5b8dee";

  const initTitle = ev.title||ev.summary||"Termin";
  const initDate  = ev.date||(ev.start?.dateTime?ev.start.dateTime.slice(0,10):"");
  const initStart = ev.startTime||(ev.start?.dateTime?new Date(ev.start.dateTime).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):"");
  const initEnd   = ev.endTime  ||(ev.end?.dateTime  ?new Date(ev.end.dateTime  ).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):"");
  const loc  = ev.location||"";
  const desc = ev.description||ev.desc||"";

  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({title:initTitle, date:initDate, startTime:initStart, endTime:initEnd});
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [saving, setSaving] = useState(false);

  const dateLabel = draft.date?new Date(draft.date+"T12:00:00").toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}):"";

  async function handleSave(){
    if(!draft.title.trim()||!draft.date) return;
    setSaving(true);
    await onUpdate(ev.id, {title:draft.title.trim(), date:draft.date, startTime:draft.startTime, endTime:draft.endTime});
    setSaving(false);
    onClose();
  }

  async function handleDelete(){
    await onDelete(ev.id);
    onClose();
  }

  const inputStyle={width:"100%",padding:"7px 10px",borderRadius:8,border:"1.5px solid #ddd",fontFamily:"Georgia,serif",fontSize:12,boxSizing:"border-box",background:"#fafafa",outline:"none"};
  const labelStyle={fontSize:10,fontWeight:700,color:"#888",letterSpacing:.5,marginBottom:3};

  return(
    <div onClick={!confirmDelete?onClose:undefined} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,.28)",overflow:"hidden"}}>

        {/* Header */}
        <div style={{background:accentC,padding:"14px 16px 12px",position:"relative"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#fff",lineHeight:1.3,paddingRight:52}}>
            {editing?draft.title||"Neuer Titel":initTitle}
          </div>
          {person&&<div style={{fontSize:10,color:"rgba(255,255,255,.8)",marginTop:3}}>{person}{isGcal?" · Google Kalender":""}</div>}
          <div style={{position:"absolute",top:10,right:10,display:"flex",gap:6}}>
            {!isGcal&&!editing&&(
              <button onClick={()=>setEditing(true)} title="Bearbeiten"
                style={{background:"rgba(255,255,255,.25)",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff"}}>✏️</button>
            )}
            <button onClick={onClose} style={{background:"rgba(255,255,255,.25)",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:700}}>✕</button>
          </div>
        </div>

        {/* Body — Anzeigemodus */}
        {!editing&&(
          <div style={{padding:"14px 16px 6px",display:"flex",flexDirection:"column",gap:8}}>
            {dateLabel&&<div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14}}>📅</span><span style={{fontSize:12,color:"#333"}}>{dateLabel}</span></div>}
            {(initStart||initEnd)&&<div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14}}>🕐</span><span style={{fontSize:12,color:"#333"}}>{initStart}{initEnd?" – "+initEnd:""}</span></div>}
            {loc&&<div style={{display:"flex",alignItems:"flex-start",gap:8}}><span style={{fontSize:14,flexShrink:0}}>📍</span><span style={{fontSize:12,color:"#333",wordBreak:"break-word"}}>{loc}</span></div>}
            {desc&&<div style={{display:"flex",alignItems:"flex-start",gap:8,marginTop:2}}><span style={{fontSize:14,flexShrink:0}}>📝</span><span style={{fontSize:11,color:"#555",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{desc}</span></div>}
            {!dateLabel&&!initStart&&!loc&&!desc&&<div style={{fontSize:11,color:"#aaa",fontStyle:"italic"}}>Keine weiteren Informationen verfügbar.</div>}
            {isGcal&&<div style={{fontSize:10,color:"#aaa",marginTop:4,fontStyle:"italic"}}>Google-Kalender-Termine können nur in Google Kalender bearbeitet werden.</div>}
          </div>
        )}

        {/* Body — Bearbeitungsmodus */}
        {editing&&(
          <div style={{padding:"14px 16px 6px",display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={labelStyle}>TITEL</div>
              <input value={draft.title} onChange={e=>setDraft(d=>({...d,title:e.target.value}))}
                style={inputStyle} placeholder="Terminname"/>
            </div>
            <div>
              <div style={labelStyle}>DATUM</div>
              <input type="date" value={draft.date} onChange={e=>setDraft(d=>({...d,date:e.target.value}))}
                style={inputStyle}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={labelStyle}>BEGINN</div>
                <input type="time" value={draft.startTime} onChange={e=>setDraft(d=>({...d,startTime:e.target.value}))}
                  style={inputStyle}/>
              </div>
              <div>
                <div style={labelStyle}>ENDE</div>
                <input type="time" value={draft.endTime} onChange={e=>setDraft(d=>({...d,endTime:e.target.value}))}
                  style={inputStyle}/>
              </div>
            </div>
          </div>
        )}

        {/* Footer-Buttons */}
        <div style={{padding:"10px 16px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          {/* Löschen */}
          {!isGcal&&!editing&&!confirmDelete&&(
            <button onClick={()=>setConfirmDelete(true)}
              style={{padding:"7px 14px",borderRadius:20,border:"none",background:"#fdecea",color:"#c0392b",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer",fontWeight:700}}>
              🗑 Löschen
            </button>
          )}
          {!isGcal&&confirmDelete&&(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#c0392b",fontWeight:700}}>Wirklich löschen?</span>
              <button onClick={handleDelete} style={{padding:"5px 12px",borderRadius:20,border:"none",background:"#c0392b",color:"#fff",fontFamily:"Georgia,serif",fontSize:11,cursor:"pointer",fontWeight:700}}>Ja</button>
              <button onClick={()=>setConfirmDelete(false)} style={{padding:"5px 12px",borderRadius:20,border:"none",background:"#eee",color:"#333",fontFamily:"Georgia,serif",fontSize:11,cursor:"pointer"}}>Nein</button>
            </div>
          )}
          {(isGcal||editing)&&<div/>}

          {/* Rechts: Abbrechen / Speichern */}
          <div style={{display:"flex",gap:8,marginLeft:"auto"}}>
            {editing?(
              <>
                <button onClick={()=>setEditing(false)}
                  style={{padding:"7px 14px",borderRadius:20,border:"none",background:"#eee",color:"#333",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer"}}>
                  Abbrechen
                </button>
                <button onClick={handleSave} disabled={saving||!draft.title.trim()||!draft.date}
                  style={{padding:"7px 16px",borderRadius:20,border:"none",background:saving||!draft.title.trim()||!draft.date?"#ccc":"#27ae60",color:"#fff",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer",fontWeight:700}}>
                  {saving?"…":"Speichern"}
                </button>
              </>
            ):(
              <button onClick={onClose}
                style={{padding:"7px 20px",borderRadius:20,border:"none",background:"#f0f0f0",color:"#333",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer",fontWeight:700}}>
                Schließen
              </button>
            )}
          </div>
        </div>

      </div>
    </div>
  );
}

function CalendarView({appEvents,gcalEvents,loading,date,onDateChange,today,persons,onAddEvent,onUpdateEvent,onDeleteEvent,onLoadGcal,externalCalView,gcalToken,onGcalConnect,personColors}){
  const [calViewInternal,setCalViewInternal] = useState("woche");
  const calView = externalCalView||calViewInternal;
  const [showAddForm,setShowAddForm] = useState(false);
  const [newEvent,setNewEvent] = useState({title:"",date:today,startTime:"",endTime:"",person:persons[0]||""});
  const [addMsg,setAddMsg] = useState("");
  const [selEv,setSelEv] = useState(null);

  // Expose addForm toggle globally für den App-Header
  useEffect(()=>{ window.__calAddForm=()=>setShowAddForm(v=>!v); return()=>{ delete window.__calAddForm; }; },[]);

  function eventsForDay(d, personFilter){
    const all=[
      ...(appEvents||[]).filter(ev=>ev.date===d&&(!personFilter||ev.person===personFilter)),
      ...(gcalEvents[d]||[]).map(ev=>({...ev,isGcal:true,person:ev._person||""})),
    ];
    return all;
  }
  function allEventsForDay(d){ return eventsForDay(d); }

  // Wochenraster: heute +-3
  const weekDays = Array.from({length:7},(_,i)=>addDays(date,-3+i));
  // Monatsraster: aktueller Monat
  const monthStart = new Date(date.slice(0,7)+"-01T12:00:00");
  const daysInMonth = new Date(monthStart.getFullYear(), monthStart.getMonth()+1, 0).getDate();
  const firstDow = monthStart.getDay(); // 0=Sun
  const monthDays = Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(monthStart); d.setDate(i+1); return d.toISOString().slice(0,10);
  });

  async function handleAddEvent(){
    if(!newEvent.title.trim()||!newEvent.date){ setAddMsg("Titel und Datum erforderlich."); return; }
    const ev={
      id:"app_"+uid(), title:newEvent.title, date:newEvent.date,
      startTime:newEvent.startTime, endTime:newEvent.endTime,
      person:newEvent.person, isApp:true,
    };
    await onAddEvent(ev);
    // Export to GCal
    if(newEvent.startTime){
      const token=gcalToken||gcalGetToken(newEvent.person)||gcalGetToken(activePerson);
      if(token){
        try{
          const start=newEvent.date+"T"+newEvent.startTime+":00";
          const end=newEvent.endTime?newEvent.date+"T"+newEvent.endTime+":00":newEvent.date+"T"+(newEvent.startTime.split(":")[0].padStart(2,"0")+":59:00");
          await gcalCreateEvent(token,newEvent.title,start,end,"Alltagshelfer – "+newEvent.person);
        }catch(e){ console.error("GCal create error:",e); }
      }
    }
    setShowAddForm(false);
    setNewEvent({title:"",date:today,startTime:"",endTime:"",person:persons[0]||""});
    setAddMsg("");
  }

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Datum-Navigation */}
      <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 12px 6px",flexShrink:0,background:"#faf9f7",borderBottom:"1px solid #ece9e4"}}>
        <button onClick={()=>onDateChange(calView==="woche"?addDays(date,-7):addDays(date.slice(0,7)+"-15",-32))} style={{background:"none",border:"none",cursor:"pointer",color:"#555",padding:4}}><ChevL/></button>
        <span style={{fontSize:12,color:"#333",flex:1,textAlign:"center",fontWeight:700}}>
          {calView==="woche"
            ? formatDate(weekDays[0],{day:"2-digit",month:"long"})+" - "+formatDate(weekDays[6],{day:"2-digit",month:"long",year:"numeric"})
            : formatDate(date.slice(0,7)+"-15",{month:"long",year:"numeric"})}
        </span>
        <button onClick={()=>onDateChange(calView==="woche"?addDays(date,7):addDays(date.slice(0,7)+"-15",32))} style={{background:"none",border:"none",cursor:"pointer",color:"#555",padding:4}}><ChevR/></button>
        <button onClick={()=>onDateChange(today)} style={{padding:"2px 8px",borderRadius:20,border:"1px solid #aaa",background:"transparent",color:"#555",cursor:"pointer",fontSize:9,fontFamily:"Georgia,serif"}}>Heute</button>
      </div>

      {/* Termin hinzufuegen */}
      {showAddForm&&(
        <div style={{padding:"10px 14px",background:"#f0faf4",borderBottom:"1px solid #b8e8c8",flexShrink:0}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
            <input value={newEvent.title} onChange={e=>setNewEvent(n=>({...n,title:e.target.value}))} placeholder="Titel"
              style={{flex:2,minWidth:120,border:"1px solid #ddd",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
            <input type="date" value={newEvent.date} onChange={e=>setNewEvent(n=>({...n,date:e.target.value}))}
              style={{border:"1px solid #ddd",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
            <input value={newEvent.startTime} onChange={e=>setNewEvent(n=>({...n,startTime:e.target.value}))} placeholder="Start HH:MM"
              style={{width:90,border:"1px solid #ddd",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
            <input value={newEvent.endTime} onChange={e=>setNewEvent(n=>({...n,endTime:e.target.value}))} placeholder="Ende HH:MM"
              style={{width:90,border:"1px solid #ddd",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
            <select value={newEvent.person} onChange={e=>setNewEvent(n=>({...n,person:e.target.value}))}
              style={{border:"1px solid #ddd",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,outline:"none",background:"#fff"}}>
              {persons.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <button onClick={handleAddEvent} style={{padding:"5px 14px",borderRadius:20,border:"none",background:"#27ae60",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>Speichern</button>
            <button onClick={()=>setShowAddForm(false)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,color:"#888"}}>X</button>
          </div>
          {addMsg&&<div style={{fontSize:11,color:"#c0392b",marginTop:6}}>{addMsg}</div>}
        </div>
      )}

      {/* WOCHENRASTER */}
      {calView==="woche"&&(
        <div style={{flex:1,overflow:"auto"}}>
          <div style={{display:"flex",height:TOTAL_HEIGHT+32}}>
            <TimeAxis/>
            {weekDays.map(d=>{
              const isToday2=d===today;
              const dayEvs=allEventsForDay(d);
              return(
                <div key={d} style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,borderLeft:"1px solid #ece9e4"}}>
                  <div style={{textAlign:"center",padding:"3px 1px",fontSize:8,fontWeight:isToday2?700:400,
                    color:isToday2?"#c0392b":"#888",background:isToday2?"rgba(192,57,43,.06)":"#faf9f7",
                    borderBottom:"1px solid #ece9e4",flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>
                    {new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short"})} {d.slice(8)}
                  </div>
                  <div style={{flex:1,position:"relative"}}>
                    <GridLines/>
                    {dayEvs.map((ev,i)=>{
                      const startDec=ev.startTime?parseTime(ev.startTime):isoToH(ev.start?.dateTime);
                      const endDec=ev.endTime?parseTime(ev.endTime):isoToH(ev.end?.dateTime);
                      if(startDec===null) return null;
                      const personColor=personAccent(ev.person||persons[0]||"",persons,personColors);
                      const y=timeToY(Math.max(startDec,DAY_START));
                      const height=endDec?Math.max((endDec-startDec)*PX_PER_HOUR,22):28;
                      const label=ev.title||ev.summary||"Termin";
                      return(
                        <div key={ev.id||i} onClick={()=>setSelEv({...ev,date:d})} style={{position:"absolute",top:y,left:1,right:1,height,
                          background:personColor,borderRadius:5,padding:"2px 5px",
                          boxSizing:"border-box",overflow:"hidden",border:"1.5px solid rgba(0,0,0,.15)",zIndex:2,cursor:"pointer"}}>
                          <div style={{fontSize:9,fontWeight:700,color:"#000",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label}</div>
                          {endDec&&<div style={{fontSize:7,color:"#222"}}>{formatHour(startDec)}-{formatHour(endDec)}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* MONATSRASTER */}
      {calView==="monat"&&(
        <div style={{flex:1,overflow:"auto",padding:8}}>
          {/* Wochentag-Header */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
            {["So","Mo","Di","Mi","Do","Fr","Sa"].map(d=>(
              <div key={d} style={{textAlign:"center",fontSize:9,color:"#aaa",fontWeight:700,padding:"2px 0"}}>{d}</div>
            ))}
          </div>
          {/* Tage-Grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {/* Leere Felder am Anfang */}
            {Array(firstDow).fill(null).map((_,i)=><div key={"e"+i}/>)}
            {monthDays.map(d=>{
              const isToday2=d===today;
              const dayEvs=allEventsForDay(d);
              return(
                <div key={d} style={{minHeight:56,background:isToday2?"rgba(192,57,43,.06)":"#fff",
                  borderRadius:6,border:isToday2?"1.5px solid #c0392b":"1px solid #ece9e4",padding:"3px 4px",
                  overflow:"hidden"}}>
                  <div style={{fontSize:9,fontWeight:isToday2?700:400,color:isToday2?"#c0392b":"#888",marginBottom:2}}>
                    {d.slice(8)}
                  </div>
                  {dayEvs.slice(0,3).map((ev,i)=>{
                    const personColor=personAccent(ev.person||persons[0]||"",persons,personColors);
                    const label=ev.title||ev.summary||"Termin";
                    return(
                      <div key={ev.id||i} onClick={e=>{e.stopPropagation();setSelEv({...ev,date:d});}} style={{background:personColor,borderRadius:3,padding:"1px 4px",marginBottom:1,overflow:"hidden",cursor:"pointer"}}>
                        <div style={{fontSize:8,color:"#000",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label}</div>
                      </div>
                    );
                  })}
                  {dayEvs.length>3&&<div style={{fontSize:7,color:"#aaa"}}>+{dayEvs.length-3} weitere</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Legende */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,padding:"6px 14px",borderTop:"1px solid #ece9e4",flexShrink:0,background:"#faf9f7",alignItems:"center"}}>
        <span style={{fontSize:9,color:"#aaa",marginRight:4}}>Nutzer:</span>
        {persons.map(p=>(
          <div key={p} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:personAccent(p,persons,personColors)}}/>
            <span style={{fontSize:9,color:"#555"}}>{p}</span>
          </div>
        ))}
      </div>
      {selEv&&<EventDetailModal ev={selEv} onClose={()=>setSelEv(null)} persons={persons} personColors={personColors} onUpdate={onUpdateEvent} onDelete={onDeleteEvent}/>}
    </div>
  );
}

// --- DASHBOARD BASE CARD ---
function DashCard({ title, accentColor, children, onClick }) {

  return (
    <button
      onPointerDown={function(){ setPressed(true); }}
      onPointerUp={function(){ setPressed(false); }}
      onPointerLeave={function(){ setPressed(false); }}
      onClick={onClick}
      style={{display:"flex",flexDirection:"column",padding:"11px 11px 10px",borderRadius:16,border:"none",cursor:"pointer",
        background:pressed?"rgba(255,255,255,0.72)":"rgba(255,255,255,0.82)",
